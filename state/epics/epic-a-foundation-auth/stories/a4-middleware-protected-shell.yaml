design_decisions:
  - decision: 'Middleware exempts /login, /api/health, /_next/*, and /favicon.ico via matcher'
    rationale: 'Horizontal-plan auth spec — minimum public surface to avoid loops'
  - decision: 'Dashboard CTA tiles link to placeholder hrefs, not broken deep links'
    rationale: 'Thin-foundation NFR — A4 does not ship design/library routes'
  - decision: '/api/health is ultra-cheap — no DB calls'
    rationale: 'Health checks must not cascade into auth or DB failures'

cross_cutting: []

risks:
  - severity: high
    description: 'Firebase Admin SDK not Edge-runtime compatible → middleware crashes'
    mitigation: 'Research step resolves runtime choice; fallback: use Node runtime for middleware (Next 15 supports this), accept cold-start cost'
  - severity: medium
    description: 'Auth loop if /login itself becomes protected'
    mitigation: 'Matcher config reviewed + tested in tests/unit/middleware.test.ts'
  - severity: medium
    description: 'Dashboard CTA tiles tempt gold-plating into real feature routes'
    mitigation: 'Scope boundary in implement step explicitly forbids real routes; reviewer enforces'

references:
  - path: state/planning/prd.md
    relevant_excerpt: |
      US-A-2: Protected authenticated shell. Given a valid session, when I visit `/`,
      then I land in the authenticated shell and see the baseline dashboard
      placeholder with primary workflow entry points. Given my session expires or
      becomes invalid, when I attempt to load a protected page, then the app
      redirects me back to login. Given /api/health, middleware exception remains
      reachable without causing an auth loop.
      FR-A-3: All non-public routes must be protected by middleware while preserving
      narrow exceptions for login and health handling.
      FR-A-8: The dashboard shell must expose a stable home for the eventual
      'New design' and 'My designs' flows even if those routes are placeholders.
  - path: state/planning/structured-outline.md
    relevant_excerpt: |
      `middleware.ts` — enforce auth on non-public routes while exempting /login and
      /api/health. Error conditions: middleware redirect loops.
      Validation: Verify an unauthenticated visit to / redirects to /login. Verify
      the authenticated shell loads after session establishment. Verify /api/health
      remains public.

ui_indicators: 'shell, layout, dashboard, page — visual spec already supplied at state/design/anthropic-source/Dashboard.html (no ui-design step needed)'
