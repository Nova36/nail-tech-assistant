id: a4-middleware-protected-shell
epic: epic-a-foundation-auth
title: 'Auth middleware + authenticated shell layout + dashboard placeholder + public /api/health'
status: pending
complexity: medium
methodology: tdd
depends_on: [a3-auth-allowlist-login]

description: |
  Lock down all non-public routes behind Firebase session middleware; provide an
  authenticated shell layout with a dashboard placeholder exposing stable CTA slots
  for "New design" and "My designs" (the entry points later epics extend). Expose
  `/api/health` as a public exception so Vercel health checks don't auth-loop.

  This story makes the full US-A-1 bypass test runnable (US-A-1 AC#3) and satisfies
  US-A-2 and FR-A-3/A-4/A-8.

acceptance_criteria:
  - 'Given I am not authenticated, when I visit any path except /login or /api/health, then middleware redirects me to /login without rendering protected content.'
  - "Given I have a valid session, when I visit `/`, then I land in the authenticated shell and see the dashboard placeholder with 'New design' and 'My designs' CTA slots."
  - 'Given my session expires or becomes invalid, when I request a protected page, then the app redirects back to /login (no generic 500 error).'
  - 'Given /api/health is requested, when middleware evaluates it, then the response is 200 without auth, and there is no auth loop.'
  - 'Given a complete Playwright test run, when tests/e2e/auth.spec.ts executes, then it passes the happy-path login → shell → health-public → expired-session flow.'

steps:
  - id: research
    description: |
      Max 3 focused questions:
      (1) Next 15 middleware.ts — how to run Firebase session validation in the Edge
      runtime? If firebase-admin is not Edge-compatible, what's the pattern (e.g.,
      JWT verification with Firebase public keys, or session-cookie lookup via a Node
      route)?
      (2) Redirect loop avoidance — standard Next 15 middleware matcher config to
      exempt /login, /api/health, and static assets.
      (3) App Router group routes `(authenticated)` and `(auth)` — are middleware
      redirects respecting route-group boundaries, or does middleware see the raw URL?
      Read a2's lib/firebase/middleware.ts and a3's lib/auth/allowlist.ts.
    agent: researcher
  - id: test-spec
    description: |
      Write failing tests BEFORE implementation. Tests target BEHAVIOR, not the
      HTML structure — they should still pass if the dev refactors the markup.
      - tests/e2e/auth.spec.ts (THE canonical auth e2e — referenced by Epic A
        acceptance). Covers:
        (1) Unauthenticated visit to `/` → redirect to /login
        (2) /api/health returns 200 without auth
        (3) Full login happy path with Firebase emulator: submit allowed email →
            sent state → click emulator-captured link → land on dashboard shell
            (assert by role/text — "New design", "My designs" — not class names)
        (4) Session cookie expiry: set an expired cookie, visit `/`, expect
            redirect to /login
        (5) Direct POST to login server action with wrong email (US-A-1 AC#3 bypass
            test — this was deferred from a3 to here)
      - tests/unit/middleware.test.ts — unit test the middleware redirect decisions
        using a Next.js request mock:
        absent session + protected path → redirect; absent session + /login →
        pass-through; absent session + /api/health → pass-through; valid session +
        protected path → pass-through.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Make the failing tests pass. The VISUAL SPEC is already finished — translate
      the supplied Anthropic HTML into Tailwind + shadcn + our tokens.

      VISUAL SOURCE (authoritative):
      - state/design/anthropic-source/Dashboard.html — full-fidelity finished
        design. Already uses our brand palette (Mulberry Dusk, Ivory Cream,
        Dusty Rose, Champagne Gold, Warm Parchment) and our fonts.

      Translation rules (same as a3):
      - Inline hex → Tailwind tokens via tailwind.config.ts + shadcn aliases
      - `var(--ff-display)` / `var(--ff-body)` → Tailwind font utilities
      - Half-pixel sizes → snap to nearest token; arbitrary values only if rhythm breaks
      - Stray grays → map to `text-muted-foreground` / `text-neutral-muted`
      - CTA tiles → shadcn `<Card>` + `<Button>` primitives; large touch targets
      - Brand G2 logo in the header — reuse from state/brand/brand-guide.html
      - Signature Wash gradient already tokenized as `gradient.signature` —
        use where Dashboard.html shows the gradient (likely one CTA tile or a
        hero accent); reference the token, not the inline stops

      Files to produce:
      - middleware.ts at repo root — uses lib/firebase/middleware helper; exempts
        /login, /api/health, /_next/*, and static assets via `config.matcher`
      - app/layout.tsx — root layout (may already exist from a1; extend with font
        + <head> metadata)
      - app/(authenticated)/layout.tsx — authenticated shell wrapper with
        header/main/footer matching Dashboard.html's shell structure
      - app/(authenticated)/page.tsx — dashboard placeholder matching Dashboard.html
        layout; two CTA tiles for "New design" and "My designs"
      - app/api/health/route.ts — GET handler returning `{ ok: true, ts: ... }`
      Do NOT add real routes behind the CTAs (those are later epics — tiles link
      to placeholder hrefs like "#" or a "coming soon" route).
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify:
      - Middleware matcher config DOES exempt /login, /api/health, static assets
      - No auth loop possible: review the redirect logic — if /login is protected or
        /api/health requires session, redirect cycles occur
      - `/api/health` route handler does NOT touch Firestore or any authenticated
        resource (it must stay cheap + public)
      - Authenticated shell CTA tile hrefs are placeholder-safe (don't navigate to
        broken routes mid-Epic-A)
      - tests/e2e/auth.spec.ts is the CANONICAL Epic A test referenced by PRD
        acceptance — review ensures it covers all listed ACs
      - Session validation in middleware is Edge-runtime compatible (or degraded
        gracefully to Node runtime)
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Commit `feat(a4): middleware + protected shell + dashboard placeholder + health`.
      Branch: `epic-a/a4-middleware-protected-shell`.
    agent: integrator
    depends_on: [review]

