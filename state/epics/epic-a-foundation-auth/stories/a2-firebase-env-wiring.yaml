design_decisions:
  - decision: 'Firebase AI Logic access for Gemini (sign-off #16) is NOT wired here'
    rationale: 'That belongs to Slice 4 (generation pipeline). A2 is auth/env surface only.'
  - decision: 'profiles.id === Firebase Auth uid (FR-A-7)'
    rationale: 'Structured-outline silent-break risk — misalignment breaks Security Rules across all later epics'
  - decision: 'Env validated at module-load time, not lazy'
    rationale: 'FR-A-5 — fail early, not during first Pinterest/generation call'

cross_cutting: []

risks:
  - severity: high
    description: 'Firebase SDK pattern for Next 15 App Router SSR is underspecified in inputs ([confirm Firebase SDK detail])'
    mitigation: 'Research step is gated; DO NOT proceed to test-spec until a concrete SDK pattern is chosen and documented in the research output'
  - severity: medium
    description: 'Client bundle leak if firebase-admin is imported from a client module'
    mitigation: "Mark lib/firebase/server.ts with `import 'server-only'`; add a build-time assertion in test-spec"
  - severity: medium
    description: 'Env validation too strict — blocks CI where not all secrets are available'
    mitigation: 'Provide a test-mode env that stubs secrets; validation runs only in runtime context, not pure build'

