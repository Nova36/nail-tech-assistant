tailwind_version_note: |
  UPDATED POST-RESEARCH: Story originally specified Tailwind as tailwind.config.ts.
  Research (2026-04-18) confirmed Tailwind v4 is the correct version — shadcn/ui
  officially supports v4 as of Feb 2025. v4 drops tailwind.config.js/ts in favor
  of CSS-first config via @import "tailwindcss" + @theme directive in globals.css.
  Tokens from state/brand/tokens.json flow into @theme as CSS custom properties.

design_decisions:
  - decision: 'pnpm (not npm/yarn)'
    rationale: 'project-profile.yaml tech_stack.build_tools — already locked in kickoff'
  - decision: 'Turbopack for dev server'
    rationale: 'Next 15 default; confirmed stable enough for greenfield per Next 15 release notes'
  - decision: 'Tablet-landscape-first breakpoints (not mobile-first)'
    rationale: 'kickoff-decisions #9 + structured-outline #4 — landscape-first tablet is locked'
  - decision: 'No shadcn/ui components installed yet'
    rationale: 'This story is pure toolchain; components come with feature stories in later epics'

cross_cutting: []

risks:
  - severity: medium
    description: 'Tailwind v4 churn — API changes since model training cutoff'
    mitigation: 'Research step MUST verify via context7 which v4 release is stable; fall back to v3.4 if v4 is unstable'
  - severity: low
    description: 'Playwright + Next 15 test-runner friction'
    mitigation: 'Start with minimal smoke spec; defer full auth e2e to a4'
  - severity: low
    description: 'Husky + pnpm install ordering'
    mitigation: 'Use `pnpm prepare` script to install hooks post-install'

