id: a1-scaffold-tooling
epic: epic-a-foundation-auth
title: 'Next.js 15 scaffold + TypeScript + Tailwind (tablet breakpoints) + shadcn/ui + Vitest + Playwright + ESLint + Prettier + Husky + GitHub Actions CI'
status: pending
complexity: medium
methodology: tdd
depends_on: []

description: |
  Stand up the repo-level toolchain for the Nail Tech Assistant app. After this story,
  a fresh `pnpm install && pnpm dev` starts an empty Next.js 15 App Router project, and
  a fresh PR triggers typecheck + lint + unit tests as required gates. No Firebase, no
  auth, no domain logic — pure scaffold.

  Tablet-first breakpoints and touch-size tokens MUST be established now because
  tablet is the target device (kickoff-decisions #9). This is the only structural UI
  decision carried by this story; everything else is toolchain.

acceptance_criteria:
  - 'Given a fresh clone, when I run `pnpm install && pnpm build`, then the build completes with zero errors.'
  - 'Given the repo on any branch, when CI runs on a PR, then typecheck + lint + unit tests all execute and the PR is blocked if any fail.'
  - 'Given a developer commits locally, when the Husky pre-commit hook fires, then it runs typecheck + lint on staged files.'
  - 'Given a developer opens Tailwind classes in a component, when they use `md:` or the custom tablet breakpoint, then tablet-landscape styles render correctly in Storybook/Playwright.'
  - 'Given Vitest and Playwright are installed, when I run `pnpm test` and `pnpm test:e2e`, then both harnesses execute against at least one smoke test that passes.'

steps:
  - id: research
    description: |
      Validate current versions and setup commands via context7 for:
      Next.js 15 App Router, React 19, Tailwind CSS 4 (or 3 if 4 is unstable),
      shadcn/ui CLI, Vitest + React Testing Library, Playwright, pnpm workspace.
      Confirm Turbopack is the right dev server choice for Next 15.
      Note any breaking changes between training-data era and current stable.
      Max 3 focused questions: (1) correct Next 15 create command, (2) Tailwind v4 vs v3
      stability for shadcn/ui, (3) Playwright + Next 15 app-router test setup.
    agent: researcher
  - id: test-spec
    description: |
      Write failing tests BEFORE any implementation. Do NOT read implementation code.
      - tests/unit/smoke.test.ts — a trivial passing unit test to prove Vitest works.
      - tests/e2e/smoke.spec.ts — Playwright test that loads "/" and asserts the page responds
        200 (even if body is empty placeholder).
      - Add a CI assertion: commit a workflow file and validate its YAML parses.
      These are smoke tests only. The real auth tests come in A3/A4.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Make the failing tests pass. Do NOT modify the tests. Create:
      - package.json with scripts: dev, build, start, typecheck, lint, format, test, test:e2e
      - tsconfig.json (Next 15 + strict mode + paths alias `@/*`)
      - next.config.ts (Turbopack on, image domains empty for now)
      - tailwind.config.ts with tablet-first breakpoints: sm/md/lg/xl matching iPad landscape/portrait
      - components.json (shadcn/ui config) — do NOT add components yet
      - eslint.config.js (flat config, Next + TS recommended)
      - .prettierrc (2-space, single quote, trailing comma es5)
      - .env.example (placeholder — real keys added in a2)
      - .github/workflows/ci.yml (Node 20, pnpm, run typecheck+lint+test on PR)
      - .husky/pre-commit running `pnpm typecheck && pnpm lint-staged`
      - app/layout.tsx + app/page.tsx as empty placeholders
      - vitest.config.ts + playwright.config.ts + tests/fixtures/ directory
      Do NOT create Firebase helpers, auth routes, or middleware — those are a2/a3/a4.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the scaffold against the thin-foundation NFR (structured-outline Risk #3).
      Review checklist:
      - No Firebase, Pinterest, or Gemini code leaked in.
      - tsconfig strict mode on; no `any` escape hatches added.
      - Tailwind breakpoints match tablet-landscape first, not mobile-first.
      - CI workflow triggers on PR + push to main; no other branches auto-deploy.
      - Husky hook does NOT run full Playwright (too slow for pre-commit).
      - All acceptance criteria verifiable with runnable commands.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Commit with message `chore(a1): scaffold Next.js 15 + Tailwind + test harness + CI`.
      Do NOT push to main. Create branch `epic-a/a1-scaffold-tooling`.
    agent: integrator
    depends_on: [review]

