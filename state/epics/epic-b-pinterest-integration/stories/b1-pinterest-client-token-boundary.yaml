design_decisions:
  - decision: '`lib/pinterest/client.ts` is the single token consumer; first line is `import "server-only";`'
    rationale: 'Architect MAJOR escalation security:plan-audit pre-exec — the boundary must be enforceable at build time AND verifiable at test time'
  - decision: '6-arm discriminated union from day one (even though /user_account only emits 401/403/network in this slice)'
    rationale: 'B4 needs 401 vs 403 distinct + B2/B3 need not_found / rate_limit normalization — building the full union now avoids retrofit churn'
  - decision: 'Bundle-grep test gates on the literal substring `pina_` in `.next/static/**` JS output'
    rationale: 'Pinterest tokens always begin with `pina_` — the most specific, unambiguous canary string available'
  - decision: '`PINTEREST_APP_ID` removal happens in the same slice as the client module'
    rationale: 'Resolved decision dd-q4 from cycle-state; the runtime contract is now fully consolidated in `lib/env.ts` so the env-example drift gets corrected before any other slice references it'
  - decision: 'No `lib/pinterest/token-replacement-copy.ts` in this slice'
    rationale: 'Copy module ships in B4 alongside the views that consume it — Tailwind-first principle (cycle-state dd-q3) extends to deferring shared modules until they have real consumers'

cross_cutting: []

risks:
  - severity: high
    description: 'Bundle-grep test passes on first run because `next build` was never executed in CI — false-green security signal'
    mitigation: 'Test must `fs.existsSync(".next/static")` and fail loudly if absent; CI script chain is `next build && vitest run tests/security/bundle-grep.test.ts` (verify in review step)'
  - severity: high
    description: 'A future contributor imports `env.PINTEREST_ACCESS_TOKEN` in a client component; build still passes if the import is dynamic or string-templated'
    mitigation: '`import "server-only"` at the top of the client module is the build-time guard; bundle-grep is the runtime guard. Together they cover both static and dynamic-import escape paths.'
  - severity: medium
    description: '401 vs 403 normalization wrong in `verifyPinterestToken` — Pinterest sometimes returns 403 for missing-token cases (or 401 for scope cases); architect MAJOR-2 split breaks downstream'
    mitigation: 'Researcher step #1 must confirm the exact status mapping from Pinterest dev docs. If ambiguous, fall back to body-field-based disambiguation (e.g., `code` field in error JSON) and document the rule in `errors.ts` comments.'
  - severity: medium
    description: 'Sourcemaps in `.next/static/**` contain the literal token string and bundle-grep flags them as a leak'
    mitigation: 'Test explicitly skips `*.map` files; reviewer confirms scan path is JS-only'
  - severity: low
    description: '`i.pinimg.com` is not the only Pinterest CDN host — some pin variants may use a different subdomain'
    mitigation: 'Research step confirms current host coverage; if multi-host, `remotePatterns` accepts an array — easy to extend in B3 when pin media first renders'

references:
  - path: state/planning/prd.md
    relevant_excerpt: |
      US-B-1: Use the configured Pinterest account. Given I am logged into the app
      and the Pinterest env token is configured, when I open the Pinterest surface,
      then the app uses that token and shows an authenticated browse view without
      a user OAuth step. Given the token is missing, revoked, or invalid, when the
      browse route processes the request, then the app blocks the flow and shows
      token-replacement guidance instead of treating Pinterest as available.
      US-B-3: Keep Pinterest access stable through env configuration. Given the env
      token is valid, when a Pinterest request occurs, then the integration sends
      it as a bearer token and boards/pins load without per-user token lookup.
  - path: state/epics/epic-b-pinterest-integration/docs/horizontal-plan.md
    relevant_excerpt: |
      Layer: Server-only Pinterest Client. Start `lib/pinterest/client.ts` with
      `import 'server-only';`. Read `env.PINTEREST_ACCESS_TOKEN` only inside this
      server-only module. Centralize the Pinterest base URL as
      `https://api.pinterest.com/v5`. Centralize bearer-header request construction.
      Default fetch posture to `cache: 'no-store'`. Implement
      `verifyPinterestToken()` against `GET /v5/user_account`.
      Layer: Tests. Add a bundle-grep check that `pina_` does not appear in client
      chunks. Verify the Pinterest token cannot cross a client import boundary.
      Support the architect's pre-exec `security:plan-audit` escalation topic.
  - path: state/epics/epic-b-pinterest-integration/docs/architect-review.md
    relevant_excerpt: |
      Architect MAJOR-2: Split 401 (invalid/missing token) and 403 (insufficient
      scope) handling at the client + render layer. Different operator remediation
      paths: 401 → rotate token; 403 → re-issue token with correct scopes.
  - path: state/epics/epic-b-pinterest-integration/docs/vertical-plan.md
    relevant_excerpt: |
      Step 1 — Token boundary + server-only client. WHAT WORKS AFTER THIS STEP:
      `lib/pinterest/{client,types,errors}.ts` exists, `verifyPinterestToken()`
      resolves correctly against mocked 200/401/403/network responses,
      `lib/env.ts` already-validated `PINTEREST_ACCESS_TOKEN` is the only token
      consumer, and a bundle-grep test proves `pina_` does not appear in any
      client chunk produced by the build. No UI yet. No routes yet.
  - path: state/cycle-state/epic-b-pinterest-integration.yaml
