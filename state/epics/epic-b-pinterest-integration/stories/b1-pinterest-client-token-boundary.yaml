id: b1-pinterest-client-token-boundary
epic: epic-b-pinterest-integration
title: 'Server-only Pinterest client + typed errors + token boundary with bundle-grep proof'
status: pending
complexity: medium
methodology: tdd
depends_on: [a4-middleware-protected-shell]
escalations_addressed:
  - trigger: security:plan-audit
    severity: major
    placement: pre-exec
    raised_by: architect
    addressed_by: 'tests/security/bundle-grep.test.ts asserts `pina_` is absent from .next/static/** client chunks; review step verifies `import "server-only";` boundary in lib/pinterest/client.ts'

description: |
  Vertical Slice 1 of Epic B. Establish the secret-safe Pinterest integration seam
  BEFORE any UI exists: a server-only `lib/pinterest/` module trio (`client.ts`,
  `types.ts`, `errors.ts`) that owns the bearer-token fetch posture, exposes
  `verifyPinterestToken()` against `GET /v5/user_account`, and normalizes Pinterest
  failures into a 6-arm discriminated union (`invalid_token`, `insufficient_scope`,
  `not_found`, `rate_limit`, `network`, `unknown`).

  Also performs the env hygiene work that unblocks later slices: removes the stale
  `PINTEREST_APP_ID` from `.env.example` (runtime contract stays authoritative in
  `lib/env.ts`), and adds `i.pinimg.com` to `next.config.ts`
  `images.remotePatterns` so later board/pin media renders.

  The load-bearing assertion of this slice is a bundle-grep test that confirms the
  string `pina_` does not appear anywhere under `.next/static/**` after a production
  build. This proves the architect's pre-exec `security:plan-audit` invariant: the
  Pinterest token cannot cross any client import boundary.

  Scope discipline: NO UI, NO routes, NO list functions yet (`listPinterestBoards`
  and `listPinterestBoardPins` ship in B2/B3 respectively). This slice ends with a
  green typecheck, green unit tests for the verifier, and a green bundle-grep test.
  Uses `import 'server-only'` at the top of `lib/pinterest/client.ts`.

acceptance_criteria:
  - 'Given the configured `PINTEREST_ACCESS_TOKEN` is valid, when `verifyPinterestToken()` runs against `GET /v5/user_account`, then it returns `{ ok: true }`.'
  - "Given the configured token is missing or rejected with HTTP 401, when `verifyPinterestToken()` runs, then it returns `{ ok: false, reason: 'invalid_token' }` and does NOT throw."
  - "Given the token is valid but rejected with HTTP 403 (insufficient scope), when `verifyPinterestToken()` runs, then it returns `{ ok: false, reason: 'insufficient_scope' }` distinct from the 401 reason."
  - "Given a network failure (fetch reject) when calling Pinterest, when `verifyPinterestToken()` runs, then it returns `{ ok: false, reason: 'network' }` without throwing."
  - 'Given the project is built for production (`pnpm build` or equivalent), when a bundle-grep test scans `.next/static/**` (or the equivalent client-bundle output), then the string `pina_` is absent from every chunk.'
  - 'Given the runtime env validation in `lib/env.ts` is the authoritative source for `PINTEREST_ACCESS_TOKEN`, when `.env.example` is inspected, then `PINTEREST_APP_ID` is no longer present.'
  - 'Given `next.config.ts` is loaded, when the image config is evaluated, then `images.remotePatterns` includes `i.pinimg.com` so later board/pin media can render.'
  - "Given the server-only client module, when any client component attempts to import it, then the import fails at build time (because of `import 'server-only'`)."

steps:
  - id: research
    description: |
      Max 3 focused questions:
      (1) Pinterest API v5 — exact response shape for `GET /v5/user_account` on
      success and on 401/403 failures. Confirm the 401 vs 403 distinction is
      reliable (architect baked decision MAJOR-2 depends on this) and what header
      / body fields disambiguate them. Use `firecrawl` against the Pinterest dev
      docs if context7 lacks it.
      (2) `import 'server-only'` mechanics in Next 15 — what build error appears
      when a client component imports the module, and how do we write an
      assertion that this stays true (the bundle-grep test is the runtime check;
      what is the build-time check)?
      (3) Bundle-grep test pattern — best way to scan `.next/static/**` for a
      forbidden string in a Vitest or Playwright test, including how to avoid
      false positives from sourcemaps. Confirm whether `next build` is required
      before the test runs and how to wire that into CI.
      Read `lib/env.ts` (already validates `PINTEREST_ACCESS_TOKEN`),
      `next.config.ts` (already exposes empty `images.remotePatterns`), and the
      horizontal/vertical plan docs at
      `state/epics/epic-b-pinterest-integration/docs/`.
    agent: researcher
  - id: test-spec
    description: |
      Write failing tests BEFORE implementation. Tests target BEHAVIOR, not
      implementation detail.

      - tests/unit/pinterest/client.test.ts — verifyPinterestToken unit tests:
        (1) Mocked 200 response → `{ ok: true }`
        (2) Mocked 401 response → `{ ok: false, reason: 'invalid_token' }`
        (3) Mocked 403 response → `{ ok: false, reason: 'insufficient_scope' }`
        (4) Mocked network reject → `{ ok: false, reason: 'network' }` (no throw)
        (5) Bearer header is set to `Bearer ${env.PINTEREST_ACCESS_TOKEN}`
        (6) Default fetch posture is `cache: 'no-store'`
        (7) Request URL is `https://api.pinterest.com/v5/user_account`
        Use `vi.fn()` to mock global fetch; do NOT hit real Pinterest in unit
        tests.

      - tests/unit/pinterest/errors.test.ts — discriminated union shape:
        (1) `invalid_token` arm exists with no extra fields
        (2) `insufficient_scope` arm exists distinct from invalid_token
        (3) `not_found`, `rate_limit`, `network`, `unknown` arms exist
        (4) Type-narrowing test: a `switch` on `reason` is exhaustive

      - tests/security/bundle-grep.test.ts — secret-boundary security test:
        (1) Run after `next build` (or skip if no `.next/static/` exists, with
            a clear error message)
        (2) Walk `.next/static/**/*.js` recursively
        (3) Assert no file contains the substring `pina_`
        (4) Skip sourcemap files (`*.map`) to avoid false positives
        This is THE canonical Epic B security test referenced by the architect's
        pre-exec `security:plan-audit` escalation.

      - tests/unit/env-example.test.ts — env hygiene assertion:
        (1) Read `.env.example`
        (2) Assert it does NOT contain `PINTEREST_APP_ID`
        (3) Assert it DOES contain `PINTEREST_ACCESS_TOKEN`

      DO NOT write tests for `listPinterestBoards` or `listPinterestBoardPins`
      — those land in B2 and B3. DO NOT write route-level tests — no routes
      exist in this slice.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Make the failing tests pass. Pure backend slice — NO UI work.

      Files to produce / modify:

      - lib/pinterest/types.ts — Pinterest response shapes:
        - `PinterestBoard` (id, name, description, privacy, pin_count,
          follower_count, created_at, board_pins_modified_at, media,
          owner.username — keep cover-image typing flexible)
        - `PinterestPin` (id, title, description, alt_text, link, board_id,
          board_section_id, board_owner.username, created_at, creative_type,
          dominant_color, has_been_promoted, is_owner, is_product, is_standard,
          parent_pin_id, media.media_type, media.images variants)
        - `PinterestPaginated<T>` = `{ items: T[]; bookmark: string | null }`
        - `PinterestUserAccount` (only the fields verifyPinterestToken needs)

      - lib/pinterest/errors.ts — discriminated union:
        ```ts
        export type PinterestError =
          | { reason: 'invalid_token' }
          | { reason: 'insufficient_scope' }
          | { reason: 'not_found' }
          | { reason: 'rate_limit'; retryAfterMs?: number }
          | { reason: 'network' }
          | { reason: 'unknown'; status?: number };
        ```
        Plus a helper `normalizePinterestResponse(res: Response): PinterestError | null`
        that maps HTTP status → error or returns null on 2xx.

      - lib/pinterest/client.ts — server-only module:
        - First line: `import 'server-only';`
        - Constant: `PINTEREST_API_BASE = 'https://api.pinterest.com/v5'`
        - Read `env.PINTEREST_ACCESS_TOKEN` only inside this module.
        - Helper `pinterestFetch(path, init)` that:
          - sets `Authorization: Bearer ${token}` header
          - sets `cache: 'no-store'` by default (init can override)
          - returns `Response`
        - Export `verifyPinterestToken(): Promise<{ ok: true } | { ok: false; reason: 'invalid_token' | 'insufficient_scope' | 'network' }>`
          (only those three arms — unknown / not_found / rate_limit don't apply to
          /user_account; collapse them into 'unknown' by mapping to network if
          desired or treat as throw — choose the simplest shape that makes the
          test contract green)

      - .env.example — REMOVE the `PINTEREST_APP_ID=...` line. Keep
        `PINTEREST_ACCESS_TOKEN=...` and any other existing entries.

      - next.config.ts — extend the existing empty `images.remotePatterns`:
        ```ts
        images: {
          remotePatterns: [
            { protocol: 'https', hostname: 'i.pinimg.com' },
          ],
        }
        ```

      - package.json — if needed, add a script that runs `next build && vitest run tests/security/bundle-grep.test.ts` so CI can gate on the bundle assertion. Coordinate with existing scripts; do NOT duplicate.

      Do NOT add `listPinterestBoards`, `listPinterestBoardPins`,
      `lib/pinterest/token-replacement-copy.ts`, route segments, components,
      Suspense boundaries, or pagination wiring. Those live in later slices.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the security boundary is real and the slice scope held.

      - `lib/pinterest/client.ts` first line is `import 'server-only';` — no
        exceptions.
      - The token (`env.PINTEREST_ACCESS_TOKEN`) is read ONLY inside
        `lib/pinterest/client.ts`. Grep the codebase for other consumers — if
        any exist outside `lib/env.ts` and `lib/pinterest/client.ts`, fail.
      - Bundle-grep test runs against a real `next build` output, not a mocked
        directory. Confirm CI wiring runs the build before the test.
      - 401 vs 403 normalization is distinct in `errors.ts` — a single
        catch-all reason here would silently break the architect's MAJOR-2
        decision when B4 lands.
      - `.env.example` cleanup is complete: no `PINTEREST_APP_ID`, no comment
        residue referencing it, no orphaned line in any docs.
      - `next.config.ts` allowlist entry uses `https` protocol and exact
        `i.pinimg.com` hostname (no broader `*.pinimg.com` unless the
        researcher confirms it's needed).
      - NO scope creep into UI, routes, components, list functions, or copy
        module — these are explicitly later-slice work.
      - All tests pass: unit/pinterest/client, unit/pinterest/errors,
        security/bundle-grep, unit/env-example.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Commit `feat(b1): server-only Pinterest client + token boundary + bundle-grep proof`.
      Branch: `epic-b/pinterest-client-token-boundary`.
    agent: integrator
    depends_on: [review]

