design_decisions:
  - decision: 'Token-invalid and insufficient-scope render as page-level branches inside route segment, NOT via error.tsx'
    rationale: 'Architect MAJOR-1 — error.tsx is reserved for unexpected failures + retries; token failures are expected, deterministic states with bespoke remediation copy that DO NOT recover via retry'
  - decision: '401 and 403 are TWO distinct view components with distinct copy primitives (NOT a single component with prop-driven toggles)'
    rationale: 'Architect MAJOR-2 — different remediation paths (rotate token vs re-scope token); a single component invites future drift toward a unified copy that loses the distinction'
  - decision: 'Both views are server-renderable with zero client JS'
    rationale: 'No interactivity required (operator action is external); horizontal plan layer 5 mandates server-renderable; reduces bundle size and aligns with the no-token-leak boundary'
  - decision: 'Shared `lib/pinterest/token-replacement-copy.ts` module exports two named primitives'
    rationale: 'Single source of truth for copy revisions while preserving the 401/403 textual distinction'
  - decision: '`verifyPinterestToken()` is awaited BEFORE the existing Suspense boundaries in `page.tsx` and `[boardId]/page.tsx`'
    rationale: 'Token branch needs to short-circuit the streaming subtree; awaiting outside Suspense keeps the boundary semantics clean (architect MAJOR-1 requires page-level branch)'
  - decision: 'No retry button on either token-remediation view'
    rationale: 'A retry would lie about what unblocks the operator — they need external action (env update + redeploy); error.tsx retains retry for genuinely transient failures'
  - decision: '`error.tsx` is generic, not Pinterest-specific'
    rationale: 'Catch-all for unexpected failures (500s, malformed JSON, fetch rejects without normalized error class); future inline retryable UI for rate_limit/network lands in B5'
  - decision: 'No copy on either view names the specific environment variable internals (e.g., does not say "Bearer token" or "Authorization header")'
    rationale: 'Wife-test bar — operator should not need to understand HTTP auth to act on the steps; reference user-visible surfaces only (Pinterest dashboard, Vercel env)'

cross_cutting: []

risks:
  - severity: high
    description: 'Token-health gate placed INSIDE the Suspense boundary, causing the token branch to throw and surface via error.tsx instead of rendering page-level — silently regresses architect MAJOR-1'
    mitigation: 'Implement step explicitly places the gate BEFORE Suspense; integration test asserts NO error.tsx content rendered on 401/403; reviewer cross-reads the route source'
  - severity: high
    description: 'Single shared view component with prop-driven 401/403 toggle — silently regresses architect MAJOR-2 over time'
    mitigation: 'Two distinct components with two distinct copy primitives; integration tests assert distinct headings + distinct remediation step text'
  - severity: medium
    description: 'Copy fails the wife-test — operator hits a step they cannot act on without external clarification'
    mitigation: 'ui-design brief enforces wife-test bar; reviewer reads the copy as a non-technical operator (manual readability check); revisions land in B5 if needed but should not block this slice'
  - severity: medium
    description: 'Pinterest dashboard or Vercel env UI changes after copy is written, making step references stale'
    mitigation: 'Researcher question #1 captures current navigation paths; copy uses durable noun phrases ("Project Settings → Environment Variables") rather than UI element class names; B5 polish slot absorbs minor copy updates'
  - severity: medium
    description: 'B2/B3 healthy paths regress because the token gate accidentally short-circuits even on healthy responses (e.g., wrong reason field comparison)'
