design_decisions:
  - decision: 'Uniform pin grid (object-cover or square cell) instead of masonry'
    rationale: 'Cycle-state dd-q1; uniform grid is more layout-stable with next/image and matches B2 boards'
  - decision: '`InfiniteScrollSentinel` reused unmodified across boards and pins'
    rationale: 'B2 designed the sentinel as a generic prop-driven component (`onIntersect` + `disabled`); pin pagination only differs in the callback'
  - decision: '`notFound()` invoked from server component for invalid boards (NOT thrown to error.tsx)'
    rationale: 'Next 15 idiomatic; `not-found.tsx` is the bespoke UI for this state; error.tsx remains reserved for unexpected failures (architect MAJOR-1 carry-forward)'
  - decision: 'PinCard uses a fixed image variant from `media.images` rather than picking the largest'
    rationale: 'Bandwidth and layout stability; ui-design brief locks in the specific variant choice'
  - decision: 'No board-specific not-found.tsx in this slice'
    rationale: 'Slice scope discipline; if generic `not-found.tsx` proves insufficient in practice, B5 can add `[boardId]/not-found.tsx`'
  - decision: 'No external link from PinCard to Pinterest in this slice'
    rationale: 'Epic B is browse-only per scope reminder; pin selection / external open belong to later epics'

cross_cutting: []

risks:
  - severity: high
    description: 'Pin response variance — some pins lack the assumed `media.images` variant; PinCard renders broken image'
    mitigation: 'PinCard implements variant fallback: try preferred variant → fallback variants → placeholder. Researcher confirms variant guarantees.'
  - severity: medium
    description: '`notFound()` does not bubble correctly from inside a Suspense boundary; user sees blank instead of `not-found.tsx`'
    mitigation: 'Researcher question #2 verifies behavior; integration test asserts not-found UI renders for bad boards'
  - severity: medium
    description: 'Uniform grid cells crop pin content awkwardly when pin aspect ratios vary widely'
    mitigation: 'ui-design brief picks a cell shape (likely square with object-cover) that works for the worst case; reviewer cross-checks against actual Pinterest pin samples'
  - severity: medium
    description: 'B2 `InfiniteScrollSentinel` interface insufficient for pin pagination, requiring B2 retrofit'
    mitigation: 'Researcher question #3 catches this before test-spec; if a prop is missing, fix B2 first (treat as a B2 bug rather than B3 scope creep)'
  - severity: low
    description: 'Tablet pin grid is too dense or too sparse — wrong column count'
    mitigation: 'ui-design brief locks tablet vs desktop column counts; reviewer eyeballs at tablet breakpoint'

