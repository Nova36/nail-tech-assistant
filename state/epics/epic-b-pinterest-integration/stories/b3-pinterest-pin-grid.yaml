description: |
  Vertical Slice 3 of Epic B. Reuses the boards-route pattern proven in B2 to
  ship the board-detail route: `app/(authenticated)/pinterest/[boardId]/page.tsx`
  fetches the first page of pins via `listPinterestBoardPins({ boardId })`,
  streams a `<Suspense fallback={<PinGridSkeleton/>}>`, then renders a uniform
  pin grid. The same `InfiniteScrollSentinel` from B2 is reused for pin
  pagination via a new `loadMorePins` server action. Invalid `boardId` (Pinterest
  returns `not_found`) calls `notFound()` and renders `not-found.tsx`.

  This slice ASSUMES a healthy token (same as B2). Token-invalid (401) and
  insufficient-scope (403) page-level render branches land in B4.

  US-B-2 part 2 (pin grid) and the not-found path: satisfied at end of slice.

  Resolved decisions reused from B2: uniform pin grid (NOT masonry), infinite
  scroll via IntersectionObserver, Tailwind-first, Suspense streaming. Pin grid
  has additional response-shape variance (image variants, dominant_color,
  media.media_type) that boards do not — this is the slice's primary integration
  risk.

  UI work: new `PinGrid`, `PinCard`, `PinGridSkeleton` components — Pinterest UI
  has no pre-supplied wireframe, so the `ui-design` step produces a brief
  before `test-spec`. The `InfiniteScrollSentinel` is REUSED from B2 with no
  modification.

acceptance_criteria:
  - 'Given the configured Pinterest token is valid and an authenticated user clicks a `BoardCard` on `/pinterest`, when navigation lands on `/pinterest/[boardId]`, then the route streams `PinGridSkeleton` first and then the resolved `PinGrid` with the first page of pins for that board.'
  - 'Given the first pin page response includes a non-null `bookmark`, when the user scrolls until `InfiniteScrollSentinel` enters the viewport, then the pins server action is invoked with `boardId` + `bookmark` and returned items are appended to `PinGrid` without replacing the existing list.'
  - 'Given the pins server action returns `{ items: [...], nextBookmark: null }`, when the sentinel observes that response, then it stops triggering further pagination requests.'
  - 'Given the user navigates to `/pinterest/{invalid-board-id}` (Pinterest returns 404 / `not_found`), when the route processes the request, then it calls `notFound()` and renders `not-found.tsx` instead of the pin grid or `error.tsx`.'
  - 'Given a `PinCard` renders pin media via `next/image`, when the page is built, then it consumes the `media.images` variant URLs from `i.pinimg.com` (allowlist already added in B1).'
  - 'Given the pin grid renders, when the layout is inspected, then it is a uniform grid (not masonry) per cycle-state dd-q1.'
  - 'Given the page is loaded on a tablet-width viewport, when pin cards render, then touch targets meet the existing tablet sizing convention.'
  - 'Given the pins server action signature, when it is called, then it accepts `{ boardId: string; bookmark: string | null }` and returns `{ items: PinterestPin[]; nextBookmark: string | null }`.'

steps:
  - id: research
    description: |
      Max 3 focused questions:
      (1) Pinterest pin response shape — confirm the exact `media.images` variant
      naming (`150x150`, `400x300`, `600x`, `1200x`) and whether all pins always
      include the same set, or whether some pins return only a subset (e.g.,
      `creative_type` differences). The B1 `PinterestPin` type captures the
      union shape; B3 needs the most-likely-present variant for `next/image`
      `src`.
      (2) Next 15 dynamic route segment with `notFound()` — confirm the
      semantics of `notFound()` thrown from a server component inside a
      Suspense boundary; does it bubble to `not-found.tsx` correctly even when
      streamed?
      (3) IntersectionObserver reuse — `InfiniteScrollSentinel` was built in
      B2 with `onIntersect` + `disabled` props. Confirm zero modification
      needed for pin pagination (only the `onIntersect` callback differs); if
      a generic prop is missing, name it now to avoid retrofitting B2.
      Read `lib/pinterest/{client,types}.ts` from B1, B2 components especially
      `BoardGrid.tsx` (the pattern PinGrid will mirror), and the brand tokens.
    agent: researcher
  - id: ui-design
    description: |
      RUNS AT PLANNING TIME (per `references/wireframe-protocol.md` Touchpoint 1)
      — story is not finalized for execute until the wireframe is approved.
      Satisfies the `ui:major` escalation.

      Produce **3 wireframe renditions** at:
        - `state/wireframes/epic-b-pinterest-integration/b3-pinterest-pin-grid/v1.png`
        - `state/wireframes/epic-b-pinterest-integration/b3-pinterest-pin-grid/v2.png`
        - `state/wireframes/epic-b-pinterest-integration/b3-pinterest-pin-grid/v3.png`

      Plus a written brief at `state/design/briefs/pinterest-pin-grid.md`.

      The brief + renditions cover:
      - `/pinterest/[boardId]` page layout — board name header, back link or
        breadcrumb to `/pinterest`, then pin grid below
      - Uniform `PinGrid` — column count at tablet vs desktop (consider denser
        than board grid since pins are individually smaller), aspect ratio
        decision (preserve image aspect via fixed-height cell + object-cover,
        OR force a square cell — recommend square for layout stability)
      - `PinCard` — pin media (uses smallest variant that's >= card width;
        likely `400x300` or `600x`), optional `title` truncation, no
        click-through to Pinterest external link in this slice (deferred —
        Epic B is browse-only, not select-or-open)
      - `PinGridSkeleton` — placeholder card silhouettes; same skeleton
        language as `BoardGridSkeleton`
      - **MINIMAL inline 401/403 placeholder** in the pin-grid slot (same
        pattern as b2; will be upgraded by `b4-pinterest-token-remediation-views`
        to the styled views). Two short sentences each.
      - `not-found.tsx` page — terse "this board doesn't exist or is no
        longer accessible" copy with a link back to `/pinterest`

      Reuse Epic A's warm-shell visual language and b2's grid/card vocabulary
      where possible — pin grid should feel like the same family as board
      grid, just denser.

      **Touchpoint 1 (blocking, requires direct user access via team-lead):**
      orchestrator presents renditions to Don, Don selects one (or requests
      changes / more options), TPM appends the `wireframes:` block to this
      story file with the approved rendition path + brief. Story does not
      enter execute until that block is populated.
    agent: ui-designer
    depends_on: [research]
  - id: test-spec
    description: |
      Write failing tests BEFORE implementation. Tests target BEHAVIOR.

      - tests/unit/pinterest/list-board-pins.test.ts —
        `listPinterestBoardPins({ boardId, bookmark })` unit:
        (1) URL is `https://api.pinterest.com/v5/boards/{boardId}/pins`
        (2) Mocked 200 with bookmark returns `{ items, nextBookmark }`
        (3) Terminal page (`bookmark: null`) returns `{ items, nextBookmark: null }`
        (4) Mocked 404 returns the `not_found` error per B1's `errors.ts`
        (5) Mocked 401/403 returns the existing `invalid_token` /
            `insufficient_scope` arms (those will be consumed in B4)

      - tests/unit/pinterest/actions-pins.test.ts — pins server action unit:
        (1) Calls `listPinterestBoardPins({ boardId, bookmark })` with the
            params passed in
        (2) Returns `{ items: PinterestPin[]; nextBookmark: string | null }`
        (3) Token never appears in return type

      - tests/integration/pinterest/board-detail-page.test.tsx —
        `/pinterest/[boardId]` render:
        (1) With mocked healthy token + mocked pin response, the page
            eventually renders pin titles or alt text in the DOM
        (2) Initial render shows `PinGridSkeleton` (assert by `aria-busy`)
        (3) Invalid board ID → page calls `notFound()` and `not-found.tsx`
            renders (assert by visible heading or role)
        (4) Pin grid layout is uniform — count rendered pin elements; their
            CSS grid template uses fixed columns (assert grid-style or class
            convention; may need a behavior-friendly assertion like
            "same-width children" via getBoundingClientRect in jsdom)

      - tests/e2e/pinterest-board-detail.spec.ts — Playwright full golden path:
        (1) Log in as the allowlisted user
        (2) Navigate to `/pinterest`, wait for boards to render
        (3) Click the first board card
        (4) Assert URL becomes `/pinterest/{boardId}`
        (5) Assert pin skeleton renders, then resolves to pin grid
        (6) Scroll until sentinel fires; assert second batch appended
        (7) Navigate to `/pinterest/bogus-id-12345`; assert `not-found.tsx`
            renders (look for the heading from the ui-design brief)

      DO NOT write tests for: 401/403 page-level branches, token-replacement
      copy, empty-state UI, retryable browse error UI. Those land in B4 / B5.
    agent: tester
    depends_on: [ui-design]
  - id: implement
    description: |
      Make the failing tests pass. UI work — translate the ui-design brief
      into Tailwind + brand tokens.

      AUTHORITATIVE VISUAL SOURCE:
      - state/design/briefs/pinterest-pin-grid.md (+ optional .png)

      Files to produce:

      - lib/pinterest/client.ts — extend with
        `listPinterestBoardPins({ boardId, bookmark, pageSize })`. When
        Pinterest returns 404 (board not found), the function should produce
        the `not_found` error per B1's `errors.ts` (do NOT throw a raw error —
        normalize through the existing helper).

      - app/(authenticated)/pinterest/[boardId]/page.tsx — server component:
        - Wrap the pins fetch in `<Suspense fallback={<PinGridSkeleton/>}>`
        - Inside the suspended subtree, fetch the first pin page via
          `listPinterestBoardPins({ boardId: params.boardId })`
        - If the result is `not_found`, call `notFound()` (Next 15 helper)
        - Pass the resolved page as serializable initial props to `<PinGrid>`
        - DO NOT render 401/403 page-level branches (B4). Token failures
          fall through to error.tsx in this slice.

      - app/(authenticated)/pinterest/not-found.tsx — page-level not-found UI:
        - Per ui-design brief: terse copy + link back to `/pinterest`
        - Reuses authenticated-shell layout (still inside the
          `(authenticated)` route group)

      - app/(authenticated)/pinterest/actions.ts — extend with:
        ```
        export async function loadMorePins(
          boardId: string,
          bookmark: string,
        ): Promise<{ items: PinterestPin[]; nextBookmark: string | null }>
        ```
        Reuses `listPinterestBoardPins` from `lib/pinterest/client.ts`.

      - components/pinterest/PinGrid.tsx — client component:
        - Mirrors `BoardGrid.tsx` structure
        - Accepts initial `items: PinterestPin[]` and `nextBookmark`
        - Uses local `useState` to track appended pages
        - Renders `<InfiniteScrollSentinel onIntersect={loadMorePinsHere} disabled={!nextBookmark}/>`

      - components/pinterest/PinCard.tsx — client component:
        - Accepts `pin: PinterestPin`
        - Renders `next/image` with the most-appropriate `media.images`
          variant per ui-design brief
        - Renders `pin.title` or `pin.alt_text` if provided

      - components/pinterest/PinGridSkeleton.tsx — server-renderable:
        - N placeholder cards in a uniform grid; `aria-busy="true"`

      Reuse `components/pinterest/InfiniteScrollSentinel.tsx` from B2 with
      ZERO modification. If a prop is missing, fix it in B2 first.

      Do NOT add: 401/403 views, token-replacement copy, empty-state UI,
      retryable browse error UI, `[boardId]/not-found.tsx` (board-specific
      copy lives in B5 if at all). Those are later-slice work.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the slice ships pin browse + not-found without bleeding into
      later-slice scope.

      - `lib/pinterest/client.ts` `listPinterestBoardPins` reuses the
        server-only fetch helper from B1; no fresh token reads.
      - `not_found` normalization goes through `errors.ts` (B1) and the route
        calls `notFound()` rather than throwing raw — `error.tsx` should NOT
        catch invalid-board cases (that's `not-found.tsx`'s job).
      - `InfiniteScrollSentinel` is reused with NO modification — confirm by
        diff against B2.
      - Pin grid layout is uniform; pin cards are roughly equal-width regardless
        of pin aspect ratio (uses object-cover or equivalent).
      - `PinCard` `next/image` `src` selection logic falls back gracefully if
        the chosen variant is missing.
      - NO 401/403 page-level branch (B4). NO token-replacement copy. NO
        empty-state UI.
      - All tests pass: unit/list-board-pins, unit/actions-pins,
        integration/board-detail-page, e2e/pinterest-board-detail.
      - Tablet-touch sized cards.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Commit `feat(b3): /pinterest/[boardId] pin grid with infinite scroll + not-found handling`.
      Branch: `epic-b/pinterest-pin-grid`.
    agent: integrator
    depends_on: [review]

