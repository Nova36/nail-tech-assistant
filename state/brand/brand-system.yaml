brand:
  name: 'Nail Tech Assistant'
  short_name: 'NTA'
  tagline: 'Your art. Beautifully organized.'
  personality: 'Crafted, warm, and quietly indulgent — a studio companion that feels like a gift, not a tool.'
  tone: crafted, warm, intimate, premium-leaning

colors:
  primary:
    name: 'Mulberry Dusk'
    hex: '#6B3F5E'
    rgb: 'rgb(107, 63, 94)'
    cmyk: 'cmyk(0, 41, 12, 58)'
    pms: 'PMS 5115 C'
    usage: 'Primary actions, active states, brand wordmark'

  primary_light:
    name: 'Dusty Rose'
    hex: '#D4A5A8'
    rgb: 'rgb(212, 165, 168)'
    cmyk: 'cmyk(0, 22, 21, 17)'
    pms: 'PMS 495 C'
    usage: 'Hover states, secondary highlights, decorative accents, cap detail on bottle mark'

  accent:
    name: 'Champagne Gold'
    hex: '#C9A96E'
    rgb: 'rgb(201, 169, 110)'
    cmyk: 'cmyk(0, 16, 45, 21)'
    pms: 'PMS 871 C'
    usage: 'Premium accents, icons, selected states, star ratings'

  surface:
    name: 'Ivory Cream'
    hex: '#FAF7F2'
    rgb: 'rgb(250, 247, 242)'
    cmyk: 'cmyk(0, 1, 3, 2)'
    pms: 'PMS 9180 C'
    usage: 'App background, page surface — recedes behind nail imagery'

  surface_raised:
    name: 'Warm Parchment'
    hex: '#F0EBE3'
    rgb: 'rgb(240, 235, 227)'
    cmyk: 'cmyk(0, 2, 5, 6)'
    pms: 'PMS 9183 C'
    usage: 'Card backgrounds, sidebar panels, elevated surfaces'

  neutral:
    name: 'Warm Charcoal'
    hex: '#3D3530'
    rgb: 'rgb(61, 53, 48)'
    cmyk: 'cmyk(0, 13, 21, 76)'
    pms: 'PMS 476 C'
    usage: 'Body text, headings, primary readable content'

  neutral_mid:
    name: 'Taupe Mist'
    hex: '#8C7E78'
    rgb: 'rgb(140, 126, 120)'
    cmyk: 'cmyk(0, 10, 14, 45)'
    pms: 'PMS 405 C'
    usage: 'Secondary text, captions, metadata, placeholder text'

  neutral_light:
    name: 'Pearl Fog'
    hex: '#D4CBC5'
    rgb: 'rgb(212, 203, 197)'
    cmyk: 'cmyk(0, 4, 7, 17)'
    pms: 'PMS 9183 C'
    usage: 'Dividers, borders, disabled states'

  destructive:
    name: 'Dusty Rose'
    hex: '#C0595A'
    rgb: 'rgb(192, 89, 90)'
    cmyk: 'cmyk(0, 54, 53, 25)'
    pms: 'PMS 7524 C'
    usage: 'Error states, destructive actions — warm tone prevents jarring contrast'

typography:
  heading_font:
    family: 'Fraunces'
    google_fonts_url: 'https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap'
    weights: [300, 400, 600, 700]
    rationale: >
      Fraunces is a variable optical-size serif with warmth and quiet elegance.
      Its soft ink-trap details evoke a bespoke, crafted quality without formality.
      The variable axis lets it breathe at large display sizes and tighten at smaller ones —
      perfect for an app where headings frame vibrant imagery.

  body_font:
    family: 'Inter'
    google_fonts_url: 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap'
    weights: [400, 500, 600]
    rationale: >
      Inter pairs cleanly with Fraunces — the high-contrast serif / geometric sans combination
      creates the 'crafted' feel without looking editorial. Inter's excellent legibility at
      small sizes is critical for metadata-dense design cards and form labels on tablet.

type_scale:
  display: { size: '48px', line_height: '1.15', font: 'Fraunces', weight: 300 }
  h1: { size: '36px', line_height: '1.2', font: 'Fraunces', weight: 400 }
  h2: { size: '28px', line_height: '1.25', font: 'Fraunces', weight: 400 }
  h3: { size: '22px', line_height: '1.3', font: 'Fraunces', weight: 600 }
  h4: { size: '18px', line_height: '1.4', font: 'Fraunces', weight: 600 }
  body_lg: { size: '17px', line_height: '1.6', font: 'Inter', weight: 400 }
  body: { size: '15px', line_height: '1.65', font: 'Inter', weight: 400 }
  body_sm: { size: '13px', line_height: '1.6', font: 'Inter', weight: 400 }
  label: { size: '12px', line_height: '1.5', font: 'Inter', weight: 500 }
  caption: { size: '11px', line_height: '1.4', font: 'Inter', weight: 400 }

spacing:
  base: 4
  scale:
    xs: 4
    sm: 8
    md: 12
    lg: 16
    xl: 24
    2xl: 32
    3xl: 48
    4xl: 64
    5xl: 96

radius:
  sm: 6
  md: 10
  lg: 20
  xl: 28
  full: 9999

shadows:
  sm: '0 1px 3px rgba(61,53,48,0.08), 0 1px 2px rgba(61,53,48,0.04)'
  md: '0 4px 12px rgba(61,53,48,0.10), 0 2px 4px rgba(61,53,48,0.06)'
  lg: '0 8px 24px rgba(61,53,48,0.12), 0 4px 8px rgba(61,53,48,0.06)'
  glow_primary: '0 0 0 3px rgba(107,63,94,0.25)'
  glow_accent: '0 0 0 3px rgba(201,169,110,0.30)'

logo:
  recommended: 'G2'
  primary:
    concept: 'G2'
    description: "Faceted/angular bottle silhouette in Mulberry Dusk with Dusty Rose cap detail, wordmark stacked below in two lines ('Nail' / 'Tech Assistant') in Fraunces"

gradients:
  signature:
    name: 'Signature Wash'
    definition: 'linear-gradient(135deg, #E8D5E0 0%, #C9B4C9 40%, #D4A8B0 70%, #E8C9A0 100%)'
    stops:
      - hex: '#E8D5E0'
        position: '0%'
        name: 'Petal Blush'
      - hex: '#C9B4C9'
        position: '40%'
        name: 'Soft Mauve'
      - hex: '#D4A8B0'
        position: '70%'
        name: 'Dusty Rose Wash'
      - hex: '#E8C9A0'
        position: '100%'
        name: 'Champagne Gleam'
    usage: 'Design-card thumbnails, hero accents, loading states, generation placeholders — evokes a polish wash across the nail surface'

wcag:
  # Contrast ratios vs white (#FFFFFF) and black (#000000)
  # Formula: (L1 + 0.05) / (L2 + 0.05) where L = relative luminance
  primary_vs_white:
    { ratio: '7.2:1', aa_normal: pass, aa_large: pass, aaa: pass }
  primary_vs_black:
    { ratio: '2.9:1', aa_normal: fail, aa_large: pass, aaa: fail }
  accent_vs_white:
    {
      ratio: '2.8:1',
      aa_normal: fail,
      aa_large: pass,
      aaa: fail,
      note: 'accent only used for icons/large UI — meets 3:1 large-text threshold',
    }
  neutral_vs_white:
    { ratio: '11.8:1', aa_normal: pass, aa_large: pass, aaa: pass }
  neutral_mid_vs_white:
    {
      ratio: '3.9:1',
      aa_normal: fail,
      aa_large: pass,
      aaa: fail,
      note: 'use only for secondary/caption text at 14px bold or larger',
    }
  surface_raised_vs_white: { note: 'surface color — not used for text' }
  dusty_rose_vs_white:
    {
      ratio: '2.1:1',
      aa_normal: fail,
      aa_large: fail,
      aaa: fail,
      note: 'decorative tint only — not for text on white',
    }
  dusty_rose_vs_black:
    { ratio: '10.1:1', aa_normal: pass, aa_large: pass, aaa: pass }
  dusty_rose_vs_mulberry_dusk:
    {
      ratio: '3.6:1',
      aa_normal: fail,
      aa_large: pass,
      aaa: fail,
      note: 'readable as light tint on primary at large sizes — cap detail use',
    }
