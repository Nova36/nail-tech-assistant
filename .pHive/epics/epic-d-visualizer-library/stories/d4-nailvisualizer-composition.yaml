design_decisions:
  - decision: theme prop scaffolded but only "flat" is renderable in v1
    rationale: Don's pivot insurance — theme contract present from day 1; line-art path reserved without bloating v1
  - decision: hand SVG as separate component (handFlat.tsx), not inline in NailVisualizer
    rationale: Swappable asset boundary makes A→C pivot a single import change
  - decision: CSS vars over inline style
    rationale: Brand-tokens already use CSS-var pattern; consistent with existing components
  - decision: image-load failure → visualizer-internal fallback
    rationale: Matches US-D-1 AC #2 (controlled error or fallback state instead of broken layout); avoids requiring callers to handle every render edge

cross_cutting:
  - concern: error-logging
    action: image-load failure in masked <image> logs code+message
  - concern: types-coverage
    action: theme prop union exhaustiveness via assertUnreachable

risks:
  - severity: high
    description: 2D visualizer technically renders but feels cheap (silent-break per outline Risk #5)
    mitigation: snapshot baseline per shape + reviewer visual sanity check + designer wireframe alignment + tablet QA in d5 e2e
  - severity: medium
    description: Tailwind v4 @theme inline literal-breakpoints quirk (per memory reference_app_infra_gotchas.md)
    mitigation: prefer component-scoped CSS or CSS vars over @theme inline expansion

