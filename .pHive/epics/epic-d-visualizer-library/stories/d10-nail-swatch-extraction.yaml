design_decisions:
  - decision: Extraction is best-effort, never blocks generation success
    rationale: Vertex extraction call could fail / time out / cost-cap; the user has already paid the wait for the hand photo, don't fail the design over a polish step
  - decision: Single shared swatch in v1 (5 anchors, 1 swatch)
    rationale: Don's stated v1 goal — "all 5 nails being the same design." Per-nail unique designs deferred to a future story
  - decision: New `nailSwatchStoragePath` field on Generation, not Design
    rationale: Swatch is derived from a specific Generation result; lifecycle is tied to that Generation, not the Design (which can have multiple Generations)
  - decision: Visualizer prop is `nailSwatchUrl` (resolved URL), not storage path
    rationale: Mirrors existing `imageUrl` pattern; resolution stays at the page boundary via swatchUrl.ts helper
  - decision: Fallback to imageUrl when swatch null
    rationale: Legacy data + extraction failures still render *something*. Visual is cheap (d4 behavior) but functional

cross_cutting:
  - concern: error-logging
    action: Vertex / storage / parse failures all log code+message before returning null
  - concern: types-coverage
    action: Generation type extension + converter tests cover null + present cases
  - concern: data-migration
    action: None required — new field is optional, existing docs read as null

risks:
  - severity: high
    description: Vertex Gemini may not reliably produce polish-only PNGs across diverse hand photos (lighting, skin tone, polish opacity)
    mitigation: Spike step gates implementation; if no consistent prompt found, pivot to bbox + sharp crop approach OR escalate to Path A (regenerate as nail-only output instead of post-extraction). Don approves pivot in research review.
  - severity: medium
    description: Extra Vertex call doubles per-design AI cost
    mitigation: Best-effort + can be feature-flagged off if cost spikes. Document expected monthly cost in spike findings.
  - severity: medium
    description: Snapshot regressions on existing d4 baseline
    mitigation: Story explicitly rebaselines snapshots; reviewer eyeballs each shape

