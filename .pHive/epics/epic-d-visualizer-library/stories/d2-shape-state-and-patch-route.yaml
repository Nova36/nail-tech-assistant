id: d2-shape-state-and-patch-route
epic: epic-d-visualizer-library
title: Shape state persistence module + PATCH /api/designs/[id]/shape route
status: pending
complexity: medium
methodology: tdd
depends_on: [d1-nailshape-union-migration]

description: |
  Centralize NailShape persistence behavior in `lib/designs/shape-state.ts` and
  expose a PATCH route at `app/api/designs/[id]/shape/route.ts` so live shape
  switching can persist to Firestore without triggering an AI generation.

  Source: structured-outline.md Slice 5 manifest #8 + #11. PRD FR-D-3.

  No UI surface; the visualizer story (d4/d5) wires this module + route into the
  shape selector. Firestore rule additionally allows authenticated owner to
  PATCH `nail_shape` field only (no other field mutation via this route).

acceptance_criteria:
  - 'Given an authenticated owner of a design, when PATCH /api/designs/[id]/shape with valid shape, then 200 + design.nail_shape persisted | maps to FR-D-3'
  - 'Given an invalid shape value, when PATCH submitted, then 400 with controlled error message and design unchanged | maps to FR-D-2 invalid-shape error condition'
  - 'Given an authenticated user who does not own the design, when PATCH submitted, then 403 (or rules denial path) | maps to NFR security'
  - 'Given the design page reloads after a shape switch, when the workspace mounts, then the previously selected shape is restored from stored state | maps to US-D-2 AC #2 (persistence on reload)'

steps:
  - id: research
    description: Confirm existing route pattern (server action vs route handler) per epic C convention. Confirm Firestore rule pattern for field-scoped PATCH.
    agent: researcher
  - id: test-spec
    description: |
      tests/unit/designs/shape-state.test.ts: assert applyShape({designId, nailShape}) returns updated state, assert invalid shape rejected.
      tests/integration/designs-shape-route.test.ts: vitest @vitest-environment node directive (per reference_jsdom_formdata_node_env.md). Cover happy path, invalid shape, unauthenticated, cross-user denial. Use Firestore + Auth emulators. Mock generation provider — this route must NOT call it.
      tests/integration/rules/designs-shape-rule.test.ts (rules-lane vitest config): cover authenticated owner allow + cross-user deny + non-shape-field deny.

      Tests written against spec only — do not read route implementation first.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Add lib/designs/shape-state.ts: pure `applyShape` validator + Firestore writer wrapper that updates only `nail_shape` + `updatedAt`.
      Add app/api/designs/[id]/shape/route.ts: PATCH handler. Auth gate via getSession(req). Validate body { nailShape: NailShape } using imported union (catches drift if d1 changes). Reject any other body keys.
      Update firestore.rules to allow owner-only PATCH where the diff is exactly { nail_shape, updatedAt }.
      Catch blocks log code+message per feedback_silent_catches_cost_time.md.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: Type-check + lint + unit + integration + rules-lane all pass. Verify route does NOT trigger generation pipeline.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: 'Single commit `feat(d2): shape state module + PATCH route + rule`.'
    agent: developer
    depends_on: [review]

