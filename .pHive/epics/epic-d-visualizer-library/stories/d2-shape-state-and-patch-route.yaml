code_examples:
  - title: Route shape (PATCH input/output contract)
    snippet: |
      // PATCH /api/designs/[id]/shape
      // Input:  { nailShape: NailShape }
      // Output: { status: 'updated', nailShape: NailShape } | { status: 'invalid' | 'unauthorized' | 'not_found', message: string }
  - title: Rule diff-key constraint pattern
    snippet: |
      // request.resource.data.diff(resource.data).affectedKeys()
      //   .hasOnly(['nail_shape', 'updatedAt'])

design_decisions:
  - decision: PATCH route, not server action
    rationale: Outline Slice 5 interfaces specify `PATCH /api/designs/[id]/shape`; client-side fetch keeps shape switch low-overhead and decoupled from React-server-component lifecycle
  - decision: Field-scoped Firestore rule
    rationale: Prevents this PATCH from mutating any other design fields even if route validator drifts

cross_cutting:
  - concern: security-rules
    action: Add rules-lane integration test for shape PATCH
  - concern: jsdom-vs-node
    action: Route handler test uses `@vitest-environment node` directive
  - concern: error-logging
    action: Catch blocks log error code+message for diagnostic trail

risks:
  - severity: medium
    description: Stale shape value desync between client state and Firestore after rapid switching
    mitigation: route returns echoed nailShape; client commits to that value as source of truth post-response

