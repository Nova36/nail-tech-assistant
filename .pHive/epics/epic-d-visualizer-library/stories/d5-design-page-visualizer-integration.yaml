code_examples:
  - title: Success-branch wiring sketch
    snippet: |
      if (state.phase === 'success') {
        const onShapeChange = async (next: NailShape) => {
          const prev = state.nailShape;
          setState({ ...state, nailShape: next });
          const res = await fetch(`/api/designs/${designId}/shape`, {
            method: 'PATCH',
            body: JSON.stringify({ nailShape: next }),
          });
          if (!res.ok) {
            console.error('[design-page] shape patch failed', { code: res.status });
            setState({ ...state, nailShape: prev, error: 'Shape update failed' });
          }
        };
        return (
          <VisualizerFrame>
            <NailVisualizer theme="flat" imageUrl={state.imageUrl} nailShape={state.nailShape} />
            <ShapeSelector value={state.nailShape} onChange={onShapeChange} />
          </VisualizerFrame>
        );
      }

design_decisions:
  - decision: PATCH route over server action for shape switching
    rationale: client-side fetch keeps live switching low-overhead; matches d2 contract
  - decision: theme="flat" hardcoded at integration site
    rationale: v1 ships flat only; theme is a future toggle in user settings or feature-flag, not a design-page knob

cross_cutting:
  - concern: error-logging
    action: PATCH failure logs code+message
  - concern: regression
    action: Playwright snapshot baselines guard FR-D-1 silent-break risk

risks:
  - severity: medium
    description: Snapshot tests flake on font/AA rendering jitter
    mitigation: tune Playwright threshold; allow small pixel diff; baseline regen documented in story
  - severity: medium
    description: Stale state.imageUrl source if Confirm.tsx hydration changes
    mitigation: integration test asserts pass-through

