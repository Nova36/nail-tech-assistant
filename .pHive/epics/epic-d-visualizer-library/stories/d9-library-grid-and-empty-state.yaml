code_examples:
  - title: Card shape
    snippet: |
      type DesignCardProps = {
        design: Design;
        latestImageUrl: string | null;
        onRename: (name: string | null) => Promise<void>;
      };
  - title: Empty state CTA
    snippet: |
      // empty state: "No designs yet — start with /design/new"
      // primary action: <Link href="/design/new">Start a new design</Link>

design_decisions:
  - decision: Server component lists designs (not a list endpoint)
    rationale: Epic A pattern — read in server component via Admin SDK; reduces client surface
  - decision: Thumbnail reuses Confirm.tsx imageUrl pattern
    rationale: Don's lock 2026-05-01 — no new signed-URL helper for v1
  - decision: Inline DesignNameField on card
    rationale: Aligns with FR-D-7 (name later) without forcing a separate edit modal

cross_cutting:
  - concern: security-rules
    action: rules-lane test for /designs list query
  - concern: jsdom-vs-node
    action: any route handler test uses node env
  - concern: error-logging
    action: server-side fetch errors log code+message

risks:
  - severity: medium
    description: Server-component list query loads all designs without pagination
    mitigation: Mother's Day v1 single user, low N — defer pagination; document in story as known v2 work
  - severity: low
    description: Thumbnail imageUrl resolution diverges from Confirm.tsx after future refactor
    mitigation: extract shared lib/designs/imageUrl.ts in this story so both paths share one source

