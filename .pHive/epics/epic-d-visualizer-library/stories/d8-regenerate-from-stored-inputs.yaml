  - file: tests/integration/designs-regenerate-route.test.ts
    change: net-new
  - file: tests/unit/components/RegenerateButton.test.tsx
    change: net-new
  - file: tests/e2e/regenerate-flow.spec.ts
    change: net-new
  - file: firestore.rules
    change: deny direct mutation of latestGenerationId / generations rows from client; only via Admin SDK route (verify; epic C may already cover this)

code_examples:
  - title: Regenerate route shape
    snippet: |
      // POST /api/designs/[id]/regenerate
      // Output success: { status: 'success', generationId }
      // Output failure: { status: 'failure', message }
      //
      // Implementation invariant: provider request payload built ONLY from
      // DesignDetail.{primaryReference, secondaryReferences, prompt, nailShape}.
      // No request body fields from the UI — body is empty (or ignored).
  - title: Stored-inputs invariant test (asserts no UI bleed)
    snippet: |
      // Setup: design has stored prompt='red glitter', UI fetch sends {prompt:'something else'}
      // Assertion: provider mock receives 'red glitter', not 'something else'

design_decisions:
  - decision: regenerate body is empty (or ignored), inputs come from server-loaded DesignDetail
    rationale: prevents UI-state leak into stored-input regeneration; PRD US-D-4 AC #2 guarantee
  - decision: stale-reference fail-fast before provider call
    rationale: PRD US-D-4 AC #3 silent-break risk — never produce a result with degraded inputs
  - decision: reuse lifecycle.persistGenerationStart/Result exactly
    rationale: Epic C's anti-zombie state machine + atomic latestGenerationId already covers FR-D-6

cross_cutting:
  - concern: security-rules
    action: rules-lane test verifies cross-user regenerate denied
  - concern: jsdom-vs-node
    action: route handler test uses node env
  - concern: error-logging
    action: every catch logs code+message
  - concern: provider-isolation
    action: integration test uses MSW mock of Gemini; no live calls
  - concern: rules-lane-parallelism
    action: |
      vitest.config.rules.ts must keep `fileParallelism: false` (already set
      from epic B/C). d8 + d7 may run in parallel after d6; their rules-lane
      tests share the Firestore emulator and will race without this guard.

risks:
  - severity: high
    description: Stored-input invariant silently broken — regenerate uses any current UI state field
    mitigation: integration test explicitly differs UI state from stored state and asserts provider sees stored only
  - severity: medium
    description: Concurrency — double-click regenerates twice, both succeed, latestGenerationId race
    mitigation: Firestore-transaction-level guard or persistGenerationStart conflict handling; test the chosen path

references:
  - path: .pHive/planning/structured-outline.md
    relevant_excerpt: |
      Slice 6 manifest #5 regenerate route. Interface regenerateDesign(designId).
      Silent-break risk: regenerate may appear to work while using incomplete or mutated input lineage.
  - path: lib/designs/lifecycle.ts
    relevant_excerpt: |
      [persistGenerationResult atomically updates latestGenerationId in a Firestore transaction; reuse intact]
  - path: .pHive/specialist-phases/security-plan-audit/epic-d-visualizer-library/audit-report.md
    relevant_excerpt: |
      d8 writes via Admin SDK; bypasses Firestore rules in production.
      Existing /generations/{id} baseline rules already cover client-SDK
      behaviors. d8 needs NO rule edit. Owner field is `userId`.
