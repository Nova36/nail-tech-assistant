code_examples:
  - title: Save route I/O
    snippet: |
      // POST /api/designs/[id]/save
      // Input:  { name?: string | null }   // null or '' clears name
      // Output: { status: 'saved', designId, name: string | null }
      //       | { status: 'invalid' | 'unauthorized' | 'not_found', message }

design_decisions:
  - decision: 80-char name limit
    rationale: Single-user gift app; reasonable default; bumpable later
  - decision: Empty string = unnamed
    rationale: Library card shows unnamed-state for empty name; null and '' both unnamed
  - decision: Field-scoped Firestore rule
    rationale: prevents drift of non-name fields via this route

cross_cutting:
  - concern: security-rules
    action: rules-lane test for save route
  - concern: jsdom-vs-node
    action: integration test uses node env
  - concern: error-logging
    action: catches log code+message
  - concern: rules-lane-parallelism
    action: |
      vitest.config.rules.ts must keep `fileParallelism: false` (already set
      from epic B/C). d7 + d8 may run in parallel after d6; their rules-lane
      tests share the Firestore emulator and will race without this guard.
      Verify config in research step before authoring rules-lane tests.

risks:
  - severity: low
    description: Optimistic UI desyncs with server on slow 3G
    mitigation: revert on failure + surface error inline

references:
  - path: .pHive/planning/structured-outline.md
    relevant_excerpt: |
      Slice 6 manifest #4 save route, #8 DesignNameField. Interface saveDesign(designId, name?).
      Validation: naming optional, can be added later.
