id: d7-design-rename
epic: epic-d-visualizer-library
title: Inline design naming + POST /api/designs/[id]/save (rename)
status: pending
complexity: low
methodology: tdd
depends_on: [d6-design-detail-loader-and-reopen]

description: |
  Allow renaming a saved design via inline naming UI + POST route. Designs auto-create as drafts in Epic C (createDesign server action), so this story is rename-only — no separate "save" action needed.

  Naming is optional: a design can exist unnamed in /library and be named later (FR-D-7). Empty name = unnamed.

  Source: structured-outline.md Slice 6 manifest #4, #8. Interface saveDesign(designId, name?). PRD FR-D-4, FR-D-7, US-D-3 AC #2.

acceptance_criteria:
  - 'Given a saved design, when POST /api/designs/[id]/save with { name }, then design.name persisted and 200 returned | maps to FR-D-4'
  - 'Given a saved design without a name, when /library renders, then the card shows an unnamed-state placeholder + inline naming affordance | maps to FR-D-7, US-D-3 AC #2'
  - 'Given an unnamed design, when the user enters a name and submits, then design.name persists; on /library reload AND on /design/[id] reopen, the new name displays in both surfaces | maps to FR-D-7, FR-D-8 (unnamed→named round-trip)'
  - 'Given a name longer than the configured limit (e.g., 80 chars), when POST submitted, then 400 with controlled error | input validation'
  - 'Given an authenticated user who does not own the design, when POST submitted, then 403 / rules denial | NFR security'
  - 'Given a renamed design, when reopened, then the new name displays in /design/[id] header (or wherever names render) | maps to FR-D-8'

steps:
  - id: research
    description: Confirm whether designs schema currently has a `name` field (research-brief Q2 said schema is rich enough for regenerate, but verify name field). If absent, this story adds it.
    agent: researcher
  - id: ui-design
    description: |
      Read .pHive/wireframes/epic-d-visualizer-library/library-grid.html + reopened-design.html — confirm wireframe_approval=approved. Verify naming affordance treatment (inline text input, edit-pencil icon for named state, etc.) matches the wireframe.
    agent: ui-designer
    depends_on: [research]
  - id: test-spec
    description: |
      tests/integration/designs-save-route.test.ts (`@vitest-environment node`): owner can rename happy path; empty name allowed (unnamed); >80 char rejected; cross-user denied; non-existent design 404.

      tests/unit/design-page/DesignNameField.test.tsx: renders unnamed placeholder, accepts input, posts on blur or explicit save action, optimistic update + revert on failure.

      tests/integration/rules/designs-save-rule.test.ts (rules-lane): owner-only write on `name` field; deny mutation of any other field via this route.
    agent: tester
    depends_on: [ui-design]
  - id: implement
    description: |
      Add app/api/designs/[id]/save/route.ts POST handler. Validate body { name?: string | null }, max 80 chars (or as approved at design discussion). Auth gate. Persist via Firestore Admin with field-scoped write.

      Add components/DesignNameField.tsx — controlled input, optimistic update, error revert.

      Update designs converter if `name` field is missing from schema (research step confirms).

      Update firestore.rules for /designs/{id} write to allow `name` + `updatedAt` only via this route's path pattern (or rely on field-diff hasOnly).

      Catch blocks log code+message.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: Tests pass. Reviewer renames a seeded design end-to-end and confirms it persists across reload.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: 'Single commit `feat(d7): design rename UI + POST /save route`.'
    agent: developer
    depends_on: [review]

context:
  codebase: /Users/don/Documents/GitHub/Nail Tech Assitant
  branch: epic-d/visualizer-library
  tech_stack:
