  - file: firestore.rules
    change: scope `name`+`updatedAt` write via save route's diff
  - file: tests/integration/designs-save-route.test.ts
    change: net-new
  - file: tests/unit/design-page/DesignNameField.test.tsx
    change: net-new
  - file: tests/integration/rules/designs-save-rule.test.ts
