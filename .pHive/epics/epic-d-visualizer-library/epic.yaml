design_decisions:
  - id: dd-d-1
    topic: 'NailShape canonical union — 6 shapes'
    rationale: |
      `'almond' | 'coffin' | 'square' | 'round' | 'oval' | 'stiletto'`. Don
      picked union over PRD canonical 4 to keep both PRD shapes (almond,
      coffin, square, stiletto) and existing scaffold shapes (round, oval).
      No data loss, full common-nail-shape coverage. Decided 2026-05-01.
  - id: dd-d-2
    topic: 'Aesthetic v1 = Option A (flat-illustrated SVG hand)'
    rationale: |
      Designer-presented options A/B/C; B (photo composite) flagged as a trap
      in 9 days. Don picked A for deadline safety. C (line-art sketch) is
      pivot path via theme="line-art" prop — scaffolded in d4 (~4-6h pivot
      cost post-v1). Decided 2026-05-01.
  - id: dd-d-3
    topic: 'Skin tone = neutral stylized silhouette'
    rationale: |
      Single-user gift app; gift recipient is one specific person. Multi-tone
      parameterization deferred to v2. Decided 2026-05-01.
  - id: dd-d-4
    topic: 'Thumbnail strategy reuses Confirm.tsx imageUrl pattern'
    rationale: |
      No new signed-URL helper for v1. d9 research step extracts the existing
      Confirm.tsx pattern into a shared helper if not already shared.
      Decided 2026-05-01.
  - id: dd-d-5
    topic: 'ShapeSelector stays at components/studio/'
    rationale: |
      Outline manifest places it under components/NailVisualizer/, but the
      component already exists working in the wizard at components/studio/.
      NailVisualizer imports from there — zero churn. Decided 2026-05-01.
  - id: dd-d-6
    topic: 'Card thumbnail = mini visualizer render, not raw flat image'
    rationale: |
      Designer pick — reinforces "five-nail preview" identity throughout app
      and distinguishes library from generic image grid. Fallback to raw
      image if visualizer render is unavailable at save time. Captured in
      wireframe manifest dd-1.
  - id: dd-d-7
    topic: 'Right rail in reopened state is read-only for prompt + refs'
    rationale: |
      Editing prompt or refs after reopen would break regenerate semantics
      (FR-D-5: regenerate uses stored inputs, not transient UI state).
      Editing starts a new design via /design/new. Captured in wireframe
      manifest dd-5.
  - id: dd-d-8
    topic: 'Regenerate failure preserves prior image + lineage'
    rationale: |
      On failure, prior generation displays at reduced opacity; latest_
      generation_id NOT updated; old generations row preserved. Aligns with
      FR-D-6 lineage preservation. Captured in wireframe manifest dd-3.
  - id: dd-d-9
    topic: 'Nails-as-focal-point reframe — visualizer drops the hand entirely'
    rationale: |
      Don's call 2026-05-01 after seeing the original wireframes: hand
      silhouette is irrelevant scaffolding; nails are the product. New
      visualizer stage = 5 large fan-arranged nail anchors (~200×280 user
      units each) in a 1280×540 viewBox. No painted hand, no finger stubs.
      Each nail large enough to read brushstroke detail at tablet viewing
      distance. Library cards become tiles of nail design rather than tiny
      hands with tiny nails. theme=line-art pivot drops to ~2-4h (no hand
      asset to redraw).
      Canonical assets at .pHive/wireframes/NailVisualizer/{stage.svg,
      stage-line-art.svg, shapes/*.svg, preview.html} — produced by Claude
      Design + approved by Don. d3 copies shapes/, d4 copies stage assets.

