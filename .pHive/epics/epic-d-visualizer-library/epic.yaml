name: epic-d-visualizer-library
title: 'Epic D — Visualizer + Library: five-nail visualizer with shape switching, design library, save/reopen/regenerate from stored inputs (Slices 5+6)'
description: |
  Slices 5 and 6 of the Nail Tech Assistant build, the moment "image from AI"
  becomes "design on a hand." Epic C produced raw generated images masked into
  flat preview; Epic D refines that into the actual product visualization on
  five nails with live shape switching, persists designs into a personal
  library, supports reopen and rename, and runs regenerate from the stored
  design inputs (never the transient UI state).

  Flow: generated design → mask one image across five-nail hand layout → live
  shape switch (almond/coffin/square/round/oval/stiletto, 6-shape canonical
  union per Don's call 2026-05-01) → save design → /library grid browse →
  reopen → regenerate from same stored inputs.

  In scope: NailVisualizer composition + theme="flat" rendering (Option A —
  flat-illustrated SVG hand) with theme-prop scaffold for future C pivot;
  ShapeSelector wired to PATCH /api/designs/[id]/shape route + persistence;
  6 nail-tip mask SVG assets; /design/[id] visualizer integration with
  shape-switch e2e + per-shape Playwright snapshot baselines; GET design
  loader with reopen hydration; inline naming + POST /save (rename); POST
  /regenerate from stored inputs; /library grid + DesignLibrary + DesignCard
  + empty state. Each route gets a Firestore Security Rules update + rules-lane
  integration test.

  Out of scope: chat refinement (Slice 7, P1, Epic E). Final polish + setup
  docs + tablet UX hardening (Slice 8, Epic F). Per-nail variation, 3D
  rendering, presentation mode (deferred to v2 per kickoff #12). Multi-skin
  -tone visualizer (single-user gift; neutral silhouette v1 per Don's call
  2026-05-01). Theme="line-art" implementation (scaffolded in d4, asset
  deferred to post-v1 pivot).

  Sign-off anchors: PRD US-D-1..4, FR-D-1..8. PRD lines 491-590. Structured
  outline lines 323-418. Vertical plan lines 219-275. Mother's Day 2026-05-10
  deadline (9 days from epic-d kickoff 2026-05-01). Brand-system locked at
  .pHive/brand/brand-system.yaml — no creative palette/typography decisions
  in this epic.

