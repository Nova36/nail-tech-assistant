      with latency table (5+ reference types), sample req/res, SDK lock
      (firebase/ai vs @google/generative-ai vs Vertex AI), sync-vs-route
      recommendation, GO/NO-GO. c13/c14 reference the artifact's SDK pick.
  - trigger: security:plan-audit
    severity: major
    placement: pre-exec
    target_stories: [c4-firestore-storage-rules, c5-server-storage-helper]
    raised_by: tpm
    raised_at: '2026-04-29T15:51:00Z'
    reason: |
      Greenfield Storage in repo — no storage.rules, no emulator wiring, no
      getStorage() callers. Three new Firestore collections also greenfield.
      Default-deny posture must be preserved across all paths; cross-user
      access must be denied by path-derived `request.auth.uid == userId`
      rules.
    satisfied_by: |
      c4 writes per-collection + per-path allow/deny matrix tests using
      @firebase/rules-unit-testing FIRST (TDD red), implements rules to pass.
      Tests cover: owner allow, non-owner deny, unauth deny, cross-user UID
      mismatch deny, default-deny on undeclared paths.
  - trigger: data-model:contract-stability
    severity: major
    placement: pre-exec
    target_stories:
      [
        c3-data-model-types-converters,
        c6-pinterest-ingest,
        c7-upload-ingest-route,
        c10-create-design-action,
        c15-generation-lifecycle-state-machine,
        c16-generate-design-surface,
        c17-generation-ui,
      ]
    raised_by: tpm
    raised_at: '2026-04-29T15:51:00Z'
    reason: |
      Reference / Design / Generation are the durable contracts that c6–c17
      depend on. Locking them WRONG (e.g. subcollection vs array for ordered
      secondary refs) creates compounding rework. Locking them RIGHT lets
      every downstream story write tests against stable shapes.
    satisfied_by: |
      c3 locks: Design.secondaryReferenceIds: string[] (ordered array, NOT
      subcollection per design-discussion-q3 + research-brief-q4); Reference
      with `source: 'pinterest' | 'upload'` + `storagePath` + nullable
      `pinterestPinId`; Generation with `status: 'pending' | 'success' |
      'failure'` + nullable `resultStoragePath` + nullable `errorCode`.
      Converters are pure (no side effects), exhaustively unit-tested.
  - trigger: persistence:consistency
    severity: major
    placement: pre-exec
    target_stories:
      [
        c5-server-storage-helper,
        c6-pinterest-ingest,
        c7-upload-ingest-route,
        c14-gemini-request-retry,
        c15-generation-lifecycle-state-machine,
        c16-generate-design-surface,
      ]
    raised_by: tpm
    raised_at: '2026-04-29T15:51:00Z'
    reason: |
      FR-C-9 anti-zombie: provider success followed by storage write failure
      must NOT leave row in `pending`. The risk is a real category, not
      hypothetical — storage SDK calls and Firestore SDK calls are independent
      network operations. Mitigation must be in the lifecycle module itself,
      not relied-upon at the call site.
    satisfied_by: |
      c15 implements two-write pattern: persistGenerationStart writes
      `pending` BEFORE provider call; persistGenerationResult writes
      `success`|`failure` AFTER provider returns AND output bytes confirmed
      written. Failure of storage-after-success transitions to `failure` with
      classified errorCode. Integration test in c15 explicitly fails the
      storage write to assert the failure transition.
  - trigger: api:surface-boundary
    severity: moderate
    placement: pre-exec
    target_stories:
      [
        c7-upload-ingest-route,
        c9-select-pin-action,
        c10-create-design-action,
        c16-generate-design-surface,
      ]
    raised_by: tpm
    raised_at: '2026-04-29T15:51:00Z'
    reason: |
      Outline names BOTH server actions and route handlers for the same
      lifecycle steps. Repo prior art (loginAction, loadMoreBoards) uses
      server actions; route handlers exist only for /api/auth/session +
      /api/health. Lifecycle drift would emerge if both transports are kept
      "primary".
    satisfied_by: |
      c9/c10/c16 use server actions only with loginAction-style discriminated
      envelope `{ status: 'success'; data } | { status: 'rejected'; reason;
      message }`. c7 multipart route handler is the documented exception
      (multipart streaming requires Node Buffer access). Other route handlers
      from outline manifest NOT created. Decision cited in c9 + c7 design_decisions.
  - trigger: ui:major
