  rationale: |
    c1–c17 satisfies US-C-1..US-C-5 + FR-C-1..FR-C-10 in full. c18 (next.config
    image-host allowance) is cuttable per c18 design_decisions — c17 falls back
    to `<img unoptimized>` if Mother's Day 2026-05-10 pressure hits. c1 spike
    is the hard gate — if NO-GO, the epic pauses for provider swap before
    c13/c14 implementation (lib/ai/provider.ts boundary keeps c3–c12 + c15–c17
    unchanged). Slice 7 (chat refinement) explicitly excluded per outline P0/P1
    split.

