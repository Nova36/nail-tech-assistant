quality_gates:
  typecheck: required
  lint: required
  unit_tests: required
  rules_tests: required # @firebase/rules-unit-testing on c4 — firestore.rules + storage.rules per-collection allow/deny matrix
  e2e_tests: recommended
  spike_decision_artifact: required # c1 — .pHive/epics/epic-c-reference-and-generation/docs/spike-gemini-sdk.md GO/NO-GO + SDK lock

acceptance_at_epic_completion: |
  - PRD US-C-1: From `/design/new`, the user can choose one Pinterest pin as
    primary, add additional Pinterest pins and/or uploaded photos as ordered
    secondary references, and see the assembled set in one reference panel.
    Both sources land as the same `Reference` shape in Firestore.
  - PRD US-C-2: The optional prompt is preserved as a first-class input on the
    durable `Design` record and is passed through to `buildGeminiRequest(...)`.
  - PRD US-C-3: A durable `Design` record exists before generation, owned by
    the authenticated user, with primary reference, ordered secondary refs,
    optional prompt, and selected nail shape. Security Rules deny cross-user
    reads/writes.
  - PRD US-C-4: Pressing generate runs a `pending` → `success`|`failure`
    lifecycle. `success` persists the output image to Firebase Cloud Storage
    and updates `Design.latestGenerationId`. `failure` classifies the error
    code (`refusal` | `rate_limit` | `network` | `unknown`) with one silent
    auto-retry on transient codes only.
  - PRD US-C-5: Raw generated image is viewable from a `GenerationPreview`
    component without the visualizer. Failures present `GenerationErrorState`
    with adjust-inputs CTA.
  - FR-C-9: Storage failure after provider success transitions the row to
    `failure`, never `pending`. Verified by integration test.
  - Quality gates: typecheck + lint + unit tests + rules tests pass. E2E
    happy + guided-failure flows pass (recommended).
  - c1 spike artifact records GO/NO-GO + SDK lock; if NO-GO, provider boundary
    swap (FLUX.1-kontext or `gpt-image-1`) does not require story re-decomposition.

dependencies_external:
  - Gemini API key (or provider-equivalent per c1 SDK lock) — user-owned
    prerequisite, configured in Vercel env + local `.env.local` via the
    `feedback_secret_rotation_no_releak` script pattern (never through chat).
  - Firebase Cloud Storage bucket region selection — user-owned, before c4.
  - Pinterest static token (inherited from Epic B; still valid).

risks_applicable:
  - 'Risk #2: Gemini reference-edit quality below "stylized-but-recognizable" bar — addressed by c1 spike GO/NO-GO gate before c6+ implementation; provider boundary at lib/ai/generate.ts protects swap'
  - 'Risk: Firebase AI Logic web SDK does not run cleanly on Next.js Node runtime — addressed by c1 spike SDK lock recommendation (architect preference @google/generative-ai)'
  - 'Risk: zombie generation rows (pending forever after provider success + storage failure) — addressed by two-write lifecycle (persistGenerationStart + persistGenerationResult) + integration test asserting failure transition (FR-C-9)'
  - 'Risk: Pinterest + upload reference shapes drift into incompatible records — addressed by c3 single Reference contract + shared ingest module in c6'
  - 'Risk: storage rules permit too much / break legit uploads (greenfield in repo) — addressed by c4 per-path allow/deny matrix using @firebase/rules-unit-testing'
  - 'Risk: secret leak through chat during Gemini key provisioning — addressed by feedback_secret_rotation_no_releak local-script pattern referenced in c1 dependencies_external'

