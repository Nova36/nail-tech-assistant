name: epic-c-reference-and-generation
title: 'Reference Collection + AI Generation Pipeline — normalized references model, durable design drafts, Gemini 2.5 Flash Image generation lifecycle (Slices 3+4)'
description: |
  Slices 3 and 4 of the Nail Tech Assistant build, sequenced after Epic B's
  Pinterest browse shipped. The first epic to actually do the thing the product
  is named after: take a user's inspiration, hand it to a generative model, and
  produce a candidate nail design they can save.

  Flow: reference assembly (Pinterest pins + uploads) → optional prompt + nail
  shape → durable design draft → multimodal generation → raw image preview or
  guided failure. First time Firebase Cloud Storage and three new Firestore
  collections (`references`, `designs`, `generations`) light up outside
  `profiles`. First time the app integrates a generation provider.

  In scope: `/design/new` workspace, normalized `references` records (Pinterest
  + upload sources), durable `designs` records, `generations` lifecycle that
  cannot get stuck in `pending`, generation provider boundary at
  `lib/ai/generate.ts`, MSW test harness, Firebase Cloud Storage helper +
  rules, Firestore + Storage rules tests, Slice-1 Gemini quality spike.

  Out of scope: visualizer (Slice 5), shape-aware compositing, design library /
  reopen / regenerate (Slice 6), chat refinement (Slice 7, P1). Brand locked
  at `.pHive/brand/brand-system.yaml` — no creative palette / typography /
  naming choices in this epic.

  Sign-off anchors: PRD US-C-1 (mixed-source reference assembly), US-C-2
  (optional prompt as first-class input), US-C-3 (durable design draft), US-C-4
  (generate nail-design image), US-C-5 (raw result or guided failure).
  FR-C-1..FR-C-10. Risk #2 (Gemini quality) gated by Slice-1 spike (c1).
  Mother's Day 2026-05-10 deadline shapes scope discipline — Slice 7 already
  cuttable per outline; this epic does not touch it.

