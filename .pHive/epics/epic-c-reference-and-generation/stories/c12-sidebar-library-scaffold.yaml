  - severity: low
    description: "Future Library iteration (Epic D) reads this story's placeholder and copies the layout, missing the dynamic Firestore query"
    mitigation: 'Comment in placeholder file: `// Epic C placeholder. Epic D replaces with real designs grid (firestore query + grid render).` Hard-to-miss for the future implementer.'
  - severity: low
