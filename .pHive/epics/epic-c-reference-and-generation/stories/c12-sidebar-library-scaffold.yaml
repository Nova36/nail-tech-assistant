description: |
  Sidebar navigation scaffold + `/library` empty-state placeholder. The
  smallest UI story in batch 2. Two-part delivery:

  1. **Sidebar nav** — Add 2 entries to the existing authenticated
     sidebar (`app/(authenticated)/layout.tsx` or wherever the sidebar
     lives per Epic A): "New Design" (linking to `/design/new`) and
     "Library" (linking to `/library`). Dashboard entry (`/`) stays
     untouched. NO Pinterest entry — option B locked.

  2. **`/library` empty-state placeholder** — `app/(authenticated)/library/
     page.tsx` renders a placeholder with copy like "Your saved designs
     will appear here. Start a new design to begin." with a CTA button
     linking to `/design/new`. This is NOT the real Library; full Library
     (grid of saved designs, search, rename, regenerate) is Epic D scope.

  The placeholder route exists in c12 because:

  - Sidebar entry "Library" needs a destination (404 is bad UX even if
    Library is empty).
  - Establishing the route now means Epic D doesn't need to negotiate the
    URL or sidebar surface — those are settled.
  - The empty-state copy + CTA reinforces the v1 single-flow narrative:
    user creates a design, eventually views it in Library.

  The "Pinterest unsurfaced from sidebar" decision is locked in
  design_decisions so future Library/Studio iterations don't accidentally
  re-add it. `/pinterest` and `/pinterest/[boardId]` continue to work by
  direct URL; they're useful as developer/admin reachability paths but
  not surfaced as user destinations.

  Out of scope: full Library grid (Epic D), design detail page (Epic D),
  inline rename (Epic D), search/filter (Epic D), saved-design viewer
  (Epic D + Slice 5/6 visualizer).

acceptance_criteria:
  - 'Given an authenticated user is in the app shell, when the sidebar renders, then it shows exactly 2 NEW entries (in addition to whatever existed pre-Epic-C): "New Design" → `/design/new`, "Library" → `/library`.'
  - 'Given the sidebar renders, when inspected, then NO "Pinterest" top-level entry is present (option B locked). Reviewer manually verifies.'
  - 'Given the user is on `/design/new`, when the sidebar renders, then "New Design" entry shows the active state class (matches Epic A pattern).'
  - 'Given the user is on `/library`, when the sidebar renders, then "Library" entry shows the active state class.'
  - 'Given the user navigates directly to `/pinterest`, when the page loads, then it still works (reachable by URL) — c12 does NOT remove the route; only un-surfaces it from sidebar.'
  - 'Given the user navigates to `/library`, when the page renders, then it shows a placeholder: heading "Your library is empty" (or wireframe-locked copy), description "Saved designs will appear here. Start a new design to begin.", and a CTA button "New Design" linking to `/design/new`.'
  - 'Given the placeholder renders, when inspected, then it does NOT fetch any Firestore data — no `designs` query runs, no Storage reads. It is a static empty-state.'
  - 'Given screen-reader use, when navigating the sidebar, then both new entries are reachable by keyboard with appropriate `aria-current="page"` on the active route.'
  - 'Given the page is loaded on a tablet-landscape viewport, when sidebar renders, then it adapts per existing Epic A layout convention (no new responsive breakpoints introduced by c12).'
  - 'Given the placeholder renders, when inspected, then it includes a brand-tokens-locked illustration or icon (per wireframe brief decision) — NOT a generic "404"-style empty page.'
  - 'Given grep across `app/**` and `components/**`, when searching for Pinterest sidebar entries, then no occurrence found (e.g., no `<SidebarLink href="/pinterest">`). Reviewer manual.'

steps:
  - id: research
    description: |
      Max 2 focused questions:
      (1) Sidebar location — read the existing
      `app/(authenticated)/layout.tsx` and any sidebar component to
      confirm the layout file. Epic A established this; c12 modifies it.
      Identify the exact sidebar component (`components/AppShell.tsx` or
      similar) and its existing entries.
      (2) Active-state pattern — how does the existing sidebar mark the
      active route? `usePathname()` from `next/navigation` is canonical.
      Read existing implementation to mirror.

      Read .pHive/planning/horizontal-plan.md Feature UI section for
      the sidebar nav references.

      Memory anchor: `reference_app_infra_gotchas` notes "app shell
      needs h-screen + overflow-y-auto for sidebar pinning" — already
      in place from Epic A; c12 inherits. Do not modify shell layout.
    agent: researcher
  - id: ui-design
    description: |
      COMPLETE — Touchpoint 1 APPROVED 2026-04-29 by Don.

      Canonical artifact: `.pHive/wireframes/epic-c-reference-and-generation/c12-sidebar-library-scaffold/wireframe.html` (663 lines).

      The implement step takes wireframe.html as the AUTHORITATIVE visual +
      interaction source — including:
      - Sidebar three-entry order: Dashboard · New Design · Library.
        Iconography per Frame 01 (small SVG glyphs matching Epic A vocabulary).
      - Active state pattern (`aria-current="page"` + brand-locked accent).
      - /library empty-state per Frame 02 — heading + description + primary
        CTA "New Design" → /design/new. No populated list.
      - Mobile reflow per Frame 03.
      - Brand tokens (`--primary: #6b3f5e`, etc.) per wireframe `<style>` block.

      No deviation from the approved wireframe without TPM + Don sign-off.
    agent: ui-designer
    depends_on: [research]
  - id: test-spec
    description: |
      Write failing tests BEFORE implementation. Small UI surface = small
      test surface.

      AUTHORITATIVE VISUAL SOURCE:
      - .pHive/design/briefs/sidebar-library-scaffold.md (+ approved HTML)

      - tests/unit/layout/Sidebar.test.tsx —
        (1) Sidebar renders pre-existing Epic A entries (e.g., Dashboard)
            UNCHANGED — assert by their text content
        (2) Sidebar renders NEW "New Design" entry with href="/design/new"
        (3) Sidebar renders NEW "Library" entry with href="/library"
        (4) Sidebar does NOT render any "Pinterest" entry — assert by
            queryByText (must return null)
        (5) Mock pathname `/design/new` → "New Design" entry has
            `aria-current="page"` AND active-state class
        (6) Mock pathname `/library` → "Library" entry has aria-current
        (7) Mock pathname `/pinterest` → neither new entry is active
            (the existing Epic A logic handles `/` Dashboard active state;
            c12 doesn''t change that)

      - tests/unit/library/page.test.tsx —
        (8) `/library` page renders heading, description, CTA button
        (9) CTA button links to `/design/new`
        (10) Page does NOT call any data-fetching function — assert by
             checking for `designs` collection or fetch import absence
             (best-effort grep)

      - tests/integration/library/page-direct-load.test.tsx —
        (11) Authenticated user navigates to `/library` → renders
             placeholder
        (12) Unauthenticated user navigates to `/library` → middleware
             redirects to login (Epic A baseline; c12 inherits)

      DO NOT write tests for sidebar collapse/expand behavior (Epic A
      baseline). DO NOT write tests for Library data fetching (Epic D).
    agent: tester
    depends_on: [ui-design]
  - id: implement
    description: |
      Make failing tests pass. Two file deltas: extend sidebar, create
      library placeholder.

      1. Identify the sidebar component file via research step. Likely
         `app/(authenticated)/layout.tsx` or `components/AppShell.tsx`
         or `components/Sidebar.tsx`. EXTEND it additively:
         - Add NEW entries: "New Design" and "Library"
         - Use the existing entry pattern (probably a
           `<SidebarLink href={...}>` or similar abstraction)
         - Use `usePathname()` for active-state per the existing pattern
         - Iconography per wireframe brief (likely a small SVG or
           lucide-react if Epic A added that; otherwise inline SVG)
         - DO NOT add a Pinterest entry. DO NOT modify Dashboard entry.

         If the sidebar is currently a server component reading the
         session, the active-state lookup might happen via a small
         client wrapper. Mirror Epic A pattern.

      2. Create `app/(authenticated)/library/page.tsx`:
         ```tsx
         export const runtime = 'nodejs';
         export const dynamic = 'force-static'; // pure static placeholder

         export default function LibraryPlaceholderPage() {
           return (
             <main className="...brand-tokens-locked-classes...">
               <div className="...">
                 {/* Optional brand glyph / illustration per wireframe */}
                 <h1 className="...">Your library is empty</h1>
                 <p className="...">
                   Saved designs will appear here. Start a new design to
                   begin.
                 </p>
                 <Link href="/design/new" className="...primary-cta...">
                   New Design
                 </Link>
               </div>
             </main>
           );
         }
         ```

      3. NO `loading.tsx`, NO `error.tsx` for `/library` — placeholder is
         static, no async work to fail.

      4. NO Firestore queries, NO Admin SDK imports. Pure presentational.

      DO NOT: modify `app/(authenticated)/pinterest/*` (those routes
      stay; they are just unsurfaced from sidebar).
      DO NOT: build Library data fetching (Epic D).
      DO NOT: build design detail page, regenerate, save-to-library.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the scope-boundary lock holds and the placeholder is truly
      a placeholder.

      - Sidebar has exactly 2 NEW entries: "New Design" + "Library".
        Reviewer manual diff against Epic A baseline.
      - NO Pinterest entry. Reviewer grep for `pinterest` in sidebar
        component returns 0 hits (case-insensitive).
      - `usePathname()` drives active state on both new entries.
      - `/library/page.tsx` is presentational — no firebase-admin
        imports, no `getFirestore` calls, no fetch calls. Reviewer grep.
      - CTA button links to `/design/new`.
      - Existing `/pinterest` and `/pinterest/[boardId]` routes still
        work — reviewer manually loads them in `pnpm dev`.
      - Existing Dashboard sidebar entry untouched. Reviewer manual diff.
      - Brand tokens used (no hardcoded colors).
      - All vitest tests pass.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c12-sidebar-library-scaffold`.
      Commit: `feat(c12): sidebar New Design + Library entries + library empty-state placeholder`.
      Pre-commit: `pnpm test`, `pnpm typecheck`, `pnpm lint` must pass.
    agent: integrator
    depends_on: [review]

