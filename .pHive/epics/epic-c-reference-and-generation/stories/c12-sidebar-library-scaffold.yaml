design_decisions:
  - decision: 'Sidebar gets EXACTLY 2 new entries — "New Design" + "Library" — NO Pinterest top-level entry (option B locked by user)'
    rationale: |
      User decision: Pinterest is a tactical pin source, not a destination.
      Surfacing it as a top-level sidebar entry would imply it''s a
      separate workflow when actually pin selection lives embedded
      inside Studio (c11 EmbeddedPinterestPanel). Locked here so future
      Library / Studio iterations don''t accidentally re-add it.
      `/pinterest/*` routes stay live for direct URL access (developer
      reachability + future "open in browse" link from a saved design
      in Epic D).
  - decision: '/library renders empty-state placeholder ONLY — full Library is Epic D'
    rationale: |
      ui:scope-boundary escalation. Library grid (saved designs,
      thumbnails, rename, regenerate, search, filter) is Slice 6 +
      Epic D scope. Placeholder ships in c12 to (a) give the sidebar
      "Library" entry a real destination, (b) reinforce the v1
      narrative ("you''ll see saved designs here"), (c) settle the URL
      so Epic D doesn''t need to renegotiate.
  - decision: 'Placeholder is purely presentational — NO Firestore queries'
    rationale: |
      Defense in depth: a placeholder that queries Firestore and gets
      empty results LOOKS the same as a static placeholder, but
      consumes quota + introduces latency + adds a failure surface.
      Static is strictly better for v1. Epic D replaces this page with
      the real Library when designs exist to show.
  - decision: 'Wireframe Touchpoint 1 still required even though delta is small'
    rationale: |
      ui:major escalation applies. Sidebar additions touch the chrome
      Don sees on every page; getting the iconography + active state +
      empty-state copy wrong is visible. Three renditions per protocol;
      iteration is fast since the surface is small.
  - decision: 'Existing Dashboard (/) sidebar entry UNCHANGED'
    rationale: |
      Epic A locked Dashboard placement + active state. c12 is purely
      additive. Modifying Dashboard placement would invite drift across
      epics.
  - decision: '`/pinterest/*` routes preserved (just unsurfaced)'
    rationale: |
      Removing routes would break Epic B test fixtures + remove
      developer reachability + remove the future "open original pin"
      link from saved designs in Epic D. Unsurfacing is sufficient — the
      cost of preservation is zero (routes already work; we''re just not
      pointing at them from the sidebar).
  - decision: '`runtime = "nodejs"` + `dynamic = "force-static"` on /library page'
    rationale: |
      No dynamic data; static rendering is fine. Force-static avoids
      accidental opt-in to per-request rendering.

cross_cutting:
