design_decisions:
  - decision: 'Pre-invoke `pending` write — `persistGenerationStart` writes BEFORE the provider call'
    rationale: 'Architect mandate (persistence:consistency escalation). Pre-write ensures (a) c4 firestore.rules deny unauthorized attempts cheaply (no provider tokens wasted on unauthorized requests), (b) the row exists for c15 to update terminally regardless of provider outcome, (c) telemetry can count attempts that never reached the provider (rules_denied + design_not_found).'
  - decision: 'Transactional coupling: generations.status = "success" + designs.latestGenerationId atomic'
    rationale: 'persistence:consistency. Without the transaction, a successful generation could be written but designs.latestGenerationId could lag (or vice versa) → c10 / Epic D library code reads stale state. Firestore txn is the only Admin SDK path that gives atomicity across docs.'
  - decision: 'Storage-fail-after-provider-success → terminal `failure`, NEVER stuck `pending` (FR-C-9)'
    rationale: 'The most damaging silent-break risk in the epic — a `pending` row that never resolves blocks the user''s next attempt forever (UI in c17 may treat pending as "still trying"). Terminal failure with explicit errorCode lets the user retry with adjust-inputs CTA. Test (10)-(12) prove the invariant.'
  - decision: 'Storage-fail rescue update is best-effort (try/catch around the rescue update; logs but does not retry)'
    rationale: "If the rescue update itself fails (e.g., Firestore quota exhausted at the same instant), there's no good third path. Logging gives an operator a chance to manually fix the row. Acceptable residual — the rescue update is independent of the original Storage failure, so the conditional probability of both failing is very low."
  - decision: 'Concurrent generations from same user + design produce distinct generationIds — no one-active-at-a-time policy'
    rationale: 'UX policy (e.g., disable Generate button while pending) is c17''s problem. Lifecycle doesn''t enforce it. Two pending rows for the same design are valid Firestore state; c17 may show "you have a generation in progress" UI but lifecycle doesn''t police.'
  - decision: 'storage_fail errorCode in c16 envelope; in lifecycle row, errorCode is "unknown" with errorMessage prefix'
    rationale: 'c3 GenerationErrorCode union is `refusal | rate_limit | network | unknown` — does not include `storage_fail`. Lifecycle persists what the type allows; c16 surface envelope can have a richer errorCode union (`refusal | rate_limit | network | low_quality | storage_fail | unknown`) for UI mapping. Two separate vocabularies acknowledged.'
  - decision: 'Defensive design existence + ownership check in persistGenerationStart, BEFORE writing generation row'
    rationale: "c4 firestore.rules can't cross-validate cheaply. A user could submit a generation request with a spoofed designId belonging to bob; rules would allow the generation row write (alice owns it) but the resulting state is broken. Defensive read catches the spoof early and returns a clean reason."
  - decision: 'Orphan output blob on transaction-fail-after-storage-success → logged but NOT cleaned up'
    rationale: 'Same rationale as c6 orphan: cleanup requires a sweep job (out of v1 scope). Logging gives traceability. Acceptable residual.'

cross_cutting:
  - concern: 'persistence:consistency'
    notes: 'Two-write pattern (start→result) + transactional success update + FR-C-9 storage-fail rescue. The single most important architectural invariant in Epic C; reviewer treats integration tests as load-bearing.'
  - concern: 'security-rules'
    notes: 'All writes go through Admin SDK with `userId` from session. c4 firestore.rules + storage.rules are the third defense layer. Defensive design ownership read prevents spoofed designId attacks before the generation write.'
  - concern: 'data-model'
    notes: 'Generation + Design types from c3. c14 GenerateResult shape consumed verbatim. Reason → errorCode mapping documented in code.'
  - concern: 'error-handling'
    notes: 'Discriminated envelope. Logs include code+message+identifiers. Failure-of-failure (rescue update fails) is logged but does not loop infinitely.'

risks:
  - severity: high
    description: 'Firestore transaction conflicts (e.g., another writer updates the same design concurrently) cause the transaction to retry internally; success path takes longer than expected'
    mitigation: 'Firestore SDK retries transactions automatically (default 5 attempts). Acceptable. If pathological, the txn returns aborted; we catch and report `firestore_failure`. Single-user app v1 — concurrent design writes are rare.'
  - severity: high
    description: 'Storage-fail rescue update itself fails → row stuck `pending`'
    mitigation: 'Logged with full identifiers (`[lifecycle] persistGenerationResult storage-fail rescue failed`). Operator can fix manually. Probability of both Storage AND rescue Firestore write failing in the same call is very low. Acceptable residual.'
  - severity: medium
    description: 'c14 GenerateResult adds new reasons (e.g., a future story adds `quota_exceeded`) and `reasonToErrorCode` mapping silently coerces to `unknown` without code review'
    mitigation: "Reason mapping uses TypeScript exhaustiveness — if c14 adds a reason and `reasonToErrorCode` doesn't handle it, TS does not catch (default returns `unknown`). Reviewer step explicitly checks the mapping covers all current GenerateResult reasons. Could be tightened with a `never` exhaustiveness check."
  - severity: medium
    description: 'designs.latestGenerationId update writes a non-c3 field (latestGenerationId is in c3 type, but update only writes that one field) — the partial update could violate c4 firestore.rules immutability rule on userId'
    mitigation: "c4 immutability rule was `request.resource.data.userId == resource.data.userId` on update. Firestore evaluates rules on the MERGED state, not the partial payload. Partial updates that don't touch userId pass the check. Test (6) verifies via emulator."
  - severity: medium
    description: 'Concurrent persistGenerationResult calls for the SAME generationId (e.g., c16 retry race) corrupt state'
    mitigation: 'Should not happen — c16 holds the generationId for one logical generate flow. If a future bug duplicates the call, the second update overwrites the first (last-write-wins). c17 UI is the natural rate-limiter.'
  - severity: low
    description: 'updatedAt timestamps differ slightly between generation and design updates within the txn (server time vs client time)'
    mitigation: 'Both writes use the SAME `now` variable derived once at function start. Timestamps match exactly.'

