  - id: implement
    description: |
      Make failing tests pass. Extend c10's `lib/designs/lifecycle.ts`.

      ```ts
      // (existing c10 imports + createDesignDraft)
      import crypto from 'node:crypto';
      import { getFirestore } from 'firebase-admin/firestore';
      import { createServerFirebaseAdmin } from '@/lib/firebase/server';
      import {
        designConverter, generationConverter,
      } from '@/lib/firestore/converters';
      import {
        uploadGenerationBytes, generationPath,
      } from '@/lib/firebase/storage';
      import type {
        Design, Generation, GenerationStatus, GenerationErrorCode,
      } from '@/lib/types';
      import type { GenerateResult } from '@/lib/ai/generate';

      export type PersistGenerationStartResult =
        | { ok: true; generationId: string }
        | { ok: false;
            reason: 'design_not_found' | 'design_unauthorized'
              | 'rules_denied' | 'firestore_failure';
            message: string };

      export async function persistGenerationStart(input: {
        userId: string;
        designId: string;
        requestJson: unknown;
      }): Promise<PersistGenerationStartResult> {
        const db = getFirestore(createServerFirebaseAdmin());

        // Defensive design ownership check BEFORE writing the generation row
        try {
          const designSnap = await db.collection('designs')
            .doc(input.designId).withConverter(designConverter).get();
          if (!designSnap.exists) {
            return { ok: false, reason: 'design_not_found',
                     message: `design ${input.designId} not found` };
          }
          const design = designSnap.data();
          if (design && design.userId !== input.userId) {
            return { ok: false, reason: 'design_unauthorized',
                     message: 'design owned by another user' };
          }
        } catch (err) {
          const code = (err as { code?: string }).code ?? 'unknown';
          const message = (err as Error).message ?? String(err);
          console.error('[lifecycle] persistGenerationStart design read failed',
            { uid: input.userId, designId: input.designId, code, message });
          return { ok: false, reason: 'firestore_failure', message };
        }

        const generationId = crypto.randomUUID();
        const now = new Date().toISOString();
        const generation: Generation = {
          id: generationId,
          designId: input.designId,
          userId: input.userId,
          requestJson: input.requestJson,
          resultStoragePath: null,
          providerResponseMetadata: null,
          status: 'pending',
          errorCode: null,
          errorMessage: null,
          createdAt: now,
          updatedAt: now,
        };
        try {
          await db.collection('generations').doc(generationId)
            .withConverter(generationConverter).set(generation);
          return { ok: true, generationId };
        } catch (err) {
          const code = (err as { code?: string }).code ?? 'unknown';
          const message = (err as Error).message ?? String(err);
          if (code === 'permission-denied') {
            console.error('[lifecycle] persistGenerationStart rules denied',
              { uid: input.userId, generationId, code, message });
            return { ok: false, reason: 'rules_denied', message };
          }
          console.error('[lifecycle] persistGenerationStart firestore failed',
            { uid: input.userId, generationId, code, message });
          return { ok: false, reason: 'firestore_failure', message };
        }
      }

      export type PersistGenerationResultResult =
        | { ok: true }
        | { ok: false;
            reason: 'storage_fail' | 'firestore_failure' | 'unknown';
            message: string };

      function reasonToErrorCode(
        reason: GenerateResult extends { ok: false; reason: infer R } ? R : never,
      ): GenerationErrorCode {
        // Map c14 GenerateResult reasons to c3 GenerationErrorCode union
        // GenerationErrorCode = 'refusal' | 'rate_limit' | 'network' | 'unknown'
        // Extra c14 reasons (`missing_reference_bytes`, `primary_required`,
        // `low_quality`) need mapping
        if (reason === 'refusal') return 'refusal';
        if (reason === 'rate_limit') return 'rate_limit';
        if (reason === 'network') return 'network';
        // missing_reference_bytes, primary_required, low_quality, unknown
        return 'unknown';
      }

      export async function persistGenerationResult(input: {
        generationId: string;
        userId: string;
        designId: string;
        outcome: GenerateResult;
      }): Promise<PersistGenerationResultResult> {
        const db = getFirestore(createServerFirebaseAdmin());
        const generationRef = db.collection('generations').doc(input.generationId)
          .withConverter(generationConverter);
        const designRef = db.collection('designs').doc(input.designId)
          .withConverter(designConverter);
        const now = new Date().toISOString();

        if (!input.outcome.ok) {
          // Failure path — no Storage write; just update row
          const errorCode = reasonToErrorCode(input.outcome.reason);
          try {
            await generationRef.update({
              status: 'failure' as GenerationStatus,
              errorCode,
              errorMessage: input.outcome.message,
              providerResponseMetadata: input.outcome.metadata,
              updatedAt: now,
            });
            return { ok: true };
          } catch (err) {
            const code = (err as { code?: string }).code ?? 'unknown';
            const message = (err as Error).message ?? String(err);
            console.error('[lifecycle] persistGenerationResult failure update failed',
              { uid: input.userId, generationId: input.generationId, code, message });
            return { ok: false, reason: 'firestore_failure', message };
          }
        }

        // Success path — write Storage FIRST, then transactional Firestore update
        const upload = await uploadGenerationBytes({
          uid: input.userId,
          genId: input.generationId,
          bytes: input.outcome.imageBytes,
          contentType: input.outcome.mimeType,
        });

        if (!upload.ok) {
          // Storage failed after provider success — TERMINAL FAILURE (FR-C-9)
          try {
            await generationRef.update({
              status: 'failure' as GenerationStatus,
              errorCode: 'unknown' as GenerationErrorCode,
              // Note: errorCode union doesn't include 'storage_fail';
              // we use 'unknown' + descriptive errorMessage. UI in c17
              // distinguishes via the c16 envelope's errorCode field.
              errorMessage: `storage_fail: ${upload.message}`,
              updatedAt: now,
            });
          } catch (err) {
            console.error('[lifecycle] persistGenerationResult storage-fail rescue failed',
              { uid: input.userId, generationId: input.generationId,
                err: (err as Error).message });
          }
          return { ok: false, reason: 'storage_fail', message: upload.message };
        }

        // Storage succeeded — transactional update of both docs
        try {
          await db.runTransaction(async (txn) => {
            txn.update(generationRef, {
              status: 'success' as GenerationStatus,
              resultStoragePath: upload.storagePath,
              providerResponseMetadata: input.outcome.metadata,
              errorCode: null,
              errorMessage: null,
              updatedAt: now,
            });
            txn.update(designRef, {
              latestGenerationId: input.generationId,
              updatedAt: now,
            });
          });
          return { ok: true };
        } catch (err) {
          const code = (err as { code?: string }).code ?? 'unknown';
          const message = (err as Error).message ?? String(err);
          console.error(
            '[lifecycle] firestore transaction failed after storage write succeeded',
            { uid: input.userId, generationId: input.generationId,
              storagePath: upload.storagePath, code, message });
          return { ok: false, reason: 'firestore_failure', message };
        }
      }
      ```

      DO NOT: import `lib/ai/provider`. DO NOT: call the SDK directly.
      DO NOT: trigger c14's generate() — c16 orchestrates the call
      sequence (start → c14.generate → result).
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the state machine is hermetic and FR-C-9 holds.

      - `persistGenerationStart` does the design existence + ownership
        check BEFORE writing the generation row. Test (2) + (3) cover.
      - `persistGenerationResult` success path: Storage write FIRST,
        then transactional Firestore update of BOTH `generations`
        AND `designs.latestGenerationId`. No partial commits possible.
      - **FR-C-9 invariant**: storage-fail-after-provider-success →
        terminal failure. Test (10)+(11)+(12) explicit. Reviewer
        manually re-reads test (12) — row is NEVER `pending` after the
        function returns.
      - Failure path (provider returned `ok: false`) → no Storage write,
        no design update. Test (8)+(9) cover all reasons.
      - Transactional update uses `db.runTransaction` not parallel
        `Promise.all([gen.update, design.update])` — atomicity matters.
      - Reason → errorCode mapping covers all c14 GenerateResult reasons
        (`refusal`, `rate_limit`, `network`, `low_quality` → `unknown`,
        `missing_reference_bytes` → `unknown`, `primary_required` →
        `unknown`). Future hardening could expand `GenerationErrorCode`
        union but that''s c3''s territory.
      - storage_fail failure note: errorCode is `unknown` per c3 union;
        errorMessage carries `storage_fail: ...` prefix. c16 envelope
        will surface `errorCode: "storage_fail"` to UI; lifecycle records
        it as `unknown` per the c3 type lock. Reviewer documents this
        in the design_decisions if not already.
      - All catch blocks log code+message+identifiers per
        `feedback_silent_catches_cost_time`.
      - Reviewer grep: NO `lib/ai/provider`, NO `@google/generative-ai`
        in lib/designs/lifecycle.ts.
      - All emulator-backed integration tests pass.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c15-generation-lifecycle-state-machine`.
