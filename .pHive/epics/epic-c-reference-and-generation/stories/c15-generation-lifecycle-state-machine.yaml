  - path: .pHive/epics/epic-c-reference-and-generation/docs/research-brief.md
    relevant_excerpt: |
      §Risk Inventory (HIGH): Partial generation persistence can leave
      misleading lifecycle state if provider success, output write, and
      Firebase Firestore status updates are not coordinated. Mitigation:
      Preserve the generation-start / generation-result split, require
      deterministic failure transitions, and test pending/success/
      failure transitions explicitly.
  - path: .pHive/epics/epic-c-reference-and-generation/docs/design-discussion.md
    relevant_excerpt: |
      §My Proposed Approach: Persist the generation lifecycle in two
      writes, never one. persistGenerationStart writes the `pending`
      row before the provider call. persistGenerationResult transitions
      to `success` or `failure` after the provider returns AND the
      output bytes have been written to Firebase Cloud Storage. If the
      storage write fails after a provider success, we explicitly write
      `failure`, not `pending`. This is what stops FR-C-9 from being a
      paper guarantee.
  - path: lib/designs/lifecycle.ts
    relevant_excerpt: |
      c10 created this file with createDesignDraft. c15 EXTENDS with
