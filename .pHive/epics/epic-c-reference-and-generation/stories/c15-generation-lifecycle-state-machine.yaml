id: c15-generation-lifecycle-state-machine
epic: epic-c-reference-and-generation
title: 'lib/designs/lifecycle.ts generation persistence state machine — pending→success|failure with transactional latestGenerationId + storage-fail-after-success → terminal failure (FR-C-9)'
status: pending
complexity: high
methodology: tdd
depends_on:
  [c10-create-design-action, c5-server-storage-helper, c14-gemini-request-retry]

escalations_addressed:
  - trigger: persistence:consistency
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Two-write lifecycle pattern locked: persistGenerationStart writes
      `pending` BEFORE provider call; persistGenerationResult writes
      terminal `success`|`failure` AFTER provider returns AND output
      bytes are confirmed in Storage. Storage-fail-after-provider-success
      transitions to `failure` with `errorCode: "storage_fail"`, NEVER
      stuck `pending`. FR-C-9 anti-zombie invariant proven by integration
      test that explicitly fails the storage write after provider success.
  - trigger: data-model:contract-stability
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Generation row fields locked from c3: `status`, `errorCode`,
      `errorMessage`, `resultStoragePath`, `providerResponseMetadata`,
      `userId`, `designId`, `requestJson`, `createdAt`, `updatedAt`.
      Transactional update couples `generations.status = "success"` with
      `designs.latestGenerationId = generationId` — both succeed or
      both fail (Firestore transaction).
  - trigger: security:plan-audit
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      All Firestore writes scoped to authenticated user uid. Generation
      row's `userId` denormalized from session uid (c3 design_decision).
      c4 firestore.rules enforce on read + write. Storage write of
      output bytes goes through c5 helper using `users/{uid}/generations/...`
      path family — c4 storage.rules deny non-owner.

description: |
  The hardest persistence problem in Epic C, and the one most likely to
  cost a future debugging weekend if locked wrong. Extends c10's
  `lib/designs/lifecycle.ts` with the generation state machine:

  1. **`persistGenerationStart({ userId, designId, requestSummary }):
     Promise<{ ok: true; generationId } | { ok: false; reason; message }>`**
     — writes a `generations/{generationId}` row with `status: "pending"`
     BEFORE the provider call. Returns the generationId. If this write
     fails, the caller (c16) does NOT proceed to the provider — no
     wasted provider tokens on a never-persisted generation.

  2. **`persistGenerationResult({ generationId, userId, designId,
     outcome }): Promise<{ ok: true } | { ok: false; reason; message }>`**
     — writes the terminal `success` or `failure` row. On `success`:
     uploads output bytes to Storage (via c5 helper), then transactionally
     updates the generation row AND the parent design's
     `latestGenerationId`. On `failure`: writes the failure row only —
     no Storage write, no design update.

  3. **Storage-fail-after-provider-success rescue** — if the provider
     returns success bytes but the Storage write fails, the lifecycle
     transitions the generation row to `failure` with
     `errorCode: "storage_fail"`. NEVER leaves the row in `pending`.
     This is the FR-C-9 invariant — proven by integration test (a fault
     injection that fails Storage after provider success).

  4. **Concurrent generation handling** — two `persistGenerationStart`
     calls from the same user for the same design create two distinct
     generation rows (each with its own UUID). The lifecycle does NOT
     enforce one-active-generation-at-a-time at this layer — c16 / c17
     own that UX policy if needed. v1 keeps multiple-pending tolerable.

  Out of scope: provider call (c14 owns). HTTP / action surface (c16).
  UI (c17). Design library queries (Epic D).

acceptance_criteria:
  # US-C-4 (generate a nail-design image) — c15 owns the persistence half of the generate flow; FR-C-9 anti-zombie invariant
  - 'Given an authenticated session for `alice` and an existing design `d1` owned by alice, when `persistGenerationStart({ userId: "alice-uid", designId: "d1", requestSummary })` is called, then it writes a `generations/{generationId}` doc with `status: "pending"`, `userId: "alice-uid"`, `designId: "d1"`, `requestJson: <summary>`, `resultStoragePath: null`, `errorCode: null`, `errorMessage: null`, `createdAt: <ISO>`, `updatedAt: <ISO>`, and returns `{ ok: true; generationId }`.'
  - 'Given the design referenced by `designId` does NOT exist or is owned by a different user, when `persistGenerationStart` runs, then c4 firestore.rules deny on the `generations` write (rules cannot cross-validate design ownership cheaply); however, the lifecycle defensively reads the design first and returns `{ ok: false; reason: "design_not_found" | "design_unauthorized"; message }` BEFORE attempting the generation write.'
  - 'Given a successful provider result, when `persistGenerationResult({ generationId, userId, designId, outcome: { ok: true; imageBytes; mimeType; metadata } })` runs, then: (a) bytes are uploaded to `users/alice-uid/generations/{generationId}.png` via c5 helper, (b) a Firestore TRANSACTION updates `generations/{generationId}` to `status: "success"; resultStoragePath; providerResponseMetadata; updatedAt` AND `designs/d1.latestGenerationId = generationId; updatedAt`, (c) returns `{ ok: true }`.'
  - 'Given the Storage upload fails after provider success, when `persistGenerationResult` catches the c5 helper failure, then it transactionally updates `generations/{generationId}` to `status: "failure"; errorCode: "storage_fail"; errorMessage; updatedAt`, does NOT update `designs.latestGenerationId`, and returns `{ ok: false; reason: "storage_fail"; message }`. The row is NEVER stuck `pending`.'
  - 'Given the Firestore transaction fails after Storage write succeeded, when `persistGenerationResult` catches, then it logs `[lifecycle] firestore transaction failed after storage write succeeded` (orphan blob path included) AND returns `{ ok: false; reason: "firestore_failure"; message }`. Caller (c16) surfaces; orphan storage cleanup is a future-epic concern.'
  - 'Given a failure outcome from the provider, when `persistGenerationResult({ outcome: { ok: false; reason: "refusal"; message } })` runs, then it updates the generation row to `status: "failure"; errorCode: "refusal"; errorMessage; updatedAt`, does NOT touch Storage, does NOT update `designs.latestGenerationId`, returns `{ ok: true }` (the FAILURE was successfully persisted).'
  - "Given the generation row updates from `pending` → `success`, when c4 firestore.rules evaluate, then the update is allowed (alice owns the row; userId immutable; status transition is a non-rules concern — rules don't validate state machines)."
  - 'Given two concurrent `persistGenerationStart` calls for the same user and design, when both complete, then two distinct `generations/{generationId}` docs exist with different UUIDs. No collision.'
  - 'Given `persistGenerationStart` fails to write (e.g., rules denied because design is missing), when the caller (c16) handles, then the generation flow does NOT call the provider — caller checks `result.ok` first.'
  - 'Given grep across `lib/designs/lifecycle.ts`, when searching for forbidden imports, then NO matches for `lib/ai/provider`, `@google/generative-ai`, or any direct SDK call — c14 is the only upstream of provider; lifecycle takes the OUTCOME, not the call.'

