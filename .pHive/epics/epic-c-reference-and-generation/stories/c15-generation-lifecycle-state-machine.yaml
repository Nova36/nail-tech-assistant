      FR-C-6: The generation lifecycle must create a generation row
      before provider invocation, classify result states, persist output
      storage paths, and update latest-generation linkage on success.
      FR-C-9: Generation status transitions must not leave misleading
      `pending` state if provider success is followed by storage failure
      or write inconsistency.
