id: c5-server-storage-helper
epic: epic-c-reference-and-generation
title: 'lib/firebase/storage.ts — server-only Firebase Cloud Storage helper + owner-scoped path API (mirrors lib/firebase/server.ts pattern)'
status: pending
complexity: medium
methodology: tdd
depends_on: [c4-firestore-storage-rules]

escalations_addressed:
  - trigger: security:plan-audit
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Helper exposes ONLY owner-scoped path-derived APIs:
      `referencePath(uid, refId)` and `generationPath(uid, genId)`. Bucket
      paths cannot be hand-rolled at call sites. Combined with c4 storage
      rules (path-derived `users/{uid}/...` allow), this guarantees that
      bypassing the helper to write to a non-owner path is denied at the
      storage layer.
  - trigger: persistence:consistency
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Helper provides explicit `uploadReferenceBytes` + `uploadGenerationBytes`
      surfaces with deterministic error states. c15 lifecycle's two-write
      pattern relies on this helper returning a discriminated success/failure
      so persistGenerationResult can transition to `failure` (not `pending`)
      when the bytes write fails.

description: |
  Server-only Firebase Cloud Storage helper. Mirrors the existing
  `lib/firebase/server.ts` Admin SDK init pattern (Symbol.for global cache,
  inlined service-account hydration) so import-order assumptions stay
  consistent across per-route Vercel bundles per memory
  `feedback_env_hydration_import_order`.

  Exposes a tight surface:

  - `getServerFirebaseStorage(): Bucket` — initializes the Admin Storage
    SDK once per process, returns the configured bucket from
    `NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET`. Cached via `Symbol.for(...)`.
  - `referencePath(uid: string, refId: string, ext: string): string` —
    returns `users/{uid}/references/{refId}.{ext}`. Single source of truth
    for the path shape c4 storage rules expect.
  - `generationPath(uid: string, genId: string, ext: string): string` —
    returns `users/{uid}/generations/{genId}.{ext}`.
  - `uploadReferenceBytes(input: { uid; refId; bytes; contentType }):
    Promise<{ ok: true; storagePath: string } | { ok: false; reason:
    'storage_failure' | 'unauthorized'; message: string }>` — writes
    bytes, returns the canonical `storagePath` string for persistence into
    `references.storagePath`.
  - `uploadGenerationBytes(input: { uid; genId; bytes; contentType }):
    Promise<...same shape...>` — same as uploadReferenceBytes, different
    path family.

  No call site outside this helper is allowed to construct
  `users/{uid}/...` strings directly. Reviewer enforces this by grep.

  No download API in this story — c10/c11 fetch reference URLs via the
  client SDK or signed URLs (decided in those stories). Download is not
  the c5 surface boundary.

acceptance_criteria:
  - 'Given the helper is imported from a server action, when `import "@/lib/firebase/storage"` runs, then it triggers `''server-only''` package import and fails the build if accidentally pulled into a client bundle.'
  - 'Given `getServerFirebaseStorage()` is called twice from different routes in the same Next.js process, when both calls resolve, then they return the SAME `Bucket` instance (cached via `Symbol.for("firebase-admin-storage")`).'
  - 'Given `referencePath("alice-uid", "r1", "jpg")`, when called, then it returns exactly `"users/alice-uid/references/r1.jpg"` — no leading slash, no trailing slash, normalized extension lower-case.'
  - 'Given `generationPath("alice-uid", "g1", "png")`, when called, then it returns `"users/alice-uid/generations/g1.png"`.'
  - 'Given `uploadReferenceBytes({ uid: "alice-uid", refId: "r1", bytes, contentType: "image/jpeg" })`, when the bucket write succeeds, then it returns `{ ok: true; storagePath: "users/alice-uid/references/r1.jpg" }`.'
  - 'Given the bucket write fails (e.g., emulator returns 5xx, network error, permission denied), when `uploadReferenceBytes` catches the error, then it logs `console.error("[storage] uploadReferenceBytes failed", { code, message, uid, refId })` per memory `feedback_silent_catches_cost_time` AND returns `{ ok: false; reason: "storage_failure"; message }`.'
  - "Given `uploadGenerationBytes(...)` is called with bytes representing a corrupt image, when the write succeeds at the storage layer, then the helper returns `{ ok: true; storagePath }` — image-content validation is NOT this helper's job (caller validates)."
  - 'Given the helper is imported in a vitest unit test, when the test does NOT start the storage emulator, then any `getServerFirebaseStorage()` call must NOT make a real network request (hydration is lazy; only `uploadReferenceBytes` / `uploadGenerationBytes` actually call the SDK).'
  - 'Given an integration test that runs against the storage emulator (started by `firebase emulators:exec`), when the test calls `uploadReferenceBytes` with valid inputs, then it succeeds and the bytes are readable from the emulator at the returned `storagePath`.'
  - 'Given a grep across `app/**` and `lib/**` (excluding `lib/firebase/storage.ts` itself), when searching for the literal string `"users/"`, then no other file constructs storage paths directly — all storage path construction goes through `referencePath()` / `generationPath()`.'

steps:
  - id: research
    description: |
      Max 3 focused questions:
      (1) Firebase Admin Storage SDK v13 (`firebase-admin/storage`) —
      confirm `getStorage(app).bucket(bucketName)` returns a `Bucket` from
      `@google-cloud/storage`, and `bucket.file(path).save(buffer, options)`
      is the canonical write API. Confirm via context7 lookup of
      `firebase-admin` v13 docs.
      (2) Storage emulator connection — does the Admin SDK auto-detect
      `STORAGE_EMULATOR_HOST` env var (canonical Google Cloud Storage
      emulator env), or does Firebase use a different mechanism (e.g.,
      `FIREBASE_STORAGE_EMULATOR_HOST`)? Test in the c4 emulator config to
      confirm the right env name.
      (3) Bucket name — `NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET` is already
      validated in lib/env.ts. The Admin SDK in emulator mode may need a
      project-id-derived dummy bucket name (`<projectId>.appspot.com`) or
      may accept the env value as-is. Confirm via emulator docs.

      Read `lib/firebase/server.ts` end-to-end as the canonical pattern to
      mirror — every gotcha there (hydration inlining, Symbol.for cache,
      emulator branch) translates to storage.ts. Memory anchors:
      `feedback_env_hydration_import_order`,
      `feedback_silent_catches_cost_time`.
    agent: researcher
  - id: test-spec
    description: |
      Write failing tests BEFORE implementation.

      - tests/unit/firebase/storage-paths.test.ts — pure path helper tests:
        (1) `referencePath('alice-uid', 'r1', 'jpg')` → `'users/alice-uid/references/r1.jpg'`
        (2) `referencePath('a', 'b', 'JPEG')` → `'users/a/references/b.jpeg'`
            (extension normalized lowercase)
        (3) `referencePath('a', 'b', '.jpg')` → `'users/a/references/b.jpg'`
            (leading-dot stripped)
        (4) `generationPath('alice', 'g1', 'png')` → `'users/alice/generations/g1.png'`
        (5) Empty uid throws — the path API should be defensive
        (6) Empty refId throws

      - tests/integration/firebase/storage-upload.test.ts — emulator-backed
        (runs ONLY in `pnpm test:rules` lane after c4 ships emulator):
        Wait — re-read existing test lanes. Storage helper tests probably
        belong in a NEW lane:
        - `vitest.config.storage.ts` (or extend rules-config to also pick
          up tests/integration/firebase/storage-*.test.ts), wrapped in
          `firebase emulators:exec --only storage,auth`.
        - Tester decides at this step whether to add a new lane or extend
          existing rules-lane. Default: extend rules-lane to include
          `tests/integration/storage/**/*.test.ts` so one emulator wrap
          covers all "needs Firebase emulator" tests.

        (1) `uploadReferenceBytes({ uid: "alice", refId: "r1", bytes:
            new Uint8Array([0xFF, 0xD8, 0xFF]), contentType: "image/jpeg" })`
            → returns `{ ok: true; storagePath: "users/alice/references/r1.jpg" }`
            and bytes are readable via `bucket.file(storagePath).download()`.
        (2) `uploadReferenceBytes` with a bucket name that does NOT exist
            in the emulator → returns `{ ok: false; reason:
            "storage_failure"; message }` and console.error contains
            `code` + `message`.
        (3) Symbol.for cache — call `getServerFirebaseStorage()` twice;
            assert returned `Bucket` is the same instance.

      - tests/unit/firebase/storage-grep-guard.test.ts — synthetic test
        asserting no other file constructs storage paths:
        Read app/** and lib/** files via fs; assert no occurrence of
        `'users/'` followed by a `${...}` template variable in TS string
        literals (heuristic — accepts false negatives, rejects clear
        violations).
        Marker: this test is best-effort; reviewer manual grep is the
        authoritative check.

      DO NOT mock the firebase-admin SDK in unit tests — pure path tests
      are pure (no SDK touched). SDK-touching tests run against the real
      emulator.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Make the failing tests pass. Mirror lib/firebase/server.ts pattern.

      ```ts
      import ''server-only'';
      import { getApps, initializeApp, type App, cert } from 'firebase-admin/app';
      import { getStorage } from 'firebase-admin/storage';
      import type { Bucket } from '@google-cloud/storage';
      import { env } from '@/lib/env';

      const STORAGE_BUCKET_KEY = Symbol.for('firebase-admin-storage');
      type GlobalStorageStore = Record<PropertyKey, unknown>;

      // Inlined hydration — same comment as lib/firebase/server.ts:
      // Vercel route bundles that don't transitively import lib/env
      // (e.g. the authenticated layout) otherwise get an undefined
      // process.env.* read here. Inlining keeps each route's bundle
      // self-contained.
      function hydrateFromServiceAccountJson(): void {
        // ... same body as lib/firebase/server.ts hydrateFromServiceAccountJson
      }

      function getPrivateKey(): string {
        return process.env.FIREBASE_PRIVATE_KEY!.replace(/\\n/g, '\n');
      }

      function isEmulatorMode(): boolean {
        return Boolean(
          process.env.FIREBASE_STORAGE_EMULATOR_HOST ||
          process.env.STORAGE_EMULATOR_HOST
        );
      }

      function ensureAdminApp(): App {
        // Prefer reusing the same App instance as lib/firebase/server.ts
        // by going through the same Symbol.for key. If server.ts has not
        // initialized yet, fall through to local init.
        // ... mirror server.ts logic
      }

      export function getServerFirebaseStorage(): Bucket {
        const globalStore = globalThis as GlobalStorageStore;
        const cached = globalStore[STORAGE_BUCKET_KEY];
        if (cached) return cached as Bucket;
        const app = ensureAdminApp();
        const bucket = getStorage(app).bucket(env.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET);
        globalStore[STORAGE_BUCKET_KEY] = bucket;
        return bucket;
      }

      function normalizeExtension(ext: string): string {
        return ext.replace(/^\./, '').toLowerCase().replace(/^jpeg$/, 'jpeg');
      }

      export function referencePath(uid: string, refId: string, ext: string): string {
        if (!uid) throw new Error('referencePath: uid required');
        if (!refId) throw new Error('referencePath: refId required');
        return `users/${uid}/references/${refId}.${normalizeExtension(ext)}`;
      }

      export function generationPath(uid: string, genId: string, ext: string): string {
        if (!uid) throw new Error('generationPath: uid required');
        if (!genId) throw new Error('generationPath: genId required');
        return `users/${uid}/generations/${genId}.${normalizeExtension(ext)}`;
      }

      type UploadResult =
        | { ok: true; storagePath: string }
        | { ok: false; reason: 'storage_failure' | 'unauthorized'; message: string };

      export async function uploadReferenceBytes(input: {
        uid: string;
        refId: string;
        bytes: Buffer | Uint8Array;
        contentType: string;
      }): Promise<UploadResult> {
        const ext = contentTypeToExt(input.contentType);
        const storagePath = referencePath(input.uid, input.refId, ext);
        try {
          const bucket = getServerFirebaseStorage();
          await bucket.file(storagePath).save(Buffer.from(input.bytes), {
            metadata: { contentType: input.contentType },
            resumable: false,
          });
          return { ok: true, storagePath };
        } catch (err) {
          const code = (err as { code?: string }).code ?? 'unknown';
          const message = (err as Error).message ?? String(err);
          console.error('[storage] uploadReferenceBytes failed', {
            code, message, uid: input.uid, refId: input.refId,
          });
          return { ok: false, reason: 'storage_failure', message };
        }
      }

      export async function uploadGenerationBytes(input: {
        uid: string;
        genId: string;
        bytes: Buffer | Uint8Array;
        contentType: string;
      }): Promise<UploadResult> {
        // Mirror uploadReferenceBytes
      }

      function contentTypeToExt(contentType: string): string {
        if (contentType === 'image/jpeg') return 'jpg';
        if (contentType === 'image/png') return 'png';
        if (contentType === 'image/heic') return 'heic';
        throw new Error(`unsupported contentType: ${contentType}`);
      }
      ```

      DO NOT: import `lib/types.ts` here unless specifically needed
      (storage helper is layer-below domain types).
      DO NOT: download / signed-URL / fetch APIs — out of scope.
      DO NOT: mock or shim firebase-admin in this file. Real SDK only.
      DO NOT: catch and silently swallow errors. Every catch logs code +
      message + relevant identifiers per `feedback_silent_catches_cost_time`.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the helper is the only path constructor and mirrors server.ts
      conventions.

      - `lib/firebase/storage.ts` imports `''server-only''` at top.
      - Symbol.for cache pattern matches lib/firebase/server.ts byte-for-byte
        (different symbol key, same shape).
      - `hydrateFromServiceAccountJson()` is INLINED in this file (not
        imported from lib/firebase/server.ts) per memory
        `feedback_env_hydration_import_order`. Reviewer confirms inline.
      - `getServerFirebaseStorage()` reuses the same App instance as
        lib/firebase/server.ts (via Symbol.for("firebase-admin-app")) when
        possible; falls back to local init only if needed.
      - `referencePath`/`generationPath` reject empty uid/id.
      - Extension normalization: `JPEG` → `jpeg`, `.jpg` → `jpg`.
      - `uploadReferenceBytes`/`uploadGenerationBytes` log code+message on
        failure per `feedback_silent_catches_cost_time`.
      - `contentTypeToExt` throws on unsupported types — does NOT silently
        coerce.
      - Grep across `app/**` and `lib/**` (excluding storage.ts itself)
        for the literal `'users/'` returns no other matches.
      - `pnpm test` passes (path helper tests).
      - `pnpm test:rules` passes (storage emulator integration tests if
        included in rules lane; otherwise new `pnpm test:storage` lane).
      - No production code outside `lib/firebase/storage.ts`, related
        tests, possibly `vitest.config.rules.ts` (if extended), and
        possibly `package.json` (if a new test lane added).
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c5-server-storage-helper`.
      Commit: `feat(c5): server-only Firebase Cloud Storage helper + owner-scoped path API`.
      Pre-commit: `pnpm test` + `pnpm test:rules` (or `pnpm test:storage`)
      must pass.
    agent: integrator
    depends_on: [review]

