design_decisions:
  - decision: 'Helper exposes ONLY owner-scoped path constructors (`referencePath`/`generationPath`); no `bucketPath(uid, kind, id, ext)` generic API'
    rationale: 'Generic APIs invite hand-rolling at call sites. Tight named functions force every storage write through a known-shape path that aligns with c4 storage rules. Adding a new path family in a future epic = adding a new helper function = forcing reviewer attention.'
  - decision: 'Helper REUSES the existing `Symbol.for("firebase-admin-app")` from lib/firebase/server.ts'
    rationale: 'Same Firebase App = same credentials = same emulator detection. Two parallel App instances would double-init, double-cache, and double-bill in production. Reviewer confirms by inspecting both files use the same Symbol.for key.'
  - decision: 'Hydration is inlined, NOT imported from lib/firebase/server.ts'
    rationale: 'Memory `feedback_env_hydration_import_order` — per-route Vercel bundles that import storage.ts but not server.ts otherwise miss hydration. Inlining costs ~10 lines of duplication and saves a real production bug.'
  - decision: 'Upload returns discriminated `{ ok: true; storagePath } | { ok: false; reason; message }` envelope (same shape as Pinterest client)'
    rationale: 'Matches the existing `lib/pinterest/client.ts` pattern. c15 lifecycle (persistGenerationResult) needs deterministic failure detection without try/catch boilerplate at the call site. Discriminated union is unambiguous.'
  - decision: 'No download / fetch / signed-URL APIs in this story'
    rationale: 'YAGNI. c10 reference panel and c17 generation preview decide their own download paths (probably client SDK download URLs since auth context is on the client). Adding a server download API now without a consumer creates an unjustified surface.'
  - decision: 'contentType → extension mapping is enumerated, not regex-derived'
    rationale: 'Three formats v1 supports: JPEG, PNG, HEIC. Enum throws on unknown — explicit. Regex parsing of `image/[a-z]+` would silently accept `image/svg+xml` and store it with the wrong extension.'
  - decision: 'No client-side Storage SDK helper in this story'
    rationale: 'Browser uploads bypass the server. Decision deferred to c8 (uploadReference action) — likely server-proxied uploads via the action, not direct browser-to-Storage. If c8 picks direct-browser, a CORS config story is added then. c5 only needs the server helper.'

cross_cutting:
  - concern: 'security-rules'
    notes: 'Helper enforces the path shape that c4 storage.rules ALLOW. If a future epic changes the path shape, both this helper AND the rules must change in lockstep — single-PR atomicity. Reviewer step grep-guard catches parallel path construction.'
  - concern: 'env hydration'
    notes: 'Inlined hydration per memory. Future helpers (e.g., a Pub/Sub or Vertex AI helper) follow the same pattern: copy the inline block, do not import from server.ts.'
  - concern: 'third-party error logging'
    notes: 'Every catch around bucket.file().save() logs `[storage] <op> failed` with `code`+`message`+identifiers. Memory `feedback_silent_catches_cost_time` enforced.'

risks:
  - severity: high
    description: 'Helper accidentally pulled into a client bundle; `server-only` import explodes the build'
    mitigation: '`server-only` import is the FIRST line of the file. Build will fail loudly at import time, not silently at runtime. Reviewer step verifies import order.'
  - severity: medium
    description: 'Two App instances initialize because Symbol.for keys diverge between server.ts and storage.ts'
    mitigation: 'Reviewer manually compares Symbol.for keys — must use the SAME `Symbol.for("firebase-admin-app")` across both files. Test (3) (Symbol.for cache test) implicitly catches this — second call returns same Bucket, which can only happen if App is shared.'
  - severity: medium
    description: 'Storage emulator env var name is wrong (`FIREBASE_STORAGE_EMULATOR_HOST` vs `STORAGE_EMULATOR_HOST`)'
    mitigation: 'Research step (2) confirms the canonical env name. Helper checks BOTH names defensively. Integration test against emulator is the proof.'
  - severity: medium
    description: 'Hand-rolled path construction sneaks in via a c10/c11/c12 story bypassing the helper'
    mitigation: 'Grep-guard test in this story + reviewer manual grep across app/** and lib/** for `users/` literal. Future stories that need a NEW path family must extend this helper, not bypass it.'
  - severity: low
    description: 'Extension normalization disagrees with c8 upload action acceptance (e.g., HEIC normalized to `heic` but c8 expects `heif`)'
    mitigation: 'design_decisions document the enum explicitly. c8 acceptance criteria reference this helper as source of truth. Disagreement caught at c8 test-spec time, fixed in one place.'
  - severity: low
    description: 'Upload size limit not enforced at the helper layer; large uploads hit Vercel function timeout'
    mitigation: 'Out of c5 scope. c8 (uploadReference action) enforces file-size cap (Open Q5: 10 MB) at the action boundary, before bytes reach the helper. Helper assumes valid input.'

references:
  - path: lib/firebase/server.ts
    relevant_excerpt: |
      const ADMIN_APP_KEY = Symbol.for('firebase-admin-app');
      type GlobalAdminStore = Record<PropertyKey, unknown>;

      function getPrivateKey(): string {
        return process.env.FIREBASE_PRIVATE_KEY!.replace(/\\n/g, '\n');
      }

      function isEmulatorMode(): boolean {
        return Boolean(process.env.FIREBASE_AUTH_EMULATOR_HOST);
      }

      export function createServerFirebaseAdmin(): App {
        const globalStore = globalThis as GlobalAdminStore;
        const existingGlobalApp = globalStore[ADMIN_APP_KEY];
        if (existingGlobalApp) return existingGlobalApp as App;
        hydrateFromServiceAccountJson();
        const initOptions = isEmulatorMode()
          ? { projectId: process.env.FIREBASE_PROJECT_ID! }
          : { credential: cert({...}) };
        const app = getApps().length === 0
          ? initializeApp(initOptions)
          : getApps()[0]!;
        globalStore[ADMIN_APP_KEY] = app;
        return app;
      }
