    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Make failing tests pass. Either action or route handler per c1
      lock.

      ### Path A: server action (P95 < 30s)

      Extend `app/(authenticated)/design/actions.ts` (file from c9 + c10):
      ```ts
      import {
        persistGenerationStart, persistGenerationResult,
      } from '@/lib/designs/lifecycle';
      import { generate } from '@/lib/ai/generate';
      import { getServerFirebaseStorage } from '@/lib/firebase/storage';
      import { getFirestore } from 'firebase-admin/firestore';
      import { createServerFirebaseAdmin } from '@/lib/firebase/server';
      import {
        designConverter, referenceConverter,
      } from '@/lib/firestore/converters';

      type GenerateDesignErrorCode =
        | 'unauthorized' | 'invalid_input'
        | 'design_not_found' | 'design_unauthorized'
        | 'refusal' | 'rate_limit' | 'network' | 'low_quality'
        | 'storage_fail' | 'unknown';

      export type GenerateDesignResult =
        | { status: 'success'; generationId: string; imageUrl: string }
        | { status: 'failure';
            errorCode: GenerateDesignErrorCode;
            cta: 'adjust_inputs';
            message: string };

      function reasonToCode(reason: string): GenerateDesignErrorCode {
        if (reason === 'refusal') return 'refusal';
        if (reason === 'rate_limit') return 'rate_limit';
        if (reason === 'network') return 'network';
        if (reason === 'low_quality') return 'low_quality';
        if (reason === 'storage_fail') return 'storage_fail';
        if (reason === 'design_not_found') return 'design_not_found';
        if (reason === 'design_unauthorized') return 'design_unauthorized';
        return 'unknown';
      }

      export async function generateDesign(input: {
        designId: string;
      }): Promise<GenerateDesignResult> {
        const session = await getSession();
        if (!session?.uid) {
          return { status: 'failure', errorCode: 'unauthorized',
                   cta: 'adjust_inputs', message: 'sign in required' };
        }
        const designId = (input.designId ?? '').trim();
        if (!designId) {
          return { status: 'failure', errorCode: 'invalid_input',
                   cta: 'adjust_inputs', message: 'designId required' };
        }

        // 1. Load design + references for c14.generate input
        const db = getFirestore(createServerFirebaseAdmin());
        const designSnap = await db.collection('designs').doc(designId)
          .withConverter(designConverter).get();
        if (!designSnap.exists) {
          return { status: 'failure', errorCode: 'design_not_found',
                   cta: 'adjust_inputs', message: 'design not found' };
        }
        const design = designSnap.data()!;
        if (design.userId !== session.uid) {
          return { status: 'failure', errorCode: 'design_unauthorized',
                   cta: 'adjust_inputs', message: 'design owned by another user' };
        }

        const refIds = [design.primaryReferenceId, ...design.secondaryReferenceIds];
        const refSnaps = await Promise.all(
          refIds.map((rid) => db.collection('references').doc(rid)
            .withConverter(referenceConverter).get()),
        );
        const refs = refSnaps.map((s) => s.data()!).filter(Boolean);
        if (refs.length !== refIds.length) {
          return { status: 'failure', errorCode: 'unknown',
                   cta: 'adjust_inputs', message: 'one or more references missing' };
        }
        const [primaryRef, ...secondaryRefs] = refs;

        // 2. Persist pending row (c15)
        const requestSummary = {
          primaryReferenceId: design.primaryReferenceId,
          secondaryReferenceIds: design.secondaryReferenceIds,
          promptText: design.promptText, nailShape: design.nailShape,
        };
        const start = await persistGenerationStart({
          userId: session.uid, designId, requestJson: requestSummary,
        });
        if (!start.ok) {
          return { status: 'failure', errorCode: reasonToCode(start.reason),
                   cta: 'adjust_inputs', message: start.message };
        }
        const generationId = start.generationId;

        // 3. Call c14 generate (request build + retry)
        const outcome = await generate({
          primaryReference: primaryRef,
          secondaryReferences: secondaryRefs,
          promptText: design.promptText,
          nailShape: design.nailShape,
        });

        // 4. Persist result (c15)
        const persisted = await persistGenerationResult({
          generationId, userId: session.uid, designId, outcome,
        });

        if (!persisted.ok) {
          return { status: 'failure', errorCode: reasonToCode(persisted.reason),
                   cta: 'adjust_inputs', message: persisted.message };
        }
        if (!outcome.ok) {
          return { status: 'failure', errorCode: reasonToCode(outcome.reason),
                   cta: 'adjust_inputs', message: outcome.message };
        }

        // 5. Build image URL for UI
        const bucket = getServerFirebaseStorage();
        const filePath = `users/${session.uid}/generations/${generationId}.${
          outcome.mimeType === 'image/jpeg' ? 'jpg' : 'png'}`;
        const file = bucket.file(filePath);
        const [signedUrl] = await file.getSignedUrl({
          action: 'read',
          expires: Date.now() + 15 * 60 * 1000, // 15 min
        });
        return { status: 'success', generationId, imageUrl: signedUrl };
      }
      ```

      ### Path B: route handler (P95 ≥ 30s)

      Create `app/api/designs/generate/route.ts` with the same body
      logic wrapped in `POST(req)`, runtime: 'nodejs', dynamic:
      'force-dynamic'. Streaming progress (e.g., Server-Sent Events or
      Response with body stream) per c1 spike recommendation.

      DO NOT: implement BOTH transports. ONE per c1 spike lock.
      DO NOT: skip the design-load + reference-load steps (c14 needs
      them). DO NOT: bypass c15 lifecycle.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the surface is correctly chosen and orchestrates lifecycle
      cleanly.

      - Surface choice (action or route) matches c1 spike P95 lock.
        Reviewer reads the artifact and confirms the choice.
      - generateDesign reads uid from session ONLY.
      - Design + reference loading happens BEFORE persistGenerationStart.
        If loading fails, no `pending` row is written.
      - c15 persistGenerationStart called before c14 generate.
      - c14 generate called once.
      - c15 persistGenerationResult called once with c14's outcome.
      - Envelope returned matches the locked shape.
      - Image URL strategy matches research lock (signed URL OR public
        download URL).
      - errorCode taxonomy: `refusal | rate_limit | network | low_quality |
        storage_fail | unknown` for provider/lifecycle failures, plus
        `unauthorized | invalid_input | design_not_found |
        design_unauthorized` for auth/input failures.
      - Reviewer grep across the action / route file: NO firebase-admin
        SDK direct imports for Firestore (lifecycle owns); imports of
        `lib/firebase/server` + `getFirestore` for the design load are
        OK because we need the design BEFORE calling lifecycle.
      - Returned envelope's `cta` field is always `"adjust_inputs"` on
        failure (UI in c17 has the same CTA across all 5 branches).
      - All vitest unit + integration tests pass.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c16-generate-design-surface`.
      Commit: `feat(c16): generateDesign mutation surface (action OR route per c1 spike)`.
      Pre-commit: `pnpm test`, `pnpm test:rules` (or :storage) must pass.
    agent: integrator
    depends_on: [review]

