id: c16-generate-design-surface
epic: epic-c-reference-and-generation
title: 'generateDesign mutation surface — orchestrates persistGenerationStart → c14.generate → persistGenerationResult; surface choice (action vs route) locked by c1 spike P95'
status: shipped
complexity: medium
methodology: tdd
depends_on: [c15-generation-lifecycle-state-machine, c14-gemini-request-retry]

escalations_addressed:
  - trigger: api:surface-boundary
    severity: moderate
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Surface choice (server action vs route handler) READ from c1 spike
      artifact at research step. P95 < 30s → server action; P95 ≥ 30s →
      route handler at app/api/designs/generate/route.ts with streaming.
      Decision documented in design_decisions; same loginAction-style
      discriminated envelope returned regardless of transport.
  - trigger: persistence:consistency
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Orchestrates the c15 two-write lifecycle precisely: start →
      provider → result. If start fails, provider not called. If
      provider returns failure, persistGenerationResult writes the
      failure row. If provider success, persistGenerationResult does
      Storage + transactional Firestore update. c16 does NOT bypass
      c15 — every state transition flows through lifecycle module.
  - trigger: data-model:contract-stability
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Returns the c17-consumed envelope shape (locked here):
      `{ status: "success"; generationId; imageUrl } |
       { status: "failure"; errorCode: 'refusal'|'rate_limit'|'network'|'low_quality'|'storage_fail'|'unknown'; cta: 'adjust_inputs'; message }`.
      c17 UI maps each errorCode to a copy variant. errorCode taxonomy
      EXTENDS c3 GenerationErrorCode union by adding `low_quality` +
      `storage_fail` for UI purposes — c16 is the surface that
      reconciles the lifecycle (c3 union) and the UI (c17 5-state) views.

description: |
  Slice 4 mutation surface. The single function the UI calls to trigger
  generation. Composes everything below:

  1. **`generateDesign({ designId }): Promise<GenerateDesignResult>`** —
     reads session uid; reads the Design doc to fetch the assembled
     ReferenceSet (primary + secondaries + prompt + shape); reads each
     Reference doc; calls `persistGenerationStart` (c15); calls
     c14's `generate` (which builds the request via c5 storage reads
     and runs the retry policy); calls `persistGenerationResult` (c15);
     translates the lifecycle result into the c17 envelope.

  2. **Surface choice** — server action OR route handler. LOCKED by c1
     spike output. If P95 < 30s → server action (simpler, idiomatic);
     if P95 ≥ 30s → route handler at `app/api/designs/generate/route.ts`
     with streaming progress (Vercel function timeout requires it).
     Story-time decision based on the artifact at
     `.pHive/epics/epic-c-reference-and-generation/docs/spike-gemini-sdk.md`.
     Both transports return the same envelope.

  3. **Image URL resolution** — on success, `imageUrl` field in the
     envelope is a Firebase Storage download URL (or signed URL,
     depending on c5 surface) that c17 `<GenerationPreview>` `<Image>`
     can render. c18 will add the Firebase Storage host to
     `next.config.ts` `images.remotePatterns` to enable optimization.

  Returns the discriminated envelope. UI in c17 pattern-matches on
  `result.status === "success"` vs `"failure"` and on `errorCode`.

  Out of scope: UI components (c17 owns). next.config.ts host allowance
  (c18 owns). Library queries (Epic D).

acceptance_criteria:
  # US-C-4 (generate a nail-design image) — c16 is the mutation surface the UI calls; orchestrates c15 + c14
  - 'Given an authenticated session for `alice` and an existing design `d1` owned by alice with valid references, when `generateDesign({ designId: "d1" })` is called and provider returns success, then it returns `{ status: "success"; generationId; imageUrl: <storage URL or signed URL> }`.'
  - 'Given no session, when `generateDesign(...)` is called, then it returns `{ status: "failure"; errorCode: "unauthorized"; cta: "adjust_inputs" (or omitted for unauthorized); message }` (or rejects with 401 if route-handler form). Provider NOT called; no rows written.'
  - 'Given the design does not exist, when persistGenerationStart fails with `design_not_found`, then `generateDesign` returns `{ status: "failure"; errorCode: "design_not_found"; cta: "adjust_inputs"; message }` and provider NOT called.'
  - 'Given persistGenerationStart succeeds and c14 returns `{ ok: false; reason: "refusal" }`, when persistGenerationResult writes the failure row, then `generateDesign` returns `{ status: "failure"; errorCode: "refusal"; cta: "adjust_inputs"; message }`. The generation row exists with `status: "failure"; errorCode: "refusal"`.'
  - 'Given c14 returns success and persistGenerationResult succeeds, when generateDesign returns, then `imageUrl` resolves the bytes at `users/{uid}/generations/{generationId}.png` (Storage download URL OR signed URL — c5 surface decides; c16 just propagates the URL string).'
  - 'Given c15 persistGenerationResult returns `{ ok: false; reason: "storage_fail" }`, when generateDesign returns, then envelope is `{ status: "failure"; errorCode: "storage_fail"; cta: "adjust_inputs"; message }` with the c17-friendly errorCode.'
  - 'Given c14 returns `{ ok: false; reason: "missing_reference_bytes" }`, when generateDesign returns, then errorCode maps to `unknown` (or a more specific code if added; locked here as `unknown` to match c3 GenerationErrorCode constraint at the lifecycle layer).'
  - 'Given the c1 spike artifact lock = server action AND `generateDesign` is the action exported from `app/(authenticated)/design/actions.ts`, when grepped, then the file is the SAME module as c9/c10 (single design-flow actions file).'
  - 'Given the c1 spike artifact lock = route handler AND `app/api/designs/generate/route.ts` exists, when POST is hit with `{ designId }` body, then it returns the envelope as JSON. `runtime: "nodejs"`.'
  - 'Given grep across `generateDesign` (action or route), when checked, then it imports ONLY `lib/firebase/session`, `lib/designs/lifecycle`, `lib/ai/generate`, and supporting types. NO direct firebase-admin imports; NO direct provider SDK imports.'
  - "Given a complete generation flow that succeeds, when telemetry is checked, then `metadata.retryCount` and `metadata.durationMs` are persisted on the generation row's `providerResponseMetadata` (via c15)."

steps:
  - id: research
    description: |
      Max 2 focused questions:
      (1) READ c1 spike artifact `.pHive/epics/epic-c-reference-and-generation/docs/spike-gemini-sdk.md`.
      Confirm: P95 latency < 30s OR ≥ 30s → drives action vs route choice.
      Lock the surface for this story.
      (2) Image URL strategy — should c17 `<GenerationPreview>` use:
      (a) Firebase Storage public download URL (requires storage rules
      to allow public read OR the user is authenticated and uses Firebase
      web SDK), OR
      (b) Server-generated signed URL (15-minute expiry typical), OR
      (c) Server-proxied byte stream from a route?
      Recommendation: (a) — c4 storage.rules allow read for the owner;
      Firebase Web SDK on the client side authenticates via the same
      session and reads the bytes. c11 EmbeddedPinterestPanel already
      uses `next/image` with `i.pinimg.com`; c18 adds the Storage host.
      If complications, fallback to (b) signed URL minted by this
      action via c5 helper extension.

      Read .pHive/planning/structured-outline.md:284 (Slice 4 Changes #4
      app/api/designs/generate/route.ts) — outline names the route, but
      api:surface-boundary lock makes action canonical. Resolution per
