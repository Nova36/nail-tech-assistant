design_decisions:
  - decision: 'Surface choice (action vs route handler) READ from c1 spike P95 latency'
    rationale: 'api:surface-boundary lock with conditional resolution. Sub-30s P95 → action (idiomatic, simpler client integration); ≥30s P95 → route handler (Vercel timeout requires streaming). c1 spike measures explicitly; c16 honors.'
  - decision: 'Design + reference loading happens in c16, NOT inside c15 persistGenerationStart'
    rationale: 'persistGenerationStart already does an ownership check (defensive read). Loading the full reference docs there would couple lifecycle to ReferenceSet shape. c16 reads what c14 needs; c15 stays minimal.'
  - decision: 'Image URL = 15-minute signed URL via Storage Admin SDK'
    rationale: 'Per research lock. Public download URLs require c4 storage.rules to be permissive (loosen security); signed URLs preserve owner-only rules and have a controlled expiry. 15 min is enough for the user to view + interact; if they navigate away and come back later, c17 / Epic D can re-mint.'
  - decision: 'errorCode taxonomy in envelope EXTENDS c3 GenerationErrorCode (adds `low_quality`, `storage_fail`, `design_not_found`, `design_unauthorized`, `unauthorized`, `invalid_input`)'
    rationale: 'data-model:contract-stability. c3 GenerationErrorCode is the row-level type (only 4 members); c16 envelope is the UI-level type (10 members) reflecting auth + input + lifecycle states. Two vocabularies on purpose; reviewer documents the mapping.'
  - decision: 'cta = "adjust_inputs" on every failure (consistent across 5 branches)'
    rationale: 'kickoff #8 + FR-C-7. The user''s recovery path is always "go back and adjust inputs" — change the prompt, swap a reference, try a different shape. UI in c17 maps the cta to a single CTA button across all error states.'
  - decision: 'c14 generate is called BETWEEN persistGenerationStart and persistGenerationResult, NEVER concurrently'
    rationale: 'Sequential flow is the contract c15 expects. Concurrent calls would race the two writes and could leave orphans. Sequential is also simpler and matches user expectations.'
  - decision: 'metadata.retryCount and metadata.durationMs persisted via c15.providerResponseMetadata (already in c15 spec)'
    rationale: 'c14 GenerateResult.metadata propagates through c15 and lands on the row. Future Epic D library queries can show "this generation took 12s, retried once".'

cross_cutting:
  - concern: 'security-rules'
    notes: 'Session uid + design ownership check + c4 firestore.rules + c4 storage.rules. Four defense layers.'
  - concern: 'error-handling'
    notes: 'Discriminated envelope. errorCode taxonomy fixed; c17 UI exhaustively maps. cta consistent.'
  - concern: 'persistence:consistency'
    notes: 'Sequential start → provider → result. No bypass. c15 owns FR-C-9 invariant.'
  - concern: 'api:surface-boundary'
    notes: 'Surface choice locked by c1 spike P95. Documented in design_decisions.'

risks:
  - severity: high
    description: 'Surface lock changes mid-development (e.g., c1 spike says action but real-world Vercel cold start adds 5s pushing P95 over 30s)'
    mitigation: "If detected, re-cut to route handler in a follow-up story. Same envelope shape; UI in c17 unaffected. Adds rework but doesn't break contracts."
  - severity: medium
    description: 'Signed URL expires before user finishes viewing (e.g., user generates, walks away for 30 min, comes back to broken `<img>`)'
    mitigation: '15 min is the v1 default; can extend to 1 hour or generate fresh URLs on Library page load (Epic D). Acceptable v1 residual.'
  - severity: medium
    description: 'Multiple references missing → returned errorCode `unknown` is not user-friendly'
    mitigation: 'A future hardening story could add a `references_missing` errorCode + UI branch. v1 falls through to generic adjust_inputs CTA. Acceptable for the rare case.'
  - severity: medium
    description: 'Route-handler streaming progress is hard to test reliably in vitest jsdom'
    mitigation: 'If Path B is locked, integration test (20-22) uses a non-streaming test pattern (single response.json()) or moves to Playwright. Stream verification is a real-browser concern.'
  - severity: low
    description: 'Concurrent generateDesign calls from same user create two pending rows (c15 already accepts this)'
    mitigation: 'c17 UI disables Generate button while pending. If a user manages to call twice via API, c15 still produces two valid rows with two valid generation IDs — no corruption.'

