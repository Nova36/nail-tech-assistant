    rationale: 'Wizard is one continuous flow across c11 (Steps 1+2) and c17 (Step 3). Don approved a single canonical wizard frame; duplicating the strip/sidebar in c17 with slight drift would break visual continuity. c17 imports `<WizardProgressStrip>` from `components/studio/` (c11 export) and renders it with `step={3}`. Studio shell is inherited via the (authenticated) layout that c11 + c12 already shape.'
  - decision: 'Wireframe Touchpoint 1 APPROVED — implement against `wireframe.html` with NO deviation'
    rationale: 'Touchpoint 1 closed 2026-04-29 by Don. ui-design step is now record-keeping; substantive design is locked. Generation pending state + 5 error branches + inline Discard confirm are the most user-visible Epic C surface; getting copy / motion / layout wrong damages product trust. Deviation requires TPM + Don sign-off.'
  - decision: 'Animations-specialist sidecar at REVIEWER step (not pre-execute)'
    rationale: 'Per memory `feedback_animations_sidecar_review` from b2: dual-persona spawn at review caught real prefers-reduced-motion gap. Reuse the pattern. Sidecar concerns: pending shimmer envelope, success/error reveal, reduce-motion fallbacks.'
  - decision: '5-state errorCode taxonomy LOCKED ship-Epic-C: refusal | rate_limit | network | storage_fail | low_quality'
    rationale: 'data-model:contract-stability. These 5 are the user-distinguishable failure modes. Fallback codes (unauthorized, etc.) share generic copy; not surfaced as separate variants. Future hardening can add more variants without breaking the 5 locked.'
  - decision: 'TypeScript `default: never` exhaustiveness check on errorCode switch'
    rationale: 'Adding a new errorCode in c16 without updating COPY map = compile error in c17. Compile-time guarantee that every code has a copy variant. Catches drift before runtime.'
  - decision: 'Pending-state motion is "polished" not generic spinner (per FR-C-8)'
    rationale: 'A generic spinner over 10-15s feels like the app is broken. Wireframe-locked language (shimmer + rotating text) acknowledges the wait. animations-specialist sidecar polishes timing.'
  - decision: 'prefers-reduced-motion fallback: static text, no looping animation'
    rationale: 'Memory `feedback_animations_sidecar_review` caught the gap on b2. Repeat the pattern. Reduce-motion users get a clean static state — equally accessible, not deprived of feedback.'
  - decision: 'adjust_inputs CTA returns to workspace with state preserved'
    rationale: 'A user who failed generation should not lose their work. State preservation honors US-C-5 acceptance: "guided failure preserves trust". Implementation: c11 Workspace state survives the success/failure render via React state (parent component holds the state machine).'
  - decision: 'Brand tokens reused; NO new motion language without Don approval'
    rationale: 'Brand locked at .pHive/brand/brand-system.yaml. Adding a new color or animation token without approval risks inconsistency with Epic A/B work.'
  - decision: 'No save-to-library, no regenerate, no design detail page in c17'
    rationale: 'ui:scope-boundary lock. Slice 5 (visualizer) + Epic D (library) own those surfaces. c17 stops at "raw preview rendered" + "guided failure rendered".'

cross_cutting:
  - concern: 'error-handling'
    notes: '5-state taxonomy + 5 fallback codes mapped exhaustively. TypeScript exhaustiveness check enforces. CTA consistent across all variants.'
  - concern: 'ui-major'
    notes: 'Wireframe Touchpoint 1 gates implement.'
  - concern: 'ui-animations'
    notes: 'Reviewer-step append per memory `feedback_animations_sidecar_review`. Concerns: pending envelope, transitions, prefers-reduced-motion.'
  - concern: 'animations-pending-states'
    notes: 'FR-C-8 polished pending state. 10-15s wait. Wireframe + sidecar review both load-bearing.'
  - concern: 'ui-scope-boundary'
    notes: 'No visualizer, no library, no save, no regenerate, no detail page. Reviewer enforces.'

risks:
  - severity: high
    description: 'Pending-state motion looks worse than a generic spinner because shimmer over 10-15s is visually fatiguing'
    mitigation: 'animations-specialist sidecar concerns timing explicitly. If shimmer fatigues, switch to rotating-text-only or a slow heartbeat pulse. Wireframe Touchpoint 1 lets Don preview before code locks.'
  - severity: high
    description: "Wireframe rejection blocks story; Mother's Day deadline pressure"
    mitigation: 'Same pattern as c11 risk. Touchpoint 1 allows iteration; if all 3 rejected, escalate to scope cut (ship MVP error states, polish post-launch).'
  - severity: medium
    description: 'next/image refuses to render the Firebase Storage signed URL because c18 has not shipped (host not in remotePatterns)'
    mitigation: 'c18 dependency explicit. If c17 ships first, fall back to `<img src={imageUrl} alt="..." />` with `unoptimized={true}` until c18 lands. Acceptable transition state.'
  - severity: medium
    description: 'errorCode taxonomy drift: c16 adds a new code (e.g., quota_exceeded) and c17 COPY map silently uses fallback'
    mitigation: 'TypeScript exhaustiveness via Record<errorCode, ...>. Adding a code without map entry = compile error. Verified by reviewer + CI typecheck.'
  - severity: medium
    description: 'State preservation on adjust_inputs CTA: c11 Workspace state lost if c17 unmounts and remounts the workspace'
    mitigation: 'State machine lives in the parent c11 Workspace component; c17 components are children. Unmount/remount preserves parent state. Test (20) covers.'
  - severity: low
    description: 'Playwright e2e flaky on the pending-state assertion because shimmer animation interferes with screenshot stability'
    mitigation: 'Test asserts on aria-busy or aria-live announcements rather than visual state. animations-specialist may suggest reduced-motion test mode.'
  - severity: low
    description: 'next/image alt text is too generic (just "Generated nail design")'
    mitigation: 'alt synthesizes nailShape + truncated promptText for a more descriptive label. Wireframe brief locks the alt text template.'

