description: |
  Slice 4 user-facing surface. Implements **Step 3 — Confirm** of the
  c11 wizard at `app/(authenticated)/design/[designId]/page.tsx`. Step 2
  → Step 3 transition (in c11) fires `createDesign` (c10) and routes
  to `/design/[designId]`; this story renders what the user sees
  there: pending → success | failure.

  Inherits wizard chrome from c11 components — c17 imports
  `<WizardProgressStrip step={3}>` and the studio shell layout. The
  progress strip shows Step 1 ✓ + Step 2 ✓ + Step 3 active, keeping
  the wizard frame continuous across the c11 ↔ c17 seam. No chrome
  duplication; c17 reuses c11's shell + sidebar exactly.

  Three new client components ship the visible end of generation:

  1. **`<GenerateButton>`** — primary CTA on Step 2 of c11 (lives in
     c11 as the wizard footer "Generate →" button); c17 renders the
     pending stage on /design/[designId] after that click. Polished
     progress affordance for the 10-15s wait per FR-C-8 (NOT a generic
     spinner; wireframe pending-stage frame locks the motion).

  2. **`<GenerationPreview>`** — rendered on success. Shows the raw
     generated image via `next/image` referencing the signed URL from
     c16's envelope. NO visualizer compositing (Slice 5 / Epic D).

  3. **`<GenerationErrorState>`** — rendered on failure. Branches on
     `errorCode` to one of 5 ship-Epic-C copy variants:
     - `refusal` — "We couldn''t generate this image. Try simpler
       references or a different prompt."
     - `rate_limit` (after retry) — "We''re hitting capacity. Wait a
       moment and try again, or change your inputs."
     - `network` (after retry) — "Connection trouble. Check your
       internet and try again."
     - `storage_fail` — "We saved the design but couldn''t save the
       image. Adjust inputs and retry."
     - `low_quality` — "The result wasn''t up to par. Try refining the
       prompt or swapping a reference."
     Plus fallback branches for `unauthorized`, `invalid_input`,
     `design_not_found`, `unknown` — generic copy with adjust-inputs
     CTA. All variants include the SAME `adjust_inputs` CTA button
     that returns the user to the workspace with state preserved.

  These three components plug into c11's `Workspace.tsx` orchestrator.
  c11 GenerateButton was a placeholder; c17 replaces with the real one
  wired to c16. c11 had no preview or error UI; c17 adds both.

  Out of scope: visualizer (Slice 5), shape masks, save-to-library,
  regenerate (Epic D), design detail page (Epic D).

acceptance_criteria:
  # US-C-5 (see a raw result or guided failure) — c17 is the user-visible end of generation; raw preview + 5-state guided failure
  # ── Entry from c11 + wizard chrome inheritance ─────────────────────
  - 'Given the user clicks "Generate →" on c11 Step 2 and c10 createDesign returns `{ ok: true; designId }`, when c11 calls `router.push(`/design/${designId}`)`, then `app/(authenticated)/design/[designId]/page.tsx` (c17) renders with INSTANT transition to the Pending state — no intermediate flash of empty content.'
  - 'Given /design/[designId] renders, when the page is observed, then `<WizardProgressStrip>` (imported from c11/components/studio/) shows Step 1 ✓ · Step 2 ✓ · Step 3 active. The studio sidebar + shell are inherited from the c11/c12 layout — no duplicated chrome.'
  - 'Given the user has assembled a valid reference set in `/design/new` (per c11) and reached Step 3 via the c11 wizard, when c17 mounts on /design/[designId], then it (a) renders the Pending state immediately, (b) calls c16 `generateDesign({ designId })` once, (c) on success transitions to `<GenerationPreview>` rendering the imageUrl, (d) on failure transitions to `<GenerationErrorState>` with the appropriate copy variant.'
  - 'Given pending state, when the UI is observed for 10-15 seconds, then it shows a polished progress affordance — NOT a generic spinner. Specific motion locked by ui-design wireframe + animations-specialist sidecar review.'
  - 'Given pending state, when `prefers-reduced-motion: reduce` is set in the OS, then the progress affordance falls back to a static "Generating..." indicator with no looping animation.'
  - 'Given c16 returns `{ status: "success"; imageUrl }`, when `<GenerationPreview>` renders, then it displays the image via `next/image src={imageUrl}` with `alt` describing the generated design (e.g., "Generated nail design — almond shape with rose gold accents per your prompt").'
  - 'Given c16 returns `{ status: "failure"; errorCode: "refusal" }`, when `<GenerationErrorState>` renders, then the heading reads (per wireframe lock) like "We couldn''t generate this image" and the description suggests simpler references / different prompt.'
  - 'Given errorCode `rate_limit`, when `<GenerationErrorState>` renders, then copy reflects "we''re hitting capacity, wait a moment and try again, or change your inputs". Mentions the retry already happened (one silent retry exhausted — c14 lock).'
  - 'Given errorCode `network`, when rendered, then copy reflects "connection trouble, check your internet and try again".'
  - 'Given errorCode `storage_fail`, when rendered, then copy reflects the partial-save state — design exists, image did not save — and offers retry.'
  - 'Given errorCode `low_quality`, when rendered, then copy reflects "result wasn''t up to par, try refining prompt or swapping reference".'
  - 'Given errorCode is one of the fallback codes (`unauthorized`, `invalid_input`, `design_not_found`, `design_unauthorized`, `unknown`), when rendered, then a generic adjust-inputs message appears with the same `adjust_inputs` CTA button.'
  - 'Given any error state, when the user clicks the `adjust_inputs` CTA, then they are routed back to the `/design/new` workspace with the assembled reference state preserved (URL state OR c11 component state via context).'
  - 'Given the success state, when the user navigates away and returns, then c17 does NOT re-render the preview (preview is post-generation only — no auto-show). c11 workspace re-renders cleanly.'
  - 'Given Playwright e2e flow `tests/e2e/generation-flow.spec.ts`, when run, then it covers: (1) happy path (pin selection → upload → prompt → generate → success preview); (2-6) each of 5 error branches with mocked c16 returning each errorCode.'
  - "Given `<GenerationPreview>` consumes a Firebase Storage signed URL, when `next/image` renders, then `next.config.ts` `images.remotePatterns` allows the host. (THIS IS c18's STORY — c17 unblocks the test, c18 ships the config.)"
  - 'Given the dual-persona reviewer step (animations-specialist sidecar), when running, then it inspects: pending-state motion timing (10-15s envelope; no exceeding 1.5s loop), success transition (fade-in or slide-up envelope), error reveal (graceful, not jarring), prefers-reduced-motion handling on every animation. Per-pattern memory: `feedback_animations_sidecar_review`.'
  - 'Given grep across `components/design-new/Generate*.tsx`, when checked, then no firebase-admin imports, no SDK imports — all data flows through c16 envelope.'

steps:
  - id: research
    description: |
      Max 3 focused questions:
      (1) Pending-state motion language — what does b2/b3 use for
      "polished waiting" beyond Suspense skeleton? Read
      `.pHive/wireframes/epic-b-pinterest-integration/_animations-spec.md`
      for skeleton sweep, append stagger, prefers-reduced-motion.
      Generation pending is a longer wait (10-15s vs Suspense''s
      sub-second); needs a different rhythm — possibly a slow shimmer
      with text rotation ("Generating...", "Refining...", "Almost
      there..." paced over 12s)?
      (2) `next/image` with signed URLs — Firebase Storage signed URLs
      include query parameters; does `next.config.ts` `images.
      remotePatterns` need to allow the query-param URL or just the
      host? Confirm via Next.js docs (host match is sufficient; query
      params aren''t pattern-matched).
      (3) c11 Workspace state preservation on `adjust_inputs` CTA —
      does the user return to a fresh workspace or one that retains
      their reference selections + prompt + shape? Recommendation:
      retain. Implementation: keep c11 state in sessionStorage or
      pass via URL/query.

      Read .pHive/wireframes/epic-b-pinterest-integration/b4-token-invalid-view/v2.html
      for structural copy precedent (heading + paragraph + CTA pattern).
      Read memory `feedback_animations_sidecar_review` for the dual-
      persona review pattern.
    agent: researcher
  - id: ui-design
    description: |
      COMPLETE — Touchpoint 1 APPROVED 2026-04-29 by Don.

      Canonical artifact: `.pHive/wireframes/epic-c-reference-and-generation/c17-generation-ui/wireframe.html` (1089 lines).

      The implement step takes wireframe.html as the AUTHORITATIVE visual +
      interaction source — including:
      - Wizard chrome continuity: sidebar + `<WizardProgressStrip>` with
        Step 1 ✓ + Step 2 ✓ + Step 3 active (imported from c11
        components/studio/; no chrome duplication).
      - Pending stage frame: 10-15s envelope, polished motion (slow shimmer
        + rotating text milestones per wireframe), prefers-reduced-motion
        fallback to static text + subtle dot pulse.
      - Success state: `<GenerationPreview>` with `next/image`, "Your
