        (9) Renders heading "Your design" (or wireframe-locked copy)
        (10) Adjust-and-regenerate CTA button visible

      - tests/unit/components/design-new/GenerationErrorState.test.tsx —
        Exhaustive copy mapping:
        (11) errorCode `refusal` → heading + description match wireframe lock
        (12) errorCode `rate_limit` → matching copy
        (13) errorCode `network` → matching copy
        (14) errorCode `storage_fail` → matching copy
        (15) errorCode `low_quality` → matching copy
        (16) errorCode `unauthorized` / `invalid_input` /
             `design_not_found` / `design_unauthorized` / `unknown` →
             generic fallback copy + adjust_inputs CTA
        (17) TypeScript exhaustiveness: a `default: never` branch in
             the switch ensures any new errorCode added without UI
