      AUTHORITATIVE VISUAL SOURCE:
      - .pHive/design/briefs/generation-ui.md (+ approved HTML)

      - tests/unit/components/design-new/GenerateButton.test.tsx —
        (1) Idle state: enabled button with text "Generate Design"
        (2) Pending state (after click): button disabled, polished
            progress affordance visible, NOT a generic spinner
        (3) prefers-reduced-motion: pending state shows static text
            "Generating..." with no looping animation
        (4) Click → calls onGenerate prop with assembled state
        (5) Click while pending → onGenerate NOT called again
        (6) aria-busy="true" during pending; aria-live announces

      - tests/unit/components/design-new/GenerationPreview.test.tsx —
