      - tests/integration/design-new/generation-flow.test.tsx —
        Workspace + Generate flow integration:
        (18) Mock c16 to return success → click Generate → pending
             state → preview state with image URL
        (19) Mock c16 to return refusal → click → pending → error state
             with refusal copy
        (20) Click adjust_inputs CTA → returns to workspace; reference
             state preserved

      - tests/e2e/generation-flow.spec.ts — Playwright golden + 5 errors:
        (21) Happy path: log in → /design/new → select pin → upload
             photo → enter prompt → choose shape → click Generate →
             pending state → preview renders with image
        (22) Refusal: same setup; mock c16 to return refusal → error
             panel renders with refusal copy
        (23) Rate-limit: mock c16 → rate_limit → matching copy
        (24) Network: mock c16 → network → matching copy
        (25) Storage_fail: mock c16 → storage_fail → matching copy
        (26) Low_quality: mock c16 → low_quality → matching copy

      DO NOT write tests for: visualizer, save-to-library, regenerate,
      design detail page navigation. Those are Epic D / Slice 5.
    agent: tester
    depends_on: [ui-design]
  - id: implement
    description: |
      Make failing tests pass. Three new client components + workspace
      integration.

      AUTHORITATIVE VISUAL SOURCE:
      - .pHive/design/briefs/generation-ui.md (+ approved HTML)

      Files to produce:

      - `components/design-new/GenerateButton.tsx` — client component:
        ```tsx
        'use client';
        import { useState, useTransition } from 'react';
        import { generateDesign } from '@/app/(authenticated)/design/actions';
        // (or fetch to /api/designs/generate if route handler path)
        ...
        ```

      - `components/design-new/GenerationPreview.tsx` — client
        component. `next/image` with the signed URL; alt text;
        adjust-and-regenerate CTA.

      - `components/design-new/GenerationErrorState.tsx` — client
        component with the exhaustive switch:
        ```tsx
        'use client';
        import type { GenerateDesignResult } from '@/app/(authenticated)/design/actions';

        type FailureEnvelope = Extract<GenerateDesignResult, { status: 'failure' }>;

        const COPY: Record<FailureEnvelope['errorCode'], { heading: string; description: string }> = {
          refusal: {
            heading: "We couldn't generate this image",
            description: "Try simpler references or a different prompt.",
          },
          rate_limit: {
            heading: "We're hitting capacity",
            description: "Wait a moment and try again, or change your inputs.",
          },
          network: {
            heading: 'Connection trouble',
            description: "Check your internet and try again.",
          },
          storage_fail: {
            heading: 'Almost there',
            description: "We saved the design but couldn't save the image. Adjust inputs and retry.",
          },
          low_quality: {
            heading: "The result wasn't up to par",
            description: "Try refining the prompt or swapping a reference.",
          },
          // Fallback branches share generic copy
          unauthorized: { heading: 'Something went wrong', description: 'Sign in again and try.' },
          invalid_input: { heading: 'Something went wrong', description: 'Adjust your inputs and try again.' },
          design_not_found: { heading: 'Something went wrong', description: 'Adjust your inputs and try again.' },
          design_unauthorized: { heading: 'Something went wrong', description: 'Adjust your inputs and try again.' },
          unknown: { heading: 'Something went wrong', description: 'Adjust your inputs and try again.' },
        };

        export function GenerationErrorState({
          envelope, onAdjust,
        }: { envelope: FailureEnvelope; onAdjust: () => void }) {
          const { heading, description } = COPY[envelope.errorCode];
          // TypeScript exhaustiveness: any new errorCode without entry in COPY = compile error
          return (
            <section role="alert" aria-live="polite" className="...">
              <h2>{heading}</h2>
              <p>{description}</p>
              <button onClick={onAdjust} className="...">Adjust and try again</button>
            </section>
          );
        }
        ```

      - Update `app/(authenticated)/design/new/Workspace.tsx` (c11) to
        wire `<GenerateButton>` to c16 and orchestrate state
        transitions: idle → pending → success | failure. State machine
        managed via `useState<'idle' | 'pending' | 'success' | 'failure'>`
        + the current envelope.

      - Pending-state motion: implement per wireframe brief +
        animations-specialist sidecar guidance. Tailwind keyframes for
        the shimmer envelope OR a CSS-only approach. prefers-reduced-
        motion handled via `@media (prefers-reduced-motion: reduce)`.

      DO NOT: build visualizer, shape mask, library grid, design
      detail page, save-to-library button, in-place regenerate. Out
      of scope.

      DO NOT: import firebase-admin or SDKs from client components.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the 5-state taxonomy ships exhaustively, motion is
      polished, scope is held.

      **Dual-persona review** (per `feedback_animations_sidecar_review`
      memory): primary reviewer (claude) + animations-specialist sidecar.
      Use `ui:animations append` to spawn the sidecar.

      Primary reviewer concerns:
      - 5 errorCode branches all map to distinct copy variants per
        wireframe. Test (11)-(15) cover.
      - Fallback branches (unauthorized, invalid_input,
        design_not_found, design_unauthorized, unknown) map to generic
        copy. Test (16) covers.
      - TypeScript exhaustiveness: removing or adding an errorCode in
        c16 without updating COPY map = compile error. Reviewer
        verifies via `tsc --noEmit`.
      - Adjust-inputs CTA returns to workspace with state preserved.
        Test (20) covers.
      - GenerationPreview uses `next/image` with `alt` text.
      - Pending state shows polished affordance, not generic spinner.
        Test (2) covers.
      - All client components use `'use client'`.
      - No firebase-admin imports in client components. Reviewer grep.
      - All vitest unit + integration tests pass.
      - Playwright e2e (21-26) all pass.
      - Reviewer manually loads `pnpm dev` and walks through:
        a. Click Generate → pending shimmer for 10-15s → preview renders
        b. Mock c16 to fail (e.g., dev-only override) → each error
           variant displays correctly

      Animations-specialist sidecar concerns:
      - Pending shimmer envelope timing (e.g., 1.2s loop, repeating
        cleanly for the 10-15s wait without jarring resets)
      - Success state-transition (fade-in OR slide-up; envelope ≤ 320ms;
        easing per brand language)
      - Error-state reveal (gentle, not abrupt; doesn''t feel
        accusatory)
      - prefers-reduced-motion: every animation has a static fallback;
        no looping motion when reduce is set
      - aria-live announcements for state changes
      - High-contrast / focus-visible audit on the adjust-inputs CTA
      - Per-pattern memory: `feedback_animations_sidecar_review` —
        document any new motion language added
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c17-generation-ui`.
      Commit: `feat(c17): generation UI — GenerateButton + GenerationPreview + GenerationErrorState (5-state taxonomy)`.
      Pre-commit: `pnpm test`, `pnpm test:rules`, `pnpm test:e2e` (or
      recommended), `pnpm typecheck`, `pnpm lint` must pass.
      The c18 next.config.ts host allowance is required for the e2e
      `<Image>` test to pass — coordinate with c18 if not already shipped.
    agent: integrator
    depends_on: [review]

