description: |
  Pure builder. Takes user-selected reference IDs + optional prompt + nail
  shape, validates the assembly invariants, and returns a typed
  ReferenceSet record ready to feed into c10 createDesign. No Firestore,
  no Storage, no fetch. Every error case returns a discriminated typed
  failure rather than throwing — call sites (c11 UI, c10 action) decide
  surfacing.

  Invariants enforced:

  1. Exactly one primary reference ID (locked per FR-C-2 + design-discussion
     §My Proposed Approach + research-brief Open Q3).
  2. Secondary reference IDs preserved in input order (ARRAY shape from c3
     lock).
  3. No reference ID appears more than once across primary + secondary
     (a primary cannot also be secondary; no duplicate secondaries).
  4. Prompt text length ≤ 1000 chars (locked here as a sane default;
     overridable in Open Q tracker if Don wants different).
  5. Nail shape ∈ NailShape union from lib/types.ts.

  This is the kind of pure logic story that gives every downstream
  consumer (c9, c10, c11, c13) a stable contract to test against.
  Pure-function discipline means c11's e2e tests can use the SAME builder
  without spinning up Firestore.

  Out of scope: persistence (c10 owns the Firestore write), UI (c11 owns
  the panel), Pinterest pin selection state (c12 owns the pin grid
  selection affordances).

acceptance_criteria:
  - 'Given valid input `{ primaryReferenceId: "r1", secondaryReferenceIds: ["r2", "r3"], promptText: "rose gold matte", nailShape: "almond" }`, when `buildReferenceSet(input)` is called, then it returns `{ ok: true; set: { primaryReferenceId: "r1", secondaryReferenceIds: ["r2", "r3"], promptText: "rose gold matte", nailShape: "almond" } }`.'
  - 'Given input with `secondaryReferenceIds: []`, when builder runs, then `{ ok: true; set: { ..., secondaryReferenceIds: [] } }` — empty secondary array is valid.'
  - 'Given input without `promptText` (or with `promptText: undefined`), when builder runs, then output `set.promptText === null` (normalized; c3 Design uses `string | null`).'
  - 'Given input with `promptText: ""` (empty string), when builder runs, then output `set.promptText === null` (empty string treated as no prompt).'
  - 'Given input with `primaryReferenceId: ""` (empty), when builder runs, then `{ ok: false; reason: "primary_required"; message }`.'
  - 'Given input with `secondaryReferenceIds: ["r1", "r1"]` (duplicate secondary), when builder runs, then `{ ok: false; reason: "duplicate_reference_id"; message }` naming `"r1"`.'
  - 'Given input with `primaryReferenceId: "r1", secondaryReferenceIds: ["r1"]`, when builder runs, then `{ ok: false; reason: "primary_in_secondary"; message }`.'
  - 'Given input with `secondaryReferenceIds: ["r3", "r2", "r4"]` (not sorted), when builder runs, then output `set.secondaryReferenceIds === ["r3", "r2", "r4"]` (input order preserved EXACTLY, not re-sorted).'
  - 'Given input with `promptText` of length 1001, when builder runs, then `{ ok: false; reason: "prompt_too_long"; message }` naming the cap.'
  - 'Given input with `nailShape: "stiletto"` (NOT in NailShape union — currently `"almond" | "coffin" | "square" | "round" | "oval"`), when builder runs, then `{ ok: false; reason: "invalid_nail_shape"; message }`.'
  - 'Given an extreme input with `secondaryReferenceIds` of length 50, when builder runs, then `{ ok: true; set }` (no upper cap on secondary count; UX in c11 may restrict but contract does not).'
  - "Given the builder is imported, when its file is inspected, then it does NOT import `firebase-admin/*`, `'server-only'`, or any Firestore/Storage modules — pure logic only."

