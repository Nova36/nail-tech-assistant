escalations_addressed:
  - trigger: data-model:contract-stability
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Builder enforces the c3-locked Design.secondaryReferenceIds: string[]
      ordered-array shape. Validates: exactly one primaryReferenceId,
