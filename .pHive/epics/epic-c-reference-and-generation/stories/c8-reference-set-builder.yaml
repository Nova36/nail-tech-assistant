design_decisions:
  - decision: 'Ordered ARRAY for `secondaryReferenceIds` (locked from c3 design_decisions + design-discussion §3 + research-brief Open Q3)'
    rationale: 'v1 single-user, bounded list, single-doc read/write. Subcollection deferred to a future epic if 100+ refs per design becomes real.'
  - decision: 'Pure function — no Firestore, Storage, or `server-only` imports'
    rationale: 'Lets c11 e2e tests build reference sets without spinning up emulators. Lets c10 createDesign call this synchronously inside its server action without awaits. Lets c13 buildGeminiRequest use this output as a stable input shape.'
  - decision: 'Returns discriminated `{ ok: true; set } | { ok: false; reason; message }` — no thrown errors'
    rationale: 'Matches the c5/c6/c7 envelope pattern. Call sites (c10 action, c11 UI) prefer pattern-matching over try/catch.'
  - decision: 'Empty-string and whitespace-only `promptText` normalize to `null`'
    rationale: 'c3 Design.promptText is `string | null`. UI form inputs often produce empty strings when the user clears them; treating empty as null keeps Firestore docs clean (no ambiguous `""`).'
  - decision: 'MAX_PROMPT_LENGTH = 1000 chars'
    rationale: "Conservative cap. Gemini 2.5 Flash Image accepts much longer prompts but UX rarely needs more than 200-300 chars for nail-design intent. Easy to revisit if Don's wife hits the cap."
  - decision: 'No upper bound on secondary count enforced by builder; UX may restrict in c11'
    rationale: 'Contract-vs-UX separation: builder enforces invariants that downstream code (c10 storage, c13 request) requires. UI cap is a product decision (5? 10? unlimited?) that lives in c11. Builder being permissive lets the same function serve any UX policy.'
  - decision: 'Validate against `NailShape` union from lib/types.ts (no `stiletto`)'
    rationale: 'lib/types.ts is source of truth. If product needs `stiletto`, separate atomic change. c3 surfaced the divergence; this story honors it.'
  - decision: 'Builder does NOT validate Reference docs exist in Firestore'
    rationale: "Existence is c10 createDesign's problem (and indirectly c4 firestore.rules — primary/secondary refs the user does not own would be denied at write time on the design doc). Builder is pure; cross-doc validation requires I/O, which would break purity."

cross_cutting:
  - concern: 'data-model'
    notes: 'Builder is the canonical place to validate the 6 invariants of an assembled reference set. Adding a new invariant (e.g., "no more than 10 secondaries" if product decides) is a one-line addition + test. Removing or weakening an invariant requires updating callers (c10, c11) in the same change.'

risks:
  - severity: low
    description: 'Builder permissive bound on secondary count creates UX confusion if c11 cap diverges from server'
    mitigation: "c11 enforces UX cap (decided at c11 design); builder remains permissive. If they diverge, c11's cap simply triggers the disabled-Generate UI path with a clear message — server never rejects what UI accepted."
  - severity: low
    description: 'NailShape `stiletto` request from product team forces lib/types.ts change → cascades through c3 + c8 + c9 + c10 + c11 + c13 + c17'
    mitigation: "Atomic single-PR change to lib/types.ts; this story's validation auto-picks up the new union member. Tests that hardcode the 5-member list (test 5) need updating."
  - severity: low
    description: 'MAX_PROMPT_LENGTH = 1000 turns out to be too low for some prompts'
    mitigation: 'Single constant change; test (11) (length=1000) and test (12) (length=1001) update with the new cap.'

