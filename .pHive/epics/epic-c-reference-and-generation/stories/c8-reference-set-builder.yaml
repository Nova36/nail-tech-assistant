      Read .pHive/planning/structured-outline.md:222-271 (Slice 3 spec) for
      the buildReferenceSet interface signature already named.
    agent: researcher
  - id: test-spec
    description: |
      Write failing tests BEFORE implementation. Pure function = pure
      tests, no mocks needed.

      - tests/unit/references/reference-set-happy-path.test.ts —
        (1) Valid input with prompt + 2 secondaries → `{ ok: true; set }`
        (2) Valid input with no secondaries → `{ ok: true; set }`
        (3) Valid input without prompt → `set.promptText === null`
        (4) Valid input with empty-string prompt → `set.promptText === null`
        (5) All 5 NailShape values (`almond`, `coffin`, `square`, `round`,
            `oval`) → all valid

      - tests/unit/references/reference-set-invariants.test.ts —
        (6) Empty primaryReferenceId → `primary_required`
        (7) Whitespace-only primaryReferenceId (e.g., `"   "`) →
            `primary_required` (trim then check)
        (8) Duplicate secondary `["r1", "r1"]` → `duplicate_reference_id`
        (9) Primary in secondary → `primary_in_secondary`
        (10) Secondary order preserved exactly:
             input `["c", "a", "b"]` → output `["c", "a", "b"]`

      - tests/unit/references/reference-set-bounds.test.ts —
        (11) `promptText` length exactly 1000 → valid
        (12) `promptText` length 1001 → `prompt_too_long`
        (13) `secondaryReferenceIds` length 50 → valid
        (14) `secondaryReferenceIds` containing empty-string ID → `invalid_reference_id`
        (15) `nailShape: "stiletto"` → `invalid_nail_shape`
        (16) `nailShape: "ALMOND"` (case mismatch) → `invalid_nail_shape`
             (case-sensitive enum)

      - tests/unit/references/reference-set-purity.test.ts —
        (17) Module file does NOT contain `''server-only''`, `firebase`,
             `firestore`, `storage` (grep test reading the source file)

      Tests run in the unit lane (jsdom or node, doesn't matter — pure
      logic). No MSW needed. No emulator. No mocks.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Make failing tests pass. One small file.

      ```ts
      // lib/references/reference-set.ts
      // PURE. No imports from ''server-only'', firebase, firestore, storage.
      import type { NailShape } from '@/lib/types';

      const NAIL_SHAPES = ['almond', 'coffin', 'square', 'round', 'oval'] as const;
      const MAX_PROMPT_LENGTH = 1000;

      function isNailShape(x: unknown): x is NailShape {
        return typeof x === 'string'
          && (NAIL_SHAPES as readonly string[]).includes(x);
      }

      export interface ReferenceSet {
        primaryReferenceId: string;
        secondaryReferenceIds: string[];
        promptText: string | null;
        nailShape: NailShape;
      }

      export type BuildReferenceSetResult =
        | { ok: true; set: ReferenceSet }
        | { ok: false;
            reason:
              | 'primary_required'
              | 'invalid_reference_id'
              | 'duplicate_reference_id'
              | 'primary_in_secondary'
              | 'prompt_too_long'
              | 'invalid_nail_shape';
            message: string };

      export function buildReferenceSet(input: {
        primaryReferenceId: string;
        secondaryReferenceIds: string[];
        promptText?: string | null;
        nailShape: string;
      }): BuildReferenceSetResult {
        const primary = (input.primaryReferenceId ?? '').trim();
        if (!primary) {
          return { ok: false, reason: 'primary_required',
                   message: 'primary reference is required' };
        }

        const secondary = input.secondaryReferenceIds ?? [];
        for (const id of secondary) {
          if (typeof id !== 'string' || id.trim() === '') {
            return { ok: false, reason: 'invalid_reference_id',
                     message: 'secondary reference IDs must be non-empty strings' };
          }
        }

        const seen = new Set<string>();
        for (const id of secondary) {
          if (seen.has(id)) {
            return { ok: false, reason: 'duplicate_reference_id',
                     message: `duplicate secondary reference: ${id}` };
          }
          seen.add(id);
        }

        if (secondary.includes(primary)) {
          return { ok: false, reason: 'primary_in_secondary',
                   message: `primary reference ${primary} appears in secondary list` };
        }

        const normalizedPrompt =
          input.promptText && input.promptText.trim().length > 0
            ? input.promptText
            : null;
        if (normalizedPrompt !== null && normalizedPrompt.length > MAX_PROMPT_LENGTH) {
          return { ok: false, reason: 'prompt_too_long',
                   message: `prompt exceeds ${MAX_PROMPT_LENGTH} chars` };
        }

        if (!isNailShape(input.nailShape)) {
          return { ok: false, reason: 'invalid_nail_shape',
                   message: `nailShape "${input.nailShape}" not in NailShape union` };
        }

        return {
          ok: true,
          set: {
            primaryReferenceId: primary,
            secondaryReferenceIds: secondary,
            promptText: normalizedPrompt,
            nailShape: input.nailShape,
          },
        };
      }
      ```

      DO NOT: persist anything. DO NOT: validate that the IDs actually
      exist as docs in Firestore — that's c10 createDesign's job (and
      Firestore rules' job indirectly). DO NOT: mutate the input.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify purity + invariant coverage.

      - `lib/references/reference-set.ts` imports ONLY types
        (`NailShape`). No SDK imports. No `''server-only''`. Reviewer grep.
      - All 17 tests pass.
      - Builder does NOT mutate input — tested by passing a frozen object
        in test (10) variant.
      - `MAX_PROMPT_LENGTH = 1000` is a named constant, not a magic
        number.
      - Empty + whitespace-only primary IDs both rejected (test 6 + 7).
      - Empty-string secondary IDs rejected (test 14).
      - NailShape validation is case-sensitive (test 16).
      - Secondary order preserved verbatim (test 10).
      - Returns discriminated union — no thrown errors escape the
        function.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c8-reference-set-builder`.
      Commit: `feat(c8): pure reference-set builder + invariant tests`.
    agent: integrator
    depends_on: [review]

