design_decisions:
  - decision: 'Spike is throwaway; durable output is the markdown artifact + sample images, not running spike code'
    rationale: 'Avoids leaving a /spike/gemini route in production; matches structured-outline Slice 1 explicit "decision gate, not a speculative demo" framing (Risk #2 detailed mitigations)'
  - decision: 'Architect preference `@google/genai` (v1.50.1+) is the FIRST SDK tested, not all three in parallel'
    rationale: "Schedule discipline (Mother's Day 10 days out); installing/learning three SDKs to pick one is a sunk cost when architect preference is already opinionated. `firebase/ai` gets compared only if `@google/genai` fails the runtime check. Researcher 2026-04-29 confirmed `@google/generative-ai` reached EOL 2025-08-31 — `@google/genai` is the canonical replacement; do not install the deprecated package."
  - decision: 'Quality rubric: 3-of-5 reference types must produce stylized-but-recognizable output to count as GO'
    rationale: 'Kickoff-decisions #12 sets the bar; 3-of-5 is a quantifiable threshold rather than reviewer impression. Lower than 3 = NO-GO triggers provider swap.'
  - decision: 'sync-vs-route recommendation uses P95 < 30s as the cutoff'
    rationale: 'Vercel default function timeout (Hobby) is 10s; Pro is 60s. Server actions inherit the same timeout. P95 ≥ 30s makes server-action transport fragile under load and forces c14 to use a route handler with streaming progress.'
  - decision: 'NO production wiring of lib/ai/generate.ts in this story'
    rationale: "Provider-boundary escalation: lib/ai/generate.ts is c14's file. Pre-wiring it during the spike would couple the throwaway code to durable code and make c14 a refactor instead of an implementation. Hard separation."
  - decision: 'GEMINI_API_KEY provisioned via feedback_secret_rotation_no_releak local script pattern'
    rationale: 'Memory rule already established. Key value must never pass through chat, commits, or artifacts. Local script reads from a `.secrets/` dir and writes to `.env.local` directly.'

cross_cutting:
  - concern: 'secret handling'
    notes: 'GEMINI_API_KEY (or provider-equivalent) provisioning via local-script pattern; pre-commit grep guard; .env.example empty value entry; reviewer step explicitly verifies key absence under git tracking'
  - concern: 'provider boundary discipline'
    notes: 'No durable code in this story imports the candidate SDK from lib/ — only the throwaway spike harness. Provider boundary at lib/ai/generate.ts stays untouched until c14.'

risks:
  - severity: high
    description: 'Quality verdict is NO-GO — Gemini cannot produce stylized-but-recognizable nail-design material from reference inputs'
    mitigation: 'Provider boundary at lib/ai/generate.ts (built in c14) absorbs the swap. Story stops at review with SendMessage to team-lead. Orchestrator + Don pick a fallback provider (FLUX.1-kontext or gpt-image-1) before c13 starts. Upstream contracts (Reference, Design, request builder inputs in c13) stay unchanged.'
  - severity: high
    description: '`@google/generative-ai` does not run cleanly on Next.js Node server runtime (e.g., transitively pulls in browser-only globals via a peer dep)'
    mitigation: 'Spike implement step catches this immediately on first run. If broken, fall back to `firebase/ai` (with the App Check caveat handled server-side via Firebase Admin SDK) or Vertex AI (ADC). SDK comparison table records the failure mode honestly.'
  - severity: medium
    description: 'P95 latency exceeds 30s and forces c14 to use a route handler with streaming, expanding c14 scope beyond what was planned'
    mitigation: "Spike measures P95 explicitly so c14 plans correctly. If P95 ≥ 30s, c14 task description in this YAML's `escalations_carrying_into_execute` (epic.yaml provider-boundary) is updated by orchestrator before c14 starts."
  - severity: medium
    description: 'GEMINI_API_KEY accidentally appears in spike artifact markdown or commit'
    mitigation: 'Reviewer grep step explicitly checks for first-6-chars of key under git tracking. Pre-commit guard. Memory rule feedback_secret_rotation_no_releak referenced in design_decisions.'
  - severity: low
    description: 'Throwaway spike code (`app/spike/gemini/`) survives integrate and ends up in production'
    mitigation: "Two-pass cleanup: this story's integrate step deletes if possible; c14 reviewer step explicitly checks for spike code remnants and removes any with `REMOVE_BEFORE_C14` markers."
  - severity: low
    description: '5 reference-type rows are insufficient signal — model behaves well on 5 types but poorly on real-user inputs later'
    mitigation: 'Outline Risk #2 detailed mitigation already accepts this — Slice 1 is a directional gate, not a load test. c14 ships with the provider boundary so post-launch quality issues swap providers without rewriting upstream code. Acceptable residual risk.'

