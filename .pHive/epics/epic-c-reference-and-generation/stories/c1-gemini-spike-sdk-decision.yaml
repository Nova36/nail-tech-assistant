id: c1-gemini-spike-sdk-decision
epic: epic-c-reference-and-generation
title: 'Gemini 2.5 Flash Image quality spike + SDK decision artifact (GO/NO-GO + SDK lock + sync-vs-route recommendation)'
status: pending
complexity: medium
methodology: tdd
depends_on: []

escalations_addressed:
  - trigger: provider-boundary
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Story produces .pHive/epics/epic-c-reference-and-generation/docs/spike-gemini-sdk.md
      with latency table (5+ reference types), sample req/res, SDK pick
      recommendation (firebase/ai vs @google/generative-ai vs Vertex AI),
      sync-vs-route recommendation for generateDesign, GO/NO-GO. c13/c14
      reference the artifact's SDK pick.

description: |
  Slice 1 of the structured outline. The hard gate that the rest of Epic C
  rests on. Run real reference-guided generation against Gemini 2.5 Flash
  Image to answer two questions definitively before c13/c14 implementation:

  1. **Quality**: does Gemini produce "stylized-but-recognizable nail design
     material" from 5+ reference types (kickoff-decisions #12 acceptance bar)?
     If yes → GO; if no → NO-GO and the provider boundary at lib/ai/generate.ts
     swaps to FLUX.1-kontext or gpt-image-1 without changing upstream contracts.
  2. **SDK + runtime**: which SDK runs cleanly on Next.js Node server runtime?
     Architect preference is `@google/generative-ai` (Node-canonical); the
     research brief flagged that context7 only returned browser-oriented
     `firebase/ai` samples. Vertex AI is a third option if Google Cloud auth
     is preferred over a single API key.

  The spike is THROWAWAY by design. A `app/spike/gemini/page.tsx` server
  component or `tests/spike/gemini.spec.ts` is allowed but disposable — the
  durable artifact is the markdown record, not the spike code. No production
  wiring of `lib/ai/generate.ts`, no `generations` row writes, no UI state
  beyond what's needed to drive the spike.

  Latency observation matters: if generation P95 latency exceeds ~30s, c14
  must use a route handler with streaming progress rather than a single-shot
  server action. The spike measures this and recommends.

  No UI surface ships from this story. The /design/new workspace lands in
  c10. This story exists only to make c13–c17 implementable with confidence.

acceptance_criteria:
  - 'Given the GEMINI_API_KEY (or provider-equivalent) is provisioned in `.env.local` via the secret-rotation script pattern, when the spike runs against 5+ reference types (e.g., minimal nail art, complex patterned nail art, abstract palette, nature-inspired pattern, fashion-editorial), then a latency value (P50/P95) and a sample output image is recorded for each.'
  - 'Given the spike artifact exists at `.pHive/epics/epic-c-reference-and-generation/docs/spike-gemini-sdk.md`, when TPM reads it, then it contains: latency table (one row per reference type), sample request payload (one), sample response payload (one), SDK comparison table (firebase/ai vs @google/generative-ai vs Vertex AI), sync-vs-route recommendation for generateDesign, explicit GO/NO-GO verdict, and SDK lock recommendation with rationale.'
  - 'Given the SDK lock recommendation, when c13/c14 reference it, then those stories install only the recommended SDK (no parallel installation of all three).'
  - 'Given the GO/NO-GO verdict is GO, when downstream stories (c13–c17) plan their tests, then they assume the recommended SDK and runtime path are stable. Given NO-GO, then the epic pauses for orchestrator + Don to pick a fallback provider before c13 starts.'
  - 'Given throwaway spike code (e.g., `app/spike/gemini/page.tsx` or `tests/spike/`), when integrate runs, then that code is either deleted in this story or marked for deletion at end of c14 — it does NOT remain in the durable codebase.'
  - 'Given the spike consumes a real API key, when integrate runs, then `.env.example` documents the required env name (e.g., `GEMINI_API_KEY=`) but the actual key value never appears in commits, chat, or the artifact markdown.'
  - 'Given the architect preference is `@google/generative-ai`, when the SDK comparison runs, then `firebase/ai` is included as a candidate but evaluated against the actual server-runtime constraint (not a paper preference).'

steps:
  - id: research
    description: |
      Max 3 focused questions:
      (1) Gemini 2.5 Flash Image multimodal request shape — what's the exact
      contents-array structure for "primary reference image + N secondary
      reference images + text prompt + style hint"? Confirm via context7
      lookups for `@google/generative-ai` Node SDK and `firebase/ai` web SDK
      to compare request shapes side-by-side.
      (2) Authentication — `@google/generative-ai` uses an API key; Vertex AI
      uses ADC / service account; `firebase/ai` uses the existing Firebase
      app config but requires App Check on the client. For a Next.js Node
      server runtime calling from a server action, which auth model has the
      least friction?
      (3) Latency baseline — what's the published or community-reported P50
      latency for Gemini 2.5 Flash Image multimodal requests (4 input images
      + prompt → 1 output image)? Used to decide whether server-action vs
      route-handler-with-streaming is the right transport in c14.

      Read the research-brief Open Questions §6.1 and §6.2 for prior framing.
      Read .pHive/planning/structured-outline.md Slice 1 (lines 132–180) for
      the outline's framing. Read memory `feedback_secret_rotation_no_releak`
      for the API-key handling pattern.
    agent: researcher
  - id: test-spec
    description: |
      Write the verification harness BEFORE running the spike. The "tests"
      here are the spike measurement procedure, not vitest assertions.

      Produce `.pHive/epics/epic-c-reference-and-generation/docs/spike-gemini-sdk.md`
      with empty-but-structured sections:

      ```
      # Gemini 2.5 Flash Image — Spike + SDK Decision

      ## Reference set (5+ types)
      | # | type | primary ref source | secondary refs | prompt |
      | --- | --- | --- | --- | --- |
      | 1 | minimal-nail-art | <pin URL or upload> | ... | ... |
      | 2 | complex-patterned | ... |
      | 3 | abstract-palette | ... |
      | 4 | nature-inspired | ... |
      | 5 | fashion-editorial | ... |

      ## Latency table
      | # | type | SDK | P50 latency | P95 (3 runs) | output quality (1-5) |

      ## Sample request payload
      ```json
      // one representative request

      ## Sample response payload
      ```json
      // one representative response (truncated bytes ok)

      ## SDK comparison
      | criterion | @google/generative-ai | firebase/ai | Vertex AI |
      | server-runtime support | ... |
      | auth model | API key | App Check + Firebase | ADC / SA |
      | streaming support | ... |
      | published Node samples | ... |
      | bundle weight | ... |

      ## sync-vs-route recommendation
      <one paragraph: server action OK if P95 < 30s, otherwise route + stream>

      ## GO / NO-GO
      Verdict: <GO | NO-GO>
      Rationale: <one paragraph>

      ## SDK lock
      Recommendation: <SDK name + version>
      Rationale: <one paragraph>
      ```

      Tester also produces:
      - The 5-row reference-set spec (5+ rows REQUIRED). Each row names a
        primary reference (Pinterest pin URL or local fixture path),
        secondary refs, and prompt text.
      - A go/no-go evaluation rubric: 3 of 5 reference types must produce
        "stylized-but-recognizable" output to count as GO. <3 = NO-GO.
      - The latency rubric: P95 < 30s = sync-eligible; ≥ 30s = route + stream.

      DO NOT write vitest assertions for the spike code itself — the spike
      is measured manually + recorded in the artifact. Quality is reviewer
      judgment, not automated.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Run the spike. Make the artifact populate.

      1. Provision GEMINI_API_KEY in `.env.local` via the local script
         pattern from memory `feedback_secret_rotation_no_releak`. The key
         value MUST NOT appear in chat, commits, or the artifact markdown.
         Add `.env.example` entry: `GEMINI_API_KEY=`.

      2. Install ONE candidate SDK first (architect preference:
         `@google/genai` v1.50.1+; the older `@google/generative-ai`
         package reached EOL 2025-08-31 — DO NOT install it). Wire a
         throwaway harness:
         - `app/spike/gemini/page.tsx` server component that takes a
           reference set (hard-coded fixture) and renders the result image
         - OR `tests/spike/gemini.spec.ts` that runs from the command line
           and writes outputs to `.pHive/epics/epic-c-reference-and-generation/docs/spike-outputs/`

      3. Run all 5 reference-type rows. Capture:
         - P50 + P95 latency (3 runs each row)
         - Output image quality (1-5 reviewer score)
         - Sample request + response payloads (one row, copy verbatim into artifact)

      4. If `@google/generative-ai` produces NO-GO quality, ALSO run a
         minimal `firebase/ai` comparison with one row to confirm the issue
         is the model, not the SDK. Skip this step if `@google/generative-ai`
         produces GO.

      5. Populate the artifact markdown end-to-end:
         - All rows of the latency table
         - One sample request + one sample response
         - SDK comparison table (mark "untested" cells honestly — don't
           fabricate data for SDKs not actually run)
         - sync-vs-route recommendation based on observed P95
         - GO / NO-GO verdict
         - SDK lock recommendation

      6. Throwaway code disposition:
         - `app/spike/gemini/page.tsx` (if used): mark for deletion in c14
           reviewer step OR delete in this story's integrate step.
         - `tests/spike/gemini.spec.ts` (if used): same.
         - `.pHive/epics/epic-c-reference-and-generation/docs/spike-outputs/`
           image samples: keep — they're durable evidence supporting the
           GO/NO-GO call.

      DO NOT: wire `lib/ai/generate.ts` (c14's job). DO NOT: write
      `generations` rows. DO NOT: build `/design/new` UI. DO NOT: install all
      three candidate SDKs in parallel — install one, run, install second
      only if first fails GO threshold.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the spike answered the gate questions cleanly without sprawling.

      - Artifact exists at the documented path. All sections populated. No
        "TODO" or "TBD" sections in the GO / NO-GO or SDK lock blocks.
      - Latency table has at least 5 rows + P50/P95 columns + quality scores.
      - GO / NO-GO verdict is explicit (not hedged) with one-paragraph
        rationale tied to the 3-of-5 quality rubric.
      - SDK lock recommendation names a single SDK + version. If "untested"
        cells appear in the SDK comparison, they're labelled honestly.
      - sync-vs-route recommendation cites the observed P95.
      - GEMINI_API_KEY is in `.env.local` only — confirm via grep that the
        key value does NOT appear anywhere under git tracking
        (`git grep "<first-6-chars-of-key>"` should return nothing).
      - `.env.example` has the new entry with no value.
      - No production wiring of `lib/ai/generate.ts` (c14's job). No
        `lib/types.ts` Generation/Reference/Design additions (c3's job).
      - Throwaway spike code is either deleted or has a clear deletion
        marker for c14.
      - If verdict is NO-GO, story stops at review and SendMessage is sent
        to team-lead flagging the gate failure before integrate.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c1-gemini-spike-sdk-decision`.
      Commit: `feat(c1): Gemini 2.5 Flash Image spike + SDK decision artifact`.
      Files committed: spike-gemini-sdk.md, .env.example update,
      .pHive/.../spike-outputs/<images>. Throwaway spike code: deleted before
      commit OR retained with a `// REMOVE_BEFORE_C14` comment if c14 review
      will sweep it.

      DO NOT commit GEMINI_API_KEY value. DO NOT commit anything containing
      the literal API key string. Pre-commit grep guard (manual).
    agent: integrator
    depends_on: [review]

