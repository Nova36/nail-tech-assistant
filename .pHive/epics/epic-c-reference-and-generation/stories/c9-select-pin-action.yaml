design_decisions:
  - decision: 'Server action (NOT route handler) per epic.yaml api:surface-boundary lock'
    rationale: 'Pinterest pin ingest is a JSON-only mutation; server action is the idiomatic Next.js path with cleaner client integration (`startTransition` + `useFormState`). Route handler reserved for c7 multipart only.'
  - decision: 'Action file at `app/(authenticated)/design/actions.ts` (NOT `design/new/actions.ts`)'
    rationale: 'c10 createDesign also lives in this file. Co-locating design-flow actions at the parent route group lets future design-flow actions (c16 generateDesign?) extend the same file. Alternative is per-route-segment files, but the existing repo pattern (`app/(authenticated)/pinterest/actions.ts`) co-locates by feature, not by route.'
  - decision: 'Discriminated envelope return — NO thrown errors'
    rationale: 'Existing `pinterest/actions.ts` throws raw `Error` on failure (browse-only, simpler UX). Epic C ingest needs richer error UI (token-invalid vs rate-limit vs no-image-variant), so envelope is mandatory. Aligns with c6/c7/c8/loginAction patterns.'
  - decision: 'No retry inside the action'
    rationale: 'FR-C-7 (one silent retry) applies to GENERATION, not reference ingest. c14/c16 own that behavior. Pin ingest failures are explicit user-facing — UI in c11 lets the user retry the click. Adding silent retry here would hide rate-limit signals.'
  - decision: 'No idempotency / dedup against existing references'
    rationale: 'A user can validly want two reference docs from the same Pinterest pin (e.g., as inspiration for two different designs). Dedup at action layer prevents that. UX may surface "you already have this pinned" in a future epic; out of v1 scope.'
  - decision: 'Defensive `pinId` validation at action layer (not just UI)'
    rationale: 'Server actions are callable by any code with the session cookie + binding ID; defense-in-depth means revalidating inputs at the action even when the UI guarantees them.'

cross_cutting:
  - concern: 'security-rules'
    notes: 'session uid is the ONLY source of `userId` for the ingest call. Per c4 firestore.rules + storage.rules, any UID drift would deny at the rules layer. Action is the third defense (UI, action, rules).'
  - concern: 'error-handling'
    notes: 'Verbatim propagation of `IngestPinterestPinResult` reasons. UI in c11 maps each reason to specific copy. Test (10) ensures no reason gets silently dropped or coerced.'

risks:
  - severity: low
    description: 'A future story adds a new reason to `IngestPinterestPinResult` and forgets to update c11 UI mapping → falls through to a generic error message'
    mitigation: 'c11 UI uses TypeScript exhaustiveness check (`switch` with `default: never`) on the reason union. Adding a reason without updating UI = compile error in c11.'
  - severity: low
    description: 'Server action binding leak — the action ID exposed to the client could be invoked with a forged binding'
    mitigation: "Next.js generates server-action binding IDs that include a hash; cross-origin binding invocation requires the user's session cookie. The action verifies session uid; without auth, returns `unauthorized`. Acceptable residual."

