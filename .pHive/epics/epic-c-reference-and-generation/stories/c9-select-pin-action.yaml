id: c9-select-pin-action
epic: epic-c-reference-and-generation
title: 'selectPinterestPin server action — thin wrapper around ingestPinterestPin with session uid + discriminated envelope'
status: pending
complexity: low
methodology: tdd
depends_on: [c6-pinterest-ingest, c8-reference-set-builder]

escalations_addressed:
  - trigger: api:surface-boundary
    severity: moderate
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      LOCKED as server action (NOT route handler). Per epic.yaml
      api:surface-boundary escalation: server actions are the canonical
      mutation surface for Epic C; route handlers are reserved for
      multipart (c7 only) and existing /api/auth/session, /api/health.
      This story commits the server-action choice for the Pinterest pin
      ingest flow.
  - trigger: data-model:contract-stability
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Action returns the c6-defined IngestPinterestPinResult discriminated
      envelope verbatim. No reshaping at the action boundary. UI in c11
      pattern-matches on `result.ok` and `result.reason` directly.

description: |
  Thin server action wrapper around `ingestPinterestPin` from c6. The
  action's only jobs:

  1. Read session uid from `lib/firebase/session.ts` (`getSession()`).
  2. Reject if no session (return `{ ok: false; reason: 'unauthorized' }`).
  3. Validate `pinId` is a non-empty string (defensive; UI should not
     send empty but be loud about it).
  4. Call `ingestPinterestPin({ userId: session.uid, pinId })`.
  5. Return the result envelope verbatim.

  No additional business logic. No retry. No cross-validation against
  existing references (idempotency is c11's UX problem if it matters).

  This is the smallest story in batch 2. The substantive work is c6 (the
  ingest function) and c11 (the UI that calls this action). c9 exists as
  a discrete story so the action surface is reviewed independently of
  the ingest function — defense in depth on auth context.

acceptance_criteria:
  - 'Given an authenticated session for `alice` and `selectPinterestPin("p1")` is called from a client component, when the action runs, then it calls `ingestPinterestPin({ userId: "alice-uid", pinId: "p1" })` and returns the result envelope.'
  - 'Given no authenticated session, when `selectPinterestPin("p1")` is called, then it returns `{ ok: false; reason: "unauthorized"; message }` without invoking `ingestPinterestPin`.'
  - 'Given an empty `pinId`, when the action validates, then it returns `{ ok: false; reason: "invalid_input"; message }` without invoking `ingestPinterestPin`.'
  - 'Given the action is exported from a file with the `"use server"` directive, when Next.js compiles, then the action is callable from client components via the server actions binding mechanism.'
  - 'Given `ingestPinterestPin` returns `{ ok: true; reference }`, when the action propagates, then the returned envelope shape is `{ ok: true; reference }` — no field renaming or stripping.'
  - 'Given `ingestPinterestPin` returns `{ ok: false; reason: "rate_limit"; message }`, when the action propagates, then the returned envelope is `{ ok: false; reason: "rate_limit"; message }` — c11 UI distinguishes rate_limit from other reasons.'
  - 'Given the action file is grepped for SDK imports, when inspected, then it does NOT import `firebase-admin/*` or `lib/firebase/server` directly — all I/O goes through `lib/references/ingest`.'

steps:
  - id: research
    description: |
      Max 1 focused question:
      (1) Server action file placement — the existing pattern is
      `app/(authenticated)/pinterest/actions.ts` (loadMoreBoards,
      loadMorePins). Should `selectPinterestPin` live in the same file or
      in a NEW `app/(authenticated)/design/new/actions.ts`?

      Recommendation: NEW file at `app/(authenticated)/design/actions.ts`
      (note: not `design/new/actions.ts` — the action surface for design
      flows lives at the parent route group so c10 createDesign can land
      in the same file). The Pinterest browse actions stay in their
      existing file. Confirm during research.

      Read `app/(authenticated)/pinterest/actions.ts` for the existing
      pattern (it throws raw Error on failure; this story uses the
      discriminated envelope per c6 pattern, NOT throw).
    agent: researcher
  - id: test-spec
    description: |
      Write failing tests BEFORE implementation. Action layer = thin =
      tests focus on the auth + propagation contract.

      - tests/unit/actions/select-pinterest-pin.test.ts —
        (1) Mock `getSession()` to return `{ uid: "alice-uid", email: ... }`
        (2) Mock `ingestPinterestPin` to return `{ ok: true; reference }`
        (3) Call `selectPinterestPin("p1")`
        (4) Assert `ingestPinterestPin` was called with `{ userId:
            "alice-uid", pinId: "p1" }` (NOT a request-body uid)
        (5) Assert returned envelope is `{ ok: true; reference }`
            (verbatim propagation)

      - tests/unit/actions/select-pinterest-pin-auth-context.test.ts —
        (6) Mock `getSession()` to return null → `{ ok: false; reason:
            "unauthorized" }`, `ingestPinterestPin` NOT called
        (7) Mock `getSession()` to return `{ uid: "" }` (empty uid) →
            `unauthorized`, `ingestPinterestPin` NOT called
        (8) Empty pinId `""` → `{ ok: false; reason: "invalid_input" }`,
            `ingestPinterestPin` NOT called
        (9) Whitespace-only pinId `"   "` → `invalid_input`

      - tests/unit/actions/select-pinterest-pin-propagation.test.ts —
        (10) Each error reason from ingest (`invalid_token`,
             `insufficient_scope`, `not_found`, `rate_limit`, `network`,
             `no_image_variant`, `unsupported_media_type`,
             `image_fetch_failed`, `storage_failure`,
             `firestore_failure`) propagates verbatim — no reshaping
        (11) `ingestPinterestPin` happy-path response propagates verbatim

      Tests use vitest's `vi.mock` for the dependencies. No MSW. No
      emulator (action layer is testable in isolation).
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Make failing tests pass. Single small file.

      ```ts
      // app/(authenticated)/design/actions.ts
      'use server';

      import { getSession } from '@/lib/firebase/session';
      import {
        ingestPinterestPin,
        type IngestPinterestPinResult,
      } from '@/lib/references/ingest';

      export type SelectPinterestPinResult =
        | IngestPinterestPinResult
        | { ok: false; reason: 'unauthorized' | 'invalid_input';
            message: string };

      export async function selectPinterestPin(
        pinId: string,
      ): Promise<SelectPinterestPinResult> {
        const session = await getSession();
        if (!session?.uid) {
          return { ok: false, reason: 'unauthorized',
                   message: 'sign in required' };
        }

        const trimmed = (pinId ?? '').trim();
        if (!trimmed) {
          return { ok: false, reason: 'invalid_input',
                   message: 'pinId is required' };
        }

        return ingestPinterestPin({
          userId: session.uid,
          pinId: trimmed,
        });
      }
      ```

      DO NOT: import firebase-admin directly (all I/O goes through
      `lib/references/ingest`). DO NOT: add retry logic (caller decides).
      DO NOT: add idempotency check (UX problem, not action problem).
      DO NOT: add rate limiting (defer to a future epic if real abuse
      emerges).

      If c10 implements `createDesign` in the same file, leave a comment
      placeholder for it. c10 owns that delivery.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the action is thin and the auth contract is correct.

      - File starts with `'use server'` directive on its own line.
      - Action reads uid from session ONLY — no `userId` parameter.
      - Empty / whitespace-only pinId rejected as `invalid_input`.
      - Empty session uid rejected as `unauthorized`.
      - `ingestPinterestPin` result is propagated verbatim — no
        renaming or stripping. Test (10) covers every reason.
      - Action file does NOT import firebase-admin directly. Reviewer
        grep.
      - Result type union includes the action-level reasons
        (`unauthorized`, `invalid_input`) PLUS all `IngestPinterestPinResult`
        reasons.
      - All vitest tests pass.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c9-select-pin-action`.
      Commit: `feat(c9): selectPinterestPin server action wrapping ingest`.
    agent: integrator
    depends_on: [review]

