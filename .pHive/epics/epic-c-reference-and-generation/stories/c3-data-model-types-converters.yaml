design_decisions:
  - decision: 'Design.secondaryReferenceIds is `string[]` ordered array (NOT a `design_secondary_references` subcollection)'
    rationale: 'design-discussion §My Proposed Approach + research-brief Open Q4. v1 single-user; bounded list (UX caps secondary count); single-doc read; single-doc write. Subcollection is overkill until "100+ refs per design" is a real requirement. Locked here so c4 (rules) and c9 (design create) can build against a stable shape.'
  - decision: 'Reference.source is `"pinterest" | "upload"` literal union, not polymorphic schema variants'
    rationale: 'Both ingest paths produce the SAME record shape (per FR-C-1). Source discriminates origin metadata; downstream code (c13 buildGeminiRequest) does not care about origin. Simpler than tagged-variant `{ source: "pinterest"; pinId: string } | { source: "upload"; localPath: string }` — the variant constraint is enforced by ingest validation in c6, not the type.'
  - decision: 'Generation lifecycle states are exactly `"pending" | "success" | "failure"` — no `"cancelled"`, no `"queued"`, no `"streaming"`'
    rationale: "Outline Slice 4 Interfaces (line 296-308) names exactly these three. Adding states without a use case is speculative. Cancellation is not a v1 concern; streaming progress is c14's decision (per c1 spike) but does not require a new persisted state — streaming happens transport-side, the row stays `pending` until terminal."
  - decision: 'GenerationErrorCode union is `"refusal" | "rate_limit" | "network" | "unknown"`'
    rationale: 'Outline Slice 4 Interfaces (line 280) names exactly these four. Maps cleanly onto the one-silent-retry policy from FR-C-7: `network` and `rate_limit` are retryable; `refusal` and `unknown` are not. lib/generations/errors.ts in c14/c16 owns the classification logic.'
  - decision: 'Nullable fields are explicit `| null` (never optional `?: T`)'
    rationale: 'Firestore stores `null` and missing-field as semantically distinct values. Optional `?: T` confuses "field absent in this document" with "field set to null". Explicit `| null` removes the ambiguity. Converters default missing → null (per acceptance criteria).'
  - decision: 'Converters live in `lib/firestore/converters/` (NOT `lib/firebase/converters/` or `lib/db/converters/`)'
    rationale: 'Outline Slice 3 Changes #2 names this exact path. Matches the principle that `lib/firebase/` holds SDK init + auth, while `lib/firestore/` holds pure data shaping. Future converters (e.g., `chat_turns` if Slice 7 ever ships) follow the same pattern.'
  - decision: 'Generation.userId is denormalized onto the row (not derived through Design.userId)'
    rationale: 'c4 storage.rules + firestore.rules validate `request.auth.uid == resource.data.userId` directly; rules cannot do a get() lookup to Design without a performance hit. Denormalization keeps rules cheap. c15 lifecycle ensures consistency at write-time.'
  - decision: 'Outline Slice 3 lists `nailShape: "almond" | "coffin" | "square" | "stiletto"`; lib/types.ts has `"almond" | "coffin" | "square" | "round" | "oval"` — DEFER to lib/types.ts as source of truth'
    rationale: 'lib/types.ts is durable code; outline is planning. If "stiletto" matters for v1 product, that''s a separate change in lib/types.ts (probably needed) but not c3 scope. c3 reuses NailShape verbatim. Surface to TPM for resolution before c10 ships the shape selector.'

cross_cutting:
  - concern: 'data model'
    notes: "This story is the canonical place where Epic C's domain types are defined. Future epics that touch references/designs/generations import from these files. Adding a field requires updating the type, the converter, and the converter tests in lockstep — no shortcuts. Memory `feedback_silent_catches_cost_time` analog: silent type drift between document data and code is the type-system equivalent of a silent catch."

risks:
  - severity: medium
    description: 'Subcollection-vs-array decision proves wrong if a future user adds 100+ secondary references to one design'
    mitigation: 'design-discussion locks array for v1 single-user. If the constraint becomes real, migration is a one-time backfill from `Design.secondaryReferenceIds` to a `design_secondary_references` subcollection, with `Design.secondaryReferenceIds` retained as a denormalized list for backwards-compat. Out of scope for c3.'
  - severity: medium
    description: 'NailShape outline-vs-code drift (`stiletto` missing in lib/types.ts NailShape) creates downstream confusion in c10 shape selector'
    mitigation: 'design_decisions explicitly defers to lib/types.ts as source of truth + flags the divergence. Reviewer step surfaces to TPM. If product needs stiletto, separate atomic change to lib/types.ts before c10.'
  - severity: low
    description: 'Converter validation throws are too aggressive — a half-written document mid-migration crashes reads'
    mitigation: 'Converters validate the discriminated unions only (status, source, errorCode, nailShape). Other fields default to null/empty. Throws are reserved for closure violations (e.g., `status: "cancelled"`) which indicate a code bug, not data drift.'
  - severity: low
    description: 'firebase-admin v13 FirestoreDataConverter signature differs from web SDK; tests pass but production fails at runtime'
    mitigation: 'researcher question (1) confirms the v13 admin signature via context7 before implementation. Implement step uses the admin SDK type explicitly.'

