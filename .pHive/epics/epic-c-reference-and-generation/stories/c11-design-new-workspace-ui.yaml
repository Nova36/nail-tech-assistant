description: |
  Vertical Slice 3 user-facing surface. A 3-step wizard at `/design/new`
  with progressive disclosure — chosen after Don reviewed an earlier
  single-screen draft and called it overwhelming for the non-power-user
  audience (home use; wife as primary user). Each step has one decision
  class.

  **Step 1 — Inspiration** (`/design/new`, internal state `step=1`):
  Pinterest browse panel + upload tile. User picks any number of pins
  and/or upload references with NO primary/secondary marking, NO prompt,
  NO shape selector. Soft cap of ~8 references (warning, not block per
  wireframe annotation). "Continue →" gates on ≥1 reference picked.

  **Step 2 — Direction** (same `/design/new` URL, internal state `step=2`):
  Pinterest browse + upload tile are HIDDEN. Step 1 selections become
  the working set displayed as a strip/grid of reference cards. User
  marks ONE primary, orders supporting refs, optional prompt, optional
  nail shape (Almond default; Coffin/Square/Stiletto). Footer "← Back"
  preserves all selections; right CTA reads "Generate →" since clicking
  it fires c10 createDesign + transitions to Step 3.

  **Step 3 — Confirm** (`/design/[designId]`): owned by c17. Step 2 →
  Step 3 transition fires `createDesign` (c10), then routes to the new
  designId URL where c17 renders pending → success | failure. c17
  reuses c11's `<WizardProgressStrip>` chrome.

  US-C-1 (mixed-source reference assembly — Step 1), US-C-2 (prompt as
  first-class input — Step 2), US-C-3 (durable draft create — Step 2 →
  Step 3 transition) are SHIPPED at end of this story. US-C-4 / US-C-5
  (actual generation, raw preview, guided failure) are c17.

  Pinterest integration is **embedded** in Step 1's browse panel, not
  navigated-to. Per c12 user decision: `/pinterest/*` routes stay
  reachable by direct URL but are unsurfaced from sidebar; pin selection
  lives INSIDE the Studio reference picker, not as a separate
  destination.

  This is a high-complexity story because it ties together c6/c7/c8/c9/
  c10 (every persistence + action surface in batch 2), produces the
  wizard shell + step components, and locks the seam to c17. Wireframe
  Touchpoint 1 is APPROVED (`wireframe-v2-wizard.html`); implement
  against that artifact with no deviation.

acceptance_criteria:
  # ── Wizard chrome (both steps) ───────────────────────────────────────
  - 'Given an authenticated user navigates to `/design/new`, when the page renders, then `<WizardProgressStrip>` shows three steps (1 Inspiration · 2 Direction · 3 Confirm) with Step 1 active and Steps 2 + 3 inactive. URL stays `/design/new` across Step 1 ↔ Step 2 transitions; no URL hashing.'
  - 'Given the user is on Step 2 and clicks "← Back", when state transitions, then Step 1 renders with all previously-selected references still in the working set (state preserved; no re-fetching).'
  # ── Step 1 — Inspiration (US-C-1: mixed-source reference assembly) ──
  - 'Given Step 1 renders, when the user inspects the page, then it shows: (a) embedded Pinterest browse panel reusing b2/b3 components via `<SelectablePinCard>`, (b) `<UploadZone>` drag-drop tile, (c) selection counter ("0 references"), (d) footer "Continue →" button DISABLED with hint "Pick at least 1 reference".'
  - 'Given Step 1 with 0 references, when the user clicks a Pinterest pin and c9 `selectPinterestPin` returns `{ ok: true; reference }`, then the reference is added to the working set, the selection counter increments, the pin shows a selected check overlay, and "Continue →" enables.'
  - 'Given Step 1 and the user drops a JPEG into the upload tile, when c7 `/api/references/upload` returns `{ ok: true; reference }`, then the reference is added to the working set; "Continue →" enables (or stays enabled).'
  - 'Given Step 1 with 4 references picked (mix of pins + uploads), when the selection counter is observed, then it shows "4 references" + "Continue →" enabled.'
  - 'Given Step 1 with 9 references picked (above ~8 soft cap), when state updates, then a non-blocking warning banner advises ~8 is recommended; "Continue →" remains enabled (soft cap, not hard block).'
  - 'Given Step 1 upload returns `{ ok: false; reason: "file_too_large" }`, when the UI handles it, then it shows an inline error naming the 10 MB cap; working set unchanged.'
  - 'Given Step 1 c9 returns `{ ok: false; reason: "invalid_token" }`, when the UI handles it, then it inlines `tokenInvalidCopy` from `lib/pinterest/token-replacement-copy.ts` (b4 reuse); working set unchanged.'
  - 'Given Step 1 with ≥1 reference, when the user clicks "Continue →", then state transitions to Step 2 (no createDesign fired yet); URL remains `/design/new`.'
  # ── Step 2 — Direction (US-C-2: prompt; US-C-3: durable draft create) ─
  - 'Given Step 2 entered with 4 working-set references, when the page renders, then Pinterest browse + upload tile are HIDDEN. The 4 references display as a strip/grid of reference cards. NO primary marker yet. "Generate →" DISABLED with hint "Mark one reference as primary".'
  - 'Given Step 2 and the user clicks one reference card to mark it primary, when state updates, then that card shows the primary marker (visually distinct per wireframe), the other cards remain available as supporting refs, and "Generate →" enables.'
  - 'Given Step 2 with primary set, when the user clicks a different reference, then primary swaps to that reference (single-primary invariant; no clicking-promotes-secondary auto-shuffle).'
  - 'Given Step 2 with primary set + 3 supporting refs, when the user reorders via drag or up/down arrow per wireframe, then `secondaryReferenceIds` order in component state updates to match the new visual order.'
  - 'Given Step 2 prompt input accepts text up to 1000 chars, when the user types ≤1000 chars, then prompt is preserved in component state; above 1000 chars, the input shows "1001 / 1000 — too long" and "Generate →" disables with reason "Prompt too long".'
  - 'Given Step 2 nail shape selector, when the page first renders Step 2, then the default selected shape is `almond`. Clicking a different shape (coffin / square / stiletto) updates state. (`round`/`oval` preserved per `lib/types.ts` NailShape; wireframe locks visible shapes.)'
  - 'Given Step 2 with primary set + 3 supporting + prompt + shape (valid), when the user clicks "Generate →", then c10 `createDesign` fires with `{ primaryReferenceId, secondaryReferenceIds: [...ordered], promptText, nailShape }`; on `{ ok: true; designId }`, the UI routes to `/design/[designId]` for c17 pending state.'
  - 'Given Step 2 c10 returns `{ ok: false; reason: "rules_denied" }`, when the UI handles it, then an inline "Permission denied — please sign in again" banner appears with a link to `/login`; working set + primary + prompt + shape state are preserved (user does not lose work).'
  - 'Given Step 2 user removes the primary marker, when state updates, then primary returns to null and "Generate →" disables with the original "Mark one reference as primary" hint. NO secondary is auto-promoted.'
  # ── A11y + breakpoints ──────────────────────────────────────────────
  - 'Given screen-reader use, when wizard step transitions or working-set updates, then `aria-live="polite"` announces the change. `<WizardProgressStrip>` exposes step state via `aria-current="step"`. Touch targets meet tablet sizing convention from `_a11y-spec.md`.'
  - 'Given a tablet-landscape viewport (1280×800 typical), when the page renders, then layout adapts per `wireframe-v2-wizard.html` Step 1 + Step 2 frames (specific column count + breakpoints locked by wireframe).'
  # ── Boundary discipline ─────────────────────────────────────────────
  - 'Given grep across `app/**` and `components/**`, when searching for direct `firebase-admin` imports in client components, then NONE are found — all data flows through c9/c7/c10 only.'

steps:
  - id: research
    description: |
      Max 3 focused questions:
      (1) Embedded Pinterest browse — can we reuse `app/(authenticated)/
      pinterest/page.tsx` server component output as a slot inside
      `/design/new` via an `import` of the inner component? Or do we
      need to refactor `components/pinterest/BoardGrid.tsx` etc to be
      embeddable without the route shell? Read the b2/b3 component files
      to confirm reusability shape.
      (2) Pin click → c9 action wiring — `PinCard.tsx` from b3 currently
      has no click handler (browse-only). Do we ADD a click handler in
      this story (modifying b3 component) or wrap in a higher-order
      `<SelectablePinCard>`? Recommendation: HOC wrapper at
      `components/design-new/SelectablePinCard.tsx` to keep Epic B
      browse code stable.
      (3) Routing on createDesign success — does the user land on a
      `/design/{designId}` route (not yet built; c17's domain) or stay
      on `/design/new` with a "generation in progress" overlay?
      Wireframe decides; placeholder is `console.log` until c17 lands.

      Read `references/wireframe-protocol.md` Touchpoint 1 protocol.
      Read existing b2/b3 components for the pattern this story extends:
      - `components/pinterest/BoardGrid.tsx`, `BoardCard.tsx`
      - `components/pinterest/PinGrid.tsx`, `PinCard.tsx`,
        `PinGridSkeleton.tsx`, `InfiniteScrollSentinel.tsx`
      - `app/(authenticated)/pinterest/page.tsx`,
        `app/(authenticated)/pinterest/[boardId]/page.tsx`
    agent: researcher
  - id: ui-design
    description: |
      COMPLETE — Touchpoint 1 APPROVED 2026-04-29 by Don.

      Canonical artifact: `.pHive/wireframes/epic-c-reference-and-generation/c11-design-new-workspace/wireframe-v2-wizard.html` (1198 lines).
      Supersedes: `wireframe-v1-single-screen.html` (preserved for history; do
      NOT reference from implementation).

      The implement step takes wireframe-v2-wizard.html as the AUTHORITATIVE
      visual + interaction source — including:
      - Wizard progress strip (1 Inspiration → 2 Direction → 3 Confirm) with
        ✓ marks on completed steps + clickable revisit (state-preserving)
      - Step 1 frames (1.1 empty, plus the populated states shown in the
        wireframe) — Pinterest browse panel + upload tile + selection
        counter + footer "Continue →"
      - Step 2 frames (2.x — working-set strip, primary marker affordance,
        prompt input, shape selector with Almond default + Coffin/Square/
        Stiletto, footer "← Back" + "Generate →")
      - Brand tokens (`--primary: #6b3f5e`, etc.) per wireframe `<style>`
        block — same as Epic A/B
      - All copy strings in the wireframe are canonical for v1 ship.

      No deviation from the approved wireframe without TPM + Don sign-off.
      The ui-designer role for c11 is now record-keeping; substantive design
      is locked.
    agent: ui-designer
    depends_on: [research]
  - id: test-spec
    description: |
      Write failing tests BEFORE implementation. UI-heavy story = lots of
      RTL component tests + a few integration tests.

      AUTHORITATIVE VISUAL SOURCE:
      - .pHive/design/briefs/design-new-workspace.md (+ approved HTML)

      - tests/unit/components/design-new/ReferencePanel.test.tsx —
        (1) Empty state — no primary, no secondaries → "Choose a primary
            reference to begin"
        (2) Primary set → primary card renders, label "Primary"
        (3) Primary + 2 secondaries → primary on top, secondaries in
            input order
        (4) Click "Remove" on primary → calls onRemovePrimary callback
        (5) Click "Remove" on secondary → calls onRemoveSecondary(refId)
        (6) Click "Make primary" on secondary → calls onPromoteSecondary
        (7) aria-live="polite" on the panel root

      - tests/unit/components/design-new/UploadZone.test.tsx —
        (8) Idle state → "Drop photo or click to upload"
        (9) Drag enter → hover state class applied
        (10) Drop a JPEG → calls onFileSelected(file)
        (11) Drop a PDF → onFileSelected NOT called; inline error shown
        (12) Drop file > 10 MB → inline error "max 10 MB"; onFileSelected NOT called

      - tests/unit/components/design-new/PromptInput.test.tsx —
        (13) Type 500 chars → input value matches
        (14) Char count shows "500 / 1000"
        (15) Type 1001 chars → input shows "1001 / 1000 — too long";
             onValid(false) called
        (16) Helper text visible: "text overrides visual cues"

      - tests/unit/components/design-new/ShapeSelector.test.tsx —
        (17) Renders all 5 shapes; default selected: almond
        (18) Click "coffin" → calls onChange("coffin")
        (19) Selected state class applied to active shape

      - tests/unit/components/design-new/GenerateButton.test.tsx —
        (20) Disabled when reasonInvalid is non-empty; tooltip / inline
             reason text matches
        (21) Enabled when reasonInvalid === null
        (22) Click when enabled → calls onGenerate
        (23) Click when disabled → onGenerate NOT called

      - tests/unit/components/design-new/SelectablePinCard.test.tsx —
        (24) Wraps b3 PinCard
        (25) Click → calls onPinSelected(pinId)
        (26) Pending state (during c9 call) → button disabled

      - tests/integration/design-new/page-orchestration.test.tsx —
        (Big integration test using vitest jsdom + RTL):
        (27) Initial render — workspace empty, Generate disabled
        (28) Mock c9 selectPinterestPin → click pin → primary appears
        (29) Click second pin → secondary appears
        (30) Mock c7 upload route → drop JPEG → reference appears
        (31) Type prompt → state updates
        (32) Click "coffin" shape → state updates
        (33) Mock c10 createDesign → click Generate → action called
             with assembled state; routes/logs designId
        (34) Mock c10 returns `rules_denied` → banner shown,
             reference state preserved
        (35) Mock c9 returns `invalid_token` → tokenInvalidCopy shown
             in Pinterest panel inline

      DO NOT write tests for the actual generation flow (c17). DO NOT
      write tests for navigation to `/design/{designId}` post-create
      (c17 owns that route).
    agent: tester
    depends_on: [ui-design]
  - id: implement
    description: |
      Make failing tests pass. UI work — translate the approved wireframe
      brief into Tailwind + brand tokens.

      Files to produce:

      - `app/(authenticated)/design/new/page.tsx` — server component
        entry. Authenticated shell. Renders the workspace client
        component. May fetch initial Pinterest boards via
        `verifyPinterestToken()` + `listPinterestBoards()` (reuse b2
        pattern) for the embedded panel's first paint.

      - `app/(authenticated)/design/new/Workspace.tsx` — client
        component (`'use client'`). Manages state:
        ```ts
        const [primary, setPrimary] = useState<Reference | null>(null);
        const [secondaries, setSecondaries] = useState<Reference[]>([]);
        const [promptText, setPromptText] = useState('');
        const [nailShape, setNailShape] = useState<NailShape>('almond');
        const [pendingAction, setPendingAction] = useState<string | null>(null);
        const [topLevelError, setTopLevelError] = useState<string | null>(null);
        ```
        Composes `<EmbeddedPinterestPanel>` + `<UploadZone>` +
        `<ReferencePanel>` + `<PromptInput>` + `<ShapeSelector>` +
        `<GenerateButton>`. Computes `reasonInvalid` for the Generate
        button. On Generate click: calls c10 `createDesign` with the
        assembled state.

      - `components/design-new/EmbeddedPinterestPanel.tsx` — client
        component wrapping b2/b3 BoardGrid + PinGrid in an inline panel
        (NOT navigating to `/pinterest/*` routes). Manages its own
        boardId state. Each rendered pin uses
        `<SelectablePinCard>` instead of plain `<PinCard>`.

      - `components/design-new/SelectablePinCard.tsx` — client
        component. Imports `b3 PinCard`. On click, calls
        `selectPinterestPin(pin.id)` (from c9) wrapped in
        `startTransition`. On `{ ok: true; reference }`, calls
        `onReferenceAdded(reference)` from props. On
        `{ ok: false; reason }`, calls `onError(reason, message)`.

      - `components/design-new/ReferencePanel.tsx` — client component.
        Renders primary card (bigger) + secondary list (ordered).
        Remove + promote callbacks per acceptance criteria. `aria-live`.

      - `components/design-new/UploadZone.tsx` — client component.
        Drag-and-drop or click-to-upload. POSTs FormData to
        `/api/references/upload` (c7 route) via plain `fetch`.
        On `{ ok: true; reference }`, calls `onReferenceAdded`.
        On error, shows inline error.

      - `components/design-new/PromptInput.tsx` — client component.
        Textarea + char count + onChange / onValid callbacks.

      - `components/design-new/ShapeSelector.tsx` — client component.
        5-button row.

      - `components/design-new/GenerateButton.tsx` — client component.
        Disabled state with inline reason text.

      Reuse b2/b3 components UNMODIFIED:
      - `components/pinterest/BoardGrid.tsx`, `BoardCard.tsx`,
        `PinGrid.tsx`, `PinCard.tsx`, `InfiniteScrollSentinel.tsx`,
        `PinGridSkeleton.tsx`
      - `lib/pinterest/token-replacement-copy.ts` (`tokenInvalidCopy`,
        `insufficientScopeCopy`)

      DO NOT modify b2/b3 components. If a prop is missing
      (e.g., PinCard needs an `onClick` slot), wrap in
      SelectablePinCard rather than retrofit.

      DO NOT add: 5-nail visualizer, save-to-library button, regenerate,
      design detail page, library grid, generation pending overlay (c17).

      DO NOT call firebase-admin from any client component.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the workspace ships a complete US-C-1 / US-C-2 / US-C-3
      flow without bleeding into US-C-4 / US-C-5 territory.

      - `/design/new` renders the four primary surfaces (Pinterest,
        upload, reference panel, prompt+shape+generate) per wireframe.
      - Pinterest is EMBEDDED (no navigation to `/pinterest/*`).
        Reviewer manually verifies BoardGrid + PinGrid render inside
        the panel.
      - SelectablePinCard wraps b3 PinCard without modifying b3.
      - All client components use `'use client'` directive.
      - All actions/routes called through c9, c7, c10 only — no
        firebase-admin imports in client components. Reviewer grep.
      - Generate button disabled-reason text is descriptive (not just
        "disabled").
      - Removing primary does NOT auto-promote a secondary (per
        acceptance criterion 10). Test (5) covers.
      - Token-invalid surfaces use existing copy from b4 (no duplicated
        copy strings). Reviewer grep.
      - 10 MB upload cap matches c7 (no client-side cap drift).
      - Prompt 1000-char cap matches c8 (no drift).
      - Wireframe decisions present in code: column count, breakpoints,
        spacing, brand tokens.
      - All vitest unit + integration tests pass.
      - Reviewer manually loads the page in `pnpm dev` and walks
        through:
        a. Pin click → reference appears
        b. Upload → reference appears
        c. Remove primary → empty state restored (secondaries preserved)
        d. Generate when invalid → button disabled with inline reason
        e. Generate when valid → action called, response logged/routed
      - The dual-persona review fires animations-specialist sidecar via
        `ui:animations append` for: pending-state shimmer on
        SelectablePinCard during c9 call, upload progress, generate
        button transition, prefers-reduced-motion handling.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c11-design-new-workspace-ui`.
      Commit: `feat(c11): /design/new workspace + reference panel + upload + prompt + shape selector`.
      Pre-commit: `pnpm test`, `pnpm test:rules`, `pnpm typecheck`,
      `pnpm lint` must pass.
    agent: integrator
    depends_on: [review]

