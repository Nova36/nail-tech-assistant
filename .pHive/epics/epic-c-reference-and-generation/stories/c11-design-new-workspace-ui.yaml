design_decisions:
  - decision: '3-step wizard (Inspiration → Direction → Confirm), NOT a single overwhelming workspace'
    rationale: 'Don reviewed the original single-screen draft (`wireframe-v1-single-screen.html`) and called it overwhelming for the non-power-user audience (home use, wife as primary user). Wizard with progressive disclosure means each step has ONE decision class — Step 1 is just "what looks interesting", Step 2 is "now make decisions". v2-wizard.html is the approved canonical artifact.'
  - decision: 'Wizard state lives in React component state, NOT URL state or hash routing'
    rationale: 'Simpler "← Back" preservation; no `/design/new#step=2` complexity; entire flow stays at `/design/new` URL. Reference assembly is ephemeral until createDesign succeeds anyway. Future epic could persist drafts to localStorage or auto-save; out of v1 scope.'
  - decision: 'Step 2 HIDES Pinterest browse + upload tile — working set frozen from Step 1'
    rationale: 'Working set is locked when user advances to Step 2; primary marking + ordering happens against that frozen set only. Reduces cognitive load: Step 2 is a Direction decision, not an Inspiration revisit. "← Back" returns to Step 1 with state preserved if user wants to add/remove.'
  - decision: '`createDesign` (c10) fires at Step 2 → Step 3 transition, NOT at Step 1 → Step 2'
    rationale: 'Design draft only persists once user has committed direction (primary chosen + ordered secondaries + prompt + shape). Step 1 → Step 2 is purely client-side; no Firestore write yet. This avoids stranded draft Design docs from users who explore Step 1 but never commit.'
  - decision: 'Step 2 → Step 3 transitions to `/design/[designId]` (c17 owns that route)'
    rationale: 'Clear seam between c11 (compose) and c17 (generate). After createDesign succeeds, c11 calls `router.push(\`/design/${designId}\`)` and Step 3 (Confirm + pending + result) lives entirely in c17''s territory. c17 reuses c11''s `<WizardProgressStrip>` to keep wizard chrome continuous; no chrome duplication.'
  - decision: 'Pinterest pin selection EMBEDDED inside Step 1 (NOT a separate destination)'
    rationale: 'Locked per c12 user decision (option B): Pinterest unsurfaced from sidebar; pin selection lives inside Studio reference picker. Embedding reuses b2/b3 components without page-level navigation.'
  - decision: '`SelectablePinCard` wrapper over b3 `PinCard` — NO modification of b3 component'
    rationale: "Slice scope discipline. b3 is shipped + green; modifying its props for c11 would invite drift. Wrapper composition keeps Epic B browse-only stable AND adds selection behavior cleanly. Future stories follow the same pattern (compose, don't modify)."
  - decision: 'Removing the primary marker in Step 2 does NOT auto-promote a supporting reference'
    rationale: 'Auto-promotion surprises the user. The single-primary invariant resets to null; "Generate →" disables with the original "Mark one reference as primary" hint. User explicitly clicks the next reference to promote.'
  - decision: 'Default nail shape: Almond'
    rationale: 'Per `wireframe-v2-wizard.html` Step 2 frame. Almond is the most common starting shape; Coffin / Square / Stiletto are visible alternatives. (`round` and `oval` remain in lib/types.ts NailShape union but are not surfaced in the v1 wireframe.)'
  - decision: 'Soft cap of ~8 references in Step 1 (warning, NOT block)'
    rationale: 'Per wireframe annotation. Bounded list keeps c8 reference-set builder happy + Gemini request payload reasonable. Warning preserves user agency; if they really want 9+, they can proceed and c14 buildGeminiRequest decides what to send.'
  - decision: 'Wireframe Touchpoint 1 APPROVED — implement against v2-wizard.html with NO deviation'
    rationale: 'Touchpoint 1 closed 2026-04-29 by Don. ui-design step is now record-keeping; substantive design is locked. Deviation requires TPM + Don sign-off as a separate change.'
  - decision: 'Upload uses plain `fetch` (NOT a server action) per c7 route lock'
    rationale: 'c7 explicitly chose route handler for multipart. UploadZone constructs FormData and POSTs via fetch. Acceptable client-server boundary deviation from the otherwise-server-actions stack.'
  - decision: 'Prompt 1000-char cap consistent with c8 builder'
    rationale: 'Keeps client UX in sync with server validation. c11 disables "Generate →" when over cap (UX friendly); c8 rejects when over cap (defense in depth). Single source of truth: const exported from c8.'
  - decision: '`<WizardProgressStrip>` exported from `components/studio/` so c17 can reuse it'
    rationale: 'Wizard chrome continuity across Steps 1-2 (c11) and Step 3 (c17). Avoids duplicating the strip in c17 with a different active state. c17 imports and renders it with `step={3}`.'

cross_cutting:
  - concern: 'security-rules'
    notes: 'Workspace never constructs Firestore paths or Storage paths. All persistence flows through c9/c7/c10 actions/route. c4 firestore + storage rules bounce any forged userId at the rules layer.'
  - concern: 'error-handling'
    notes: 'Three error surfaces: top-level toast/banner (rules_denied, network), inline (Pinterest token errors using b4 copy, upload errors), inline-disabled (Generate button reason). Reviewer enforces no fall-through to generic "An error occurred".'
  - concern: 'ui-major'
    notes: 'Wireframe Touchpoint 1 gates implement. ui-design step in TDD sequence handles approval flow.'
  - concern: 'animations-pending-states'
    notes: 'Animations-specialist sidecar at review step. Concerns: pin selection pending shimmer, upload progress envelope, generate button click transition, prefers-reduced-motion handling. Reuses b2/b3 motion language where applicable.'

risks:
  - severity: high
    description: 'Wireframe rendition 1 / 2 / 3 all rejected by Don → story blocked indefinitely'
    mitigation: "ui-designer iterates with Don through TPM. Touchpoint 1 protocol allows requesting changes / new options. Mother's Day deadline pressure: if all 3 rejected, escalate to scope cut (defer this story's polish, ship MVP layout, iterate post-launch)."
  - severity: high
    description: 'Embedded BoardGrid + PinGrid breaks because b2/b3 components assume route-segment context (e.g., reading boardId from `params`)'
    mitigation: "Researcher question (1) confirms reusability shape. If params-bound, refactor `BoardCard` / `PinGrid` to accept `boardId` as prop instead of `params` — additive prop, doesn't break b2/b3 routes. Test b2/b3 still pass after the prop change."
  - severity: medium
    description: "Drag-and-drop upload doesn't work on tablets (iOS Safari) — drop event fires inconsistently"
    mitigation: '`<UploadZone>` provides BOTH drag-drop AND click-to-pick fallback. Click-to-pick uses standard `<input type="file">` which works everywhere. Researcher confirms.'
  - severity: medium
    description: 'Pinterest token expires mid-session → first pin click returns invalid_token → user confused'
    mitigation: 'c11 inlines b4 tokenInvalidCopy / insufficientScopeCopy when c9 returns those reasons. Same UX language as the page-level views. User has remediation steps right where the error happens.'
  - severity: medium
    description: 'createDesign succeeds but the user does not realize it because c17 navigation is not yet built; success banner is unclear'
    mitigation: 'Placeholder: explicit "Design draft created — generation flow will land in next slice" success banner. Replace when c17 ships. Acceptable interim UX since c11 + c17 ship in the same release cycle.'
  - severity: low
    description: 'Mixed Pinterest + upload state shows visual inconsistency (Pinterest pins from i.pinimg.com, uploads from Firebase Cloud Storage signed URL or proxied)'
    mitigation: 'ReferencePanel renders all references through `next/image` with the same card vocabulary regardless of source. Storage download approach decided in this story or c17 (signed URLs vs proxied).'
  - severity: low
    description: 'Workspace state lost on accidental reload → user reassembles from scratch'
    mitigation: 'Out of v1 scope. Future epic adds draft auto-save or localStorage persistence. Acceptable residual since v1 is single-user single-session typical.'

