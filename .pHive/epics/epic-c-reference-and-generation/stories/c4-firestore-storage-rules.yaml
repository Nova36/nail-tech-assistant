design_decisions:
  - decision: 'Owner check uses `resource.data.userId == request.auth.uid` (NOT path-derived `match /references/{userId}/{refId}`)'
    rationale: 'Outline names `references/{refId}` (flat collection), not `users/{uid}/references/{refId}` (nested). Matches structured-outline Slice 3 Changes #1. Document-field-derived owner is the standard Firebase pattern when collections are flat.'
  - decision: 'Storage paths ARE path-derived: `users/{uid}/references/{refId}.{ext}` and `users/{uid}/generations/{genId}.{ext}`'
    rationale: 'Storage objects are not documents with field data — only the path provides ownership context. Path-derived rules are the only option. This is also why c5 helper exposes `referencePath(uid, refId)` and `generationPath(uid, genId)` — call sites cannot hand-roll paths.'
  - decision: "Owner field on `userId` is IMMUTABLE — alice cannot change her own doc's `userId` to bob"
    rationale: 'Without immutability, alice could chmod her data to bob (or vice versa) by an authorized write. Cheap rule (`request.resource.data.userId == resource.data.userId` on update) closes the gap.'
  - decision: 'Rules do NOT validate cross-document references (e.g., `designs/d1` referencing alice-owned `references/r1`)'
    rationale: 'Cross-doc validation requires `get()` calls in rules — expensive (each get() counts against quota; latency penalty). Validation belongs at ingest (c8/c9), not in rules. Rules enforce ownership of the row being written; ingest enforces cross-doc consistency.'
  - decision: 'Compound indexes ship in c4, NOT lazily on-demand from Firebase console'
    rationale: 'The console-prompted index creation flow is fine for prototyping but creates implicit production deps. Declarative indexes in the repo make production-vs-emulator parity guaranteed. Migration plan in structured-outline Part 3b explicitly names this.'
  - decision: 'Storage emulator port 9199 (not 9099, not 9000)'
    rationale: 'Firebase CLI v15+ default; matches firebase-tools 15.15.0 in package.json. 9099 is auth (already taken).'
  - decision: 'Single rules-test lane (no separate `vitest.config.rules.storage.ts`)'
    rationale: '@firebase/rules-unit-testing v5 supports both surfaces in one initializeTestEnvironment call (research step confirms). One lane, one emulator wrap, one CI run. Defer separation if a future epic finds a real reason.'

cross_cutting:
  - concern: 'security-rules'
    notes: 'This story IS the security audit — every new path has a passing allow + deny test. Default-deny posture preserved by leaving the existing catchall `if false` untouched. Future epics that add collections must follow this pattern (TDD: write deny tests first, then allow tests, then rules).'

risks:
  - severity: high
    description: 'Storage rules permit too much (e.g., wildcard write to `users/{uid}/{path=**}` accidentally allows any object name including `../etc/passwd`-style traversal)'
    mitigation: 'Tests cover cross-user UID mismatch, unauth, and authenticated-but-different-uid. Storage path traversal is not actually possible — Firebase Storage paths are URL-safe strings, not filesystem paths. Risk is theoretical but reviewer step grep-checks for any `{path=**}` allow without a uid prefix guard.'
  - severity: high
    description: 'Compound index missing in firestore.indexes.json — production query fails at runtime with "missing index" error after deploy'
    mitigation: "Research step enumerates all known query shapes from c6/c9/c16. Rules tests don't catch missing indexes (emulator is forgiving), but `pnpm dev` against the deployed Firestore will surface the error early in c9/c16 development. Belt-and-suspenders: add a smoke test in c18 that exercises the library query."
  - severity: medium
    description: "firebase emulators:exec --only flag does not support storage in the project's firebase-tools 15.15.0 version"
    mitigation: 'Research step confirms via firebase-tools docs. If unsupported, `firebase emulators:exec` (without --only) starts all configured emulators; minor performance cost in test:rules but functionally equivalent.'
  - severity: medium
    description: 'Owner-field immutability rule (`request.resource.data.userId == resource.data.userId`) breaks legitimate writes if a Firestore SDK call accidentally omits userId from the update payload'
    mitigation: 'Test (5) covers this. SDKs use merge: false by default for set(), but partial updates (update()) preserve fields not in the payload — Firestore evaluates the rule against the MERGED resulting state, not the partial payload. Unit tests use both set() and update() patterns.'
  - severity: low
    description: 'Generation row "errorCode non-null when status === failure" not enforced by rules; converter only enforces it on read, not write'
    mitigation: 'Rules-side conditional-field validation is awkward (`request.resource.data.status == "failure" ? request.resource.data.errorCode != null : true`). Converter validates on read; lifecycle code in c15 enforces on write. Two-layer defense good enough for v1.'

