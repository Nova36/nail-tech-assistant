design_decisions:
  - decision: 'Pin Firebase Storage host in `next.config.ts` literal (NOT derive from env)'
    rationale: 'Bucket host is a deploy-time constant per project. Env-derived remotePatterns would couple build to env presence, breaking Vercel preview deploys that may not have the env hydrated. Static literal is simpler, more explicit, and visible in code review when it changes.'
  - decision: 'Allow BOTH `firebasestorage.googleapis.com` AND `*.firebasestorage.app` (research-locked)'
    rationale: "Signed URLs from Admin SDK use `firebasestorage.googleapis.com`; direct public/download URLs use `*.firebasestorage.app`. Allowing both covers c16's signed-URL strategy + future epic D library if it switches to direct download URLs."
  - decision: 'No env-derived bucket pattern (e.g., `${env.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}.firebasestorage.app`)'
    rationale: 'Wildcard `*.firebasestorage.app` covers all buckets. Env-derived would be tighter but more fragile.'
  - decision: 'min_viable_ship_cut consideration: c18 cuttable; c17 falls back to `<img unoptimized={true}>`'
    rationale: "Per epic.yaml min_viable_ship_cut. Optimization is nice-to-have; functional preview is must-have. If Mother's Day pressure forces a cut, ship c17 with the unoptimized fallback and add c18 post-launch as a perf polish."

cross_cutting:
  - concern: 'image-rendering'
    notes: 'Single source of truth for image hosts. Future epic adds a new external image source = one place to update.'

risks:
  - severity: medium
    description: 'Wrong host added (e.g., `*.firebasestorage.app` when actual URL is `firebasestorage.googleapis.com`); preview breaks at runtime'
    mitigation: 'Researcher question (1) confirms by inspecting actual signed URL output OR by smoke test. Reviewer step manually loads preview in `pnpm dev`.'
  - severity: low
    description: "Wildcard `*.firebasestorage.app` is too permissive — accepts any bucket's images, not just ours"
    mitigation: 'Acceptable v1 residual. Tighter pattern (specific bucket name) requires env-derived patterns; trade-off documented above. Future hardening can pin to specific bucket if needed.'
  - severity: low
    description: 'Next.js silently ignores invalid `remotePatterns` entries; tests pass but production still 400s'
    mitigation: 'Test (1)-(3) inspect the file directly; Playwright e2e renders a real image. Two layers of verification.'

