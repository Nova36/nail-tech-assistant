design_decisions:
  - decision: 'MSW server lifecycle lives in `tests/setup/integration.ts`, not a per-test pattern'
    rationale: 'Existing project pattern uses a single setupFiles entry; per-test setup adds boilerplate to every test that needs MSW. setupFiles owns lifecycle; tests own per-test handler overrides via `server.use(...)`.'
  - decision: '`onUnhandledRequest: "error"` instead of `"warn"` or `"bypass"`'
    rationale: 'Memory `feedback_silent_catches_cost_time` analog for testing — silently passing requests through to the real network is the test-time equivalent of a silent catch. Erroring loudly forces every test to declare its dependencies.'
  - decision: 'Reuse existing `lib/pinterest/__fixtures__/` data in handler stubs instead of duplicating'
    rationale: 'Single source of truth for Pinterest stub shape; if Pinterest API drift forces fixture updates in c12 (pin selection state) or future epic, MSW handlers update for free.'
  - decision: 'Gemini default-handler endpoint uses `@google/generative-ai` URL as placeholder if c1 has not committed first'
    rationale: 'c2 has no dependency on c1; orchestrator may schedule them in parallel. Placeholder documented with a comment instructs c14 to verify. If c1 commits first, c2 implementer reads the SDK lock and uses the locked endpoint.'
  - decision: 'No story-specific handlers in c2 — only defaults'
    rationale: 'Each consumer story (c6, c14, c16) knows its own test fixtures best. c2 sets the floor; later stories override per test. Avoids c2 becoming a "kitchen sink" of stale handlers.'
  - decision: 'Skip `research` step'
    rationale: 'MSW + vitest setup is well-documented externally; codebase has no MSW prior art (greenfield install). Researcher would have nothing to discover that the docs don''t already say. Step is omitted explicitly per skill spec ("skip research only when codebase is well-known").'

cross_cutting:
  - concern: 'testing harness'
    notes: 'MSW becomes the canonical mock layer for external HTTP boundaries (Pinterest, Gemini). Future epics that integrate new external APIs (e.g., payments, email) extend `tests/__mocks__/handlers/` with new stub files. `onUnhandledRequest: "error"` enforces the discipline.'

risks:
  - severity: medium
    description: 'MSW 2.x has breaking changes from MSW 1.x; if a future contributor copies a 1.x snippet from external docs, the test will fail with cryptic errors'
    mitigation: 'tests/__mocks__/msw-server.ts comment block calls out MSW 2.x explicitly; pin major version in package.json (^2 not ^1).'
  - severity: medium
    description: 'Gemini handler endpoint placeholder gets out of sync with c1 SDK lock if c2 commits first and c14 forgets to update'
    mitigation: 'Reviewer step in c14 explicitly checks the handler URL matches the SDK lock; comment in tests/__mocks__/handlers/gemini.ts marks the file with `// VERIFY-IN-C14` so c14 reviewer can grep for it.'
  - severity: low
    description: '`onUnhandledRequest: "error"` is too strict and breaks a future test that legitimately wants to fall through (e.g., Firestore emulator HTTP traffic gets caught)'
    mitigation: "MSW handlers only intercept declared origin URLs; emulator traffic to `127.0.0.1:8080` is not declared in any handler and uses node's native fetch path. If a real false-positive emerges, `onUnhandledRequest` can be relaxed to a function that allowlists localhost."
  - severity: low
    description: 'Pinterest fixture drift — `lib/pinterest/__fixtures__/` shape diverges from real Pinterest, and handler stubs train tests against stale data'
    mitigation: 'Out of scope for c2; the fixture freshness problem is owned by Epic B. c2 consumes whatever shape the fixtures expose. Future fixture updates flow through automatically.'

