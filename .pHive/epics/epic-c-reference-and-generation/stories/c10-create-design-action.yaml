design_decisions:
  - decision: 'Design draft persists BEFORE generation (FR-C-4)'
    rationale: 'Outline + design-discussion lock this. Durable design state means c15 generation lifecycle can reference an already-existing designId; user can navigate away mid-flow without losing the assembled inputs. Also enables future "save without generating" UX.'
  - decision: '`latestGenerationId: null` at create — set transactionally on terminal success in c15'
    rationale: "data-model:contract-stability + persistence:consistency. Null at create means readers can't accidentally treat a never-generated design as having a generation. c15 owns the transactional set; c10 cannot pre-set it."
  - decision: '`name: null` at create — UI defers naming to a future surface (likely Library / Epic D)'
    rationale: 'Naming is not on the v1 critical path. Auto-naming based on prompt is brittle. Leaving null means the UI can show "Untitled Design" / `<creation date>` as a fallback. c11 / c17 may add an inline rename if Don wants it.'
  - decision: '`createdAt` and `updatedAt` are client-generated ISO strings, NOT FieldValue.serverTimestamp()'
    rationale: 'c3 typed both as `string`. ServerTimestamp objects break round-trip simplicity in tests + converters. Drift from server clock on a single-user app is negligible. Future epic can swap to serverTimestamp if multi-user ordering accuracy matters.'
  - decision: 'Single Firestore write — no transaction'
    rationale: 'Design create touches only the `designs/{designId}` doc. No cross-collection consistency needed at this stage. c15 will use a transaction for `generations/{genId}` write + `designs/{designId}.latestGenerationId` update.'
  - decision: 'Concurrent identical createDesign calls produce distinct designIds — no idempotency token'
    rationale: 'crypto.randomUUID() is per-call. UI in c11 prevents double-click via disabled-state (button disabled while pending). Idempotency tokens add complexity for a non-problem in v1.'
  - decision: '`permission-denied` Firestore error caught as a SEPARATE reason from generic firestore_failure'
    rationale: 'rules_denied is actionable for the user (re-auth, contact support); firestore_failure is transient. UI in c11 may render different copy. Distinguishing the two requires error-code inspection in the catch — done.'

cross_cutting:
  - concern: 'security-rules'
    notes: 'Action reads uid from session; lifecycle writes with that uid in `userId`. c4 firestore.rules deny UID mismatch — third defense layer. Test (21) explicit.'
  - concern: 'error-handling'
    notes: 'Discriminated envelope. c8 reasons + Firestore reasons + auth reason. UI in c11 exhaustively maps reasons to copy.'
  - concern: 'data-model'
    notes: 'c3 Design shape used verbatim via designConverter. Adding fields requires updating c3 type + converter + this lifecycle in lockstep.'

risks:
  - severity: medium
    description: '`permission-denied` Firestore error string differs across firebase-admin versions; catch block matches wrong code'
    mitigation: 'Test (12) uses literal `code: "permission-denied"` — fixed by the test if the actual code is different. firebase-admin v13.8.0 documentation confirms this code; researcher verifies via context7.'
  - severity: medium
    description: "createDesign called with secondaryReferenceIds containing IDs the user does not actually own; Firestore rules allow because rules don't cross-validate"
    mitigation: 'c4 firestore.rules accept; c11 UI restricts the picker to alice-owned references; c13 buildGeminiRequest in a future story would fail to fetch the bytes if a non-owned reference made it through. Acceptable trade-off — cross-doc validation in rules is expensive.'
  - severity: low
    description: '`updatedAt === createdAt` at create looks weird in admin tools / queries that filter by recently-updated'
    mitigation: 'Standard pattern for create-then-update workflows. No admin UI in v1; future epic may treat them as separate fields.'
  - severity: low
    description: 'A future story (c11) calls createDesign with FormData encoding; server action FormData unwrapping might mismatch the `input` shape'
    mitigation: 'c11 wraps the action in `useActionState` or calls with a typed object directly via `startTransition` — typed object is the simpler path.'

