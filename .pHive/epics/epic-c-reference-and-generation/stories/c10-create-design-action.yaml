      - Action reads uid from session ONLY.
      - All vitest unit + integration tests pass.
      - Reviewer grep: no firebase-admin imports in the action file
        (only the lifecycle module touches firebase-admin).
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c10-create-design-action`.
      Commit: `feat(c10): createDesign server action + designs lifecycle (draft create)`.
      Pre-commit: `pnpm test`, `pnpm test:rules` must pass.
    agent: integrator
    depends_on: [review]

