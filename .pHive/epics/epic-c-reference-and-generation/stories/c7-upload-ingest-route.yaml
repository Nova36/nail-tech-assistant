design_decisions:
  - decision: 'Route handler (NOT server action) for the upload endpoint — explicit exception to api:surface-boundary lock'
    rationale: 'Next.js server actions accept FormData but multipart streaming through them is brittle (encoding edge cases on heic/heif, large-buffer handling). Route handler with `Request.formData()` is the canonical Next.js multipart pattern. This is the ONLY exception in Epic C — all other mutations (selectPinterestPin, createDesign, generateDesign) stay as server actions per the lock.'
  - decision: 'Server-proxied uploads (NOT direct browser-to-Storage with signed URLs)'
    rationale: 'design-discussion §My Proposed Approach + research-brief Open Q5. Server-proxied means bytes flow Vercel → Cloud Storage; client never gets a signed URL. Bandwidth cost is acceptable for v1 single-user volume. Avoids CORS config + signed-URL minting infrastructure. Future epic can swap to direct-browser if user growth demands it.'
  - decision: '10 MB max file size, locked per design-discussion §Open Q5'
    rationale: 'Phone JPEGs are 3-8 MB typical; HEIC is 1-4 MB; PNG is variable. 10 MB covers 99th percentile. Vercel function body limit is 4.5 MB on Hobby (more on Pro); if Hobby plan, this cap may need to drop to 4 MB OR move to direct-browser uploads. Confirm during integrate against actual Vercel plan.'
  - decision: 'Accepted MIME types: jpeg, png, heic, heif (heif normalized to heic)'
    rationale: 'Phone uploads use jpeg, heic, heif depending on iOS version; PNG covers screenshots. HEIF is functionally identical to HEIC for storage; normalize to one extension. Generation provider may not accept HEIC — c13 buildGeminiRequest handles re-encoding if needed (defer to that story).'
  - decision: '`userId` derived from session ONLY — request body cannot spoof'
    rationale: 'Defense in depth: c4 storage rules + Firestore rules would deny a UID mismatch anyway, but the route should reject the spoof at the API boundary instead of relying on the rules layer to bounce it. Test (9) explicit.'
  - decision: '`runtime = "nodejs"` not Edge'
    rationale: 'Multipart parsing requires Node Buffer + arrayBuffer streaming. Edge runtime has limitations on body size + Buffer access. firebase-admin SDK also requires Node runtime. Node is the only option.'
  - decision: 'No upload progress / resumable upload'
    rationale: 'YAGNI for v1 single-user; UI shows pending state in c11. If real users complain, swap to tus-js / signed URLs in a future epic. Server action / route handler distinction is independent of resumable UX.'
  - decision: 'No virus scanning'
    rationale: "Single trusted user (Don's wife) only ingests her own phone photos. Adding virus scanning would require Cloud Functions or a third-party scanner — out of v1 scope. Future epics that add multi-user / public uploads must add scanning."

cross_cutting:
  - concern: 'security-rules'
    notes: 'Route enforces session uid; c4 storage.rules enforce path-derived owner; c4 firestore.rules enforce `userId == request.auth.uid`. Three layers of defense.'
  - concern: 'error-handling'
    notes: 'Discriminated envelope same shape as c6, c8, c9. Every catch logs code+message. Reason taxonomy is route-aware (`unauthorized`, `unsupported_content_type`, `file_too_large`, etc.) for HTTP semantics, but propagated `ingestUpload` reasons (`storage_failure`, `firestore_failure`) match c6 verbatim.'
  - concern: 'data-model'
    notes: 'Reference contract from c3 returned verbatim. `source: "upload"`, `pinterestPinId: null`, `sourceUrl: null` invariants enforced by the function shape.'

risks:
  - severity: high
    description: 'Vercel function body size limit (4.5 MB on Hobby plan) silently truncates 10 MB uploads → request never hits route handler'
    mitigation: 'Researcher confirms Vercel plan tier during integrate. If Hobby, cap drops to 4 MB OR Don upgrades to Pro. Not blocking for c7 scaffold but blocks production deploy.'
  - severity: high
    description: 'Multipart parser fails on legitimate iPhone HEIC uploads due to non-standard MIME headers'
    mitigation: 'Test with real iPhone fixture during integrate. If fails, accept both `image/heic` and `image/heif` (already in code) AND fall through to extension-based inference if `file.type` is empty.'
  - severity: medium
    description: 'Empty `file.type` from some browsers (older Chrome) → rejected as `unsupported_file_type`'
    mitigation: 'Fallback: if `file.type` is empty, infer from `file.name` extension. Implementation can include this if test (5) variants demand it.'
  - severity: medium
    description: 'Concurrent uploads from same user race on Firestore doc creation'
    mitigation: 'refId = crypto.randomUUID() per upload; collisions are negligible. Test (concurrent userId test) covers cross-user; same-user concurrency is implicitly safe due to UUID generation.'
  - severity: low
    description: "CSRF on the upload route — a malicious site could POST to it with the user's session cookie"
    mitigation: 'SameSite=Lax cookies on the session (Epic A baseline). Multipart POSTs from cross-origin require explicit content-type setting which browsers block on simple form POSTs. Acceptable residual for v1; add Origin header check in a future hardening epic.'
  - severity: low
    description: 'Route handler tests are flaky due to multipart Request fixture construction'
    mitigation: 'Use `new FormData()` + `new Request(url, { method: "POST", body: formData })` pattern; multiple Next.js community examples confirm this works in vitest jsdom. If flaky, fall back to undici Request from `node:undici`.'

