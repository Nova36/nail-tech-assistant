id: c7-upload-ingest-route
epic: epic-c-reference-and-generation
title: 'lib/references/ingest.ts upload ingestion + `app/api/references/upload/route.ts` multipart route handler (server-proxied; route-not-action because multipart)'
status: pending
complexity: medium
methodology: tdd
depends_on: [c5-server-storage-helper]

escalations_addressed:
  - trigger: api:surface-boundary
    severity: moderate
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      This story is the EXPLICIT exception to the c8/c9/c16 server-actions-only
      lock from epic.yaml api:surface-boundary escalation. Multipart file
      upload through Next.js server actions is fragile (FormData encoding,
      streaming buffer handling). Route handler is the canonical Next.js
      pattern for multipart bodies. Decision documented in design_decisions
      so future stories don't re-litigate.
  - trigger: data-model:contract-stability
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      `ingestUpload` returns the c3-locked `Reference` shape verbatim with
      `source: "upload"` and `pinterestPinId: null`. Identical envelope to
      c6 `ingestPinterestPin` — the design-discussion §What Could Go Wrong
      MEDIUM (Pinterest+upload reference shapes drift) is addressed by
      keeping both functions in the SAME `lib/references/ingest.ts` module
      with shared persistence logic.
  - trigger: persistence:consistency
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Same two-write order as c6: bytes to Storage FIRST, Firestore doc
      AFTER. Same orphan-on-Firestore-failure logging. Symmetric error
      surface.

description: |
  Second half of `lib/references/ingest.ts` plus the multipart route
  handler that the UI (c11) posts uploads to. Implements:

  1. `ingestUpload({ userId, bytes, contentType, originalFilename }):
     Promise<IngestUploadResult>` in `lib/references/ingest.ts` — the
     normalize+persist counterpart to `ingestPinterestPin`. Same Storage
     write + Firestore doc shape, just with `source: "upload"` and
     `pinterestPinId: null`.

  2. `app/api/references/upload/route.ts` — Next.js route handler
     (POST). Accepts `multipart/form-data` with one `file` field. Validates
     content type ∈ {jpeg, png, heic}, size ≤ 10 MB (locked per
     research-brief Open Q5 / design-discussion §Open Q5). Reads the file
     bytes into a Node Buffer server-side, calls `ingestUpload` with the
     authenticated session uid, returns the discriminated envelope as JSON.

  The route is the ONLY exception to the server-actions-canonical decision
  in api:surface-boundary. Reason: Next.js server actions accept FormData
  but in practice multipart streaming is brittle, and a route handler with
  Node Buffer access is the canonical pattern. Documented in
  design_decisions so this is a settled exception, not a precedent for
  every future mutation to defect to routes.

  No client-side direct-to-Storage uploads in v1 (research-brief Open Q5
  explicit: server-proxied). Bandwidth flows through Vercel; this is
  acceptable for v1 nail-tech single-user volume.

  Out of scope: upload UI (c11 builds `<UploadZone>`), retry behavior on
  upload failure (c11/c17 own UX), virus scanning (out of v1 scope —
  single trusted user).

acceptance_criteria:
  - 'Given an authenticated session for `alice` and a `POST /api/references/upload` with `Content-Type: multipart/form-data` containing one `file` field of type `image/jpeg` under 10 MB, when the route handles the request, then it calls `ingestUpload({ userId: "alice-uid", bytes, contentType: "image/jpeg", originalFilename })` and returns 200 with `{ ok: true; reference: <Reference> }`.'
  - 'Given a request with no authenticated session, when the route handles it, then it returns 401 with `{ ok: false; reason: "unauthorized"; message }` and does NOT call `ingestUpload`.'
  - 'Given a request with `Content-Type` other than `multipart/form-data`, when the route handles it, then it returns 415 with `{ ok: false; reason: "unsupported_content_type"; message }`.'
  - 'Given a multipart request with NO `file` field, when the route handles it, then it returns 400 with `{ ok: false; reason: "missing_file"; message }`.'
  - 'Given a multipart request with a `file` field of type `application/pdf`, when the route validates, then it returns 415 with `{ ok: false; reason: "unsupported_file_type"; message: "only image/jpeg, image/png, image/heic accepted" }`.'
  - 'Given a multipart request with a `file` field exceeding 10 MB, when the route validates, then it returns 413 with `{ ok: false; reason: "file_too_large"; message: "max 10 MB" }`.'
  - 'Given `ingestUpload` returns `{ ok: true; reference }`, when the route responds, then JSON body is `{ ok: true; reference }` with all c3-locked Reference fields populated. `reference.source === "upload"`, `reference.pinterestPinId === null`, `reference.userId === <session uid>`.'
  - 'Given `ingestUpload` returns `{ ok: false; reason: "storage_failure" }`, when the route responds, then it returns 500 with the same body. The Reference doc was NOT created.'
  - 'Given `ingestUpload` returns `{ ok: false; reason: "firestore_failure" }`, when the route responds, then it returns 500 with the same body and the orphan-storage log line is present (from `lib/references/ingest.ts` per c6 pattern).'
  - 'Given a multipart request where the route accepts the file but `bytes.length` is 0 (empty file), when the route validates, then it returns 400 with `{ ok: false; reason: "empty_file"; message }`.'
  - 'Given a session uid AND a request body that attempts to spoof a different `userId` (e.g., a hidden form field), when the route processes it, then ONLY the session uid is used (request-body uid is ignored). c4 storage rules + Firestore rules would deny the spoof anyway, but the route belt-and-suspenders rejects it.'

steps:
  - id: research
    description: |
      Max 3 focused questions:
      (1) Next.js 15 App Router multipart/form-data parsing — does
      `Request.formData()` work in route handlers, and does it stream or
      buffer the body? Buffering large requests in memory is fine at
      10 MB cap; streaming is overkill for v1 but worth knowing the
      limit.
      (2) HEIC content type — is it `image/heic`, `image/heif`, or both?
      Phone uploads from iOS land as one of these; both should be accepted
      and normalized. c5 storage helper already maps `image/heic → heic`
      extension; confirm the alignment.
      (3) Authenticated session retrieval in a route handler — Epic A
      shipped `lib/firebase/session.ts`. Confirm the API for reading the
      session uid from a Next.js route handler request (likely
      `getSession()` or `getSessionFromCookies()`); read the existing
      `app/api/auth/session/route.ts` to see the canonical pattern.

      Also read `app/(auth)/login/actions.ts` for the discriminated
      envelope return-shape convention to mirror.
    agent: researcher
  - id: test-spec
    description: |
      Write failing tests BEFORE implementation. Two layers: ingestUpload
      function tests (mocked) + route handler integration tests.

      - tests/unit/references/ingest-upload-happy-path.test.ts —
        (1) Mock c5 helper to return `{ ok: true; storagePath }`
        (2) Mock Firestore Admin doc set to succeed
        (3) Call `ingestUpload({ userId: "alice", bytes:
            new Uint8Array([0xFF, 0xD8, 0xFF]),
            contentType: "image/jpeg",
            originalFilename: "nail.jpg" })`
        (4) Assert returned `reference.source === "upload"`,
            `pinterestPinId === null`, `userId === "alice"`,
            `storagePath` matches `users/alice/references/<refId>.jpg`,
            `sourceUrl === null` (uploads have no external URL)

      - tests/unit/references/ingest-upload-error-paths.test.ts —
        (1) c5 helper returns `storage_failure` → propagates,
            no Firestore call
        (2) Firestore mock throws after Storage success → logs
            `[ingest] firestore write failed after storage write succeeded`,
            returns `firestore_failure`

      - tests/integration/references/ingest-upload-real-emulator.test.ts —
        (Storage + Firestore emulators wrapped) (lane same as c5):
        (1) Real `ingestUpload` end-to-end: assert document at
            `references/{refId}` + bytes readable at the storagePath.
        (2) Concurrent calls with two different userIds → produce two
            distinct refs, no cross-user contamination.

      - tests/integration/api/references-upload-route.test.ts —
        Route handler tests (use Next.js test idiom for route handlers,
        OR direct invocation of the exported `POST` function with a mocked
        `Request`):
        (1) Mock authenticated session for "alice-uid"; build a
            multipart Request with a JPEG file under 10 MB; assert 200 +
            `{ ok: true; reference }` body shape
        (2) No session → 401 + `unauthorized`
        (3) `Content-Type: application/json` → 415 + `unsupported_content_type`
        (4) multipart but no `file` field → 400 + `missing_file`
        (5) multipart with `file` of `application/pdf` → 415 +
            `unsupported_file_type`
        (6) multipart with `file` of 11 MB → 413 + `file_too_large`
        (7) Empty file (0 bytes) → 400 + `empty_file`
        (8) HEIC file → accepted, returns 200 with reference where
            `storagePath` ends in `.heic`
        (9) Form data has a `userId` field that disagrees with session uid
            → handler IGNORES form userId, uses session uid

      Use vitest's `it.concurrent` for the concurrent-userId test.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Make failing tests pass. Two file deltas: extend
      `lib/references/ingest.ts` with `ingestUpload`, and create the
      route handler.

      1. Extend `lib/references/ingest.ts`:
         ```ts
         type IngestUploadResult =
           | { ok: true; reference: Reference }
           | { ok: false;
               reason: 'storage_failure' | 'firestore_failure' | 'unknown';
               message: string };

         export async function ingestUpload(input: {
           userId: string;
           bytes: Buffer | Uint8Array;
           contentType: string;
           originalFilename: string;
         }): Promise<IngestUploadResult> {
           const refId = crypto.randomUUID();

           const upload = await uploadReferenceBytes({
             uid: input.userId,
             refId,
             bytes: input.bytes,
             contentType: input.contentType,
           });
           if (!upload.ok) return upload; // propagates `storage_failure`

           const reference: Reference = {
             id: refId,
             userId: input.userId,
             source: 'upload',
             sourceUrl: null,
             storagePath: upload.storagePath,
             pinterestPinId: null,
             createdAt: new Date().toISOString(),
           };

           try {
             const db = getFirestore(createServerFirebaseAdmin());
             await db.collection('references').doc(refId)
               .withConverter(referenceConverter).set(reference);
             return { ok: true, reference };
           } catch (err) {
             const code = (err as { code?: string }).code ?? 'unknown';
             const message = (err as Error).message ?? String(err);
             console.error(
               '[ingest] firestore write failed after storage write succeeded',
               { uid: input.userId, refId,
                 storagePath: upload.storagePath, code, message });
             return { ok: false, reason: 'firestore_failure', message };
           }
         }
         ```

      2. Create `app/api/references/upload/route.ts`:
         ```ts
         import { NextRequest, NextResponse } from 'next/server';
         import { getSession } from '@/lib/firebase/session'; // confirm name
         import { ingestUpload } from '@/lib/references/ingest';

         export const runtime = 'nodejs';
         export const dynamic = 'force-dynamic';

         const MAX_BYTES = 10 * 1024 * 1024; // 10 MB locked per Open Q5
         const ACCEPTED_CONTENT_TYPES = new Set([
           'image/jpeg', 'image/png', 'image/heic', 'image/heif',
         ]);

         export async function POST(req: NextRequest) {
           const session = await getSession();
           if (!session?.uid) {
             return NextResponse.json(
               { ok: false, reason: 'unauthorized',
                 message: 'sign in required' },
               { status: 401 });
           }

           const contentTypeHeader = req.headers.get('content-type') ?? '';
           if (!contentTypeHeader.startsWith('multipart/form-data')) {
             return NextResponse.json(
               { ok: false, reason: 'unsupported_content_type',
                 message: 'multipart/form-data required' },
               { status: 415 });
           }

           let formData: FormData;
           try {
             formData = await req.formData();
           } catch (err) {
             const message = (err as Error).message ?? String(err);
             return NextResponse.json(
               { ok: false, reason: 'malformed_multipart', message },
               { status: 400 });
           }

           const file = formData.get('file');
           if (!file || !(file instanceof File)) {
             return NextResponse.json(
               { ok: false, reason: 'missing_file',
                 message: 'field "file" required' },
               { status: 400 });
           }

           if (file.size === 0) {
             return NextResponse.json(
               { ok: false, reason: 'empty_file', message: 'file is empty' },
               { status: 400 });
           }
           if (file.size > MAX_BYTES) {
             return NextResponse.json(
               { ok: false, reason: 'file_too_large', message: 'max 10 MB' },
               { status: 413 });
           }
           if (!ACCEPTED_CONTENT_TYPES.has(file.type)) {
             return NextResponse.json(
               { ok: false, reason: 'unsupported_file_type',
                 message: 'only image/jpeg, image/png, image/heic accepted' },
               { status: 415 });
           }

           const bytes = Buffer.from(await file.arrayBuffer());
           // Normalize HEIF → HEIC content type for c5 helper alignment
           const contentType = file.type === 'image/heif' ? 'image/heic' : file.type;

           const result = await ingestUpload({
             userId: session.uid,
             bytes,
             contentType,
             originalFilename: file.name,
           });

           if (!result.ok) {
             return NextResponse.json(result, { status: 500 });
           }
           return NextResponse.json(result, { status: 200 });
         }
         ```

      DO NOT: add a server action wrapper (UI posts directly to this route
      via fetch with FormData). DO NOT: add download/signed-URL endpoints.
      DO NOT: add upload progress / resumable uploads (out of v1 scope).
      DO NOT: catch and silently swallow — all error paths log code+message.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify route + ingest function are symmetric with c6 + tight on
      validation.

      - `ingestUpload` reuses the SAME Firestore-write block as c6
        (same orphan log line, same converter, same collection name).
      - Route reads ONLY session uid for `userId` — request body cannot
        spoof. Test (9) asserts.
      - Route returns appropriate HTTP status codes (401, 413, 415, 400, 500).
        NextResponse.json sets the status correctly.
      - 10 MB cap is the literal `10 * 1024 * 1024` constant. Any drift
        from the locked Open Q5 value requires a separate decision.
      - Accepted content types: `image/jpeg`, `image/png`, `image/heic`,
        `image/heif` (HEIF normalized to HEIC for c5 alignment).
      - `runtime = 'nodejs'` and `dynamic = 'force-dynamic'` set on the
        route — multipart streaming requires Node runtime, not Edge.
      - Reference shape matches c3 lock; `source === 'upload'`,
        `pinterestPinId === null`, `sourceUrl === null` invariants hold.
      - All vitest unit + integration + route-handler tests pass.
      - Reviewer manual grep: confirm no `app/api/references/pinterest/select/route.ts`
        was accidentally created (that flow is c9 server action, not a route).
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c7-upload-ingest-route`.
      Commit: `feat(c7): multipart upload ingest route + ingestUpload function`.
    agent: integrator
    depends_on: [review]

