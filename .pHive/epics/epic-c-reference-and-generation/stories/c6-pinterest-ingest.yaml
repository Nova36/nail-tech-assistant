design_decisions:
  - decision: 'Server-proxied image fetch (Node fetch on i.pinimg.com), NOT signed-URL or browser-direct download'
    rationale: 'design-discussion §My Proposed Approach + research-brief Open Q6 lock server-proxied. Atomic durability: by the time `references` doc exists, bytes are in OUR bucket — no future broken-image risk if pinterest revokes the pin or rotates CDN URLs. Worth the bandwidth cost on Vercel.'
  - decision: 'Image-bytes write to Storage BEFORE Firestore doc write (two-phase, in this order)'
    rationale: 'persistence:consistency escalation. If Firestore write fails after Storage write, the orphan Storage object is a sweep concern; if Storage write fails after Firestore write, every reader sees a doc pointing at a non-existent path. Reverse order = bad. This order = caller sees clean rejection on any failure.'
  - decision: 'Variant fallback chain: 1200x → 600x → 400x300 → 150x150'
    rationale: 'research-brief §New Surfaces > External Integrations notes Pinterest pins surface 4 variants; largest available wins. Generation quality benefits from larger source images. 150x150 fallback is a "rather have something than nothing" bottom rung — c14 buildGeminiRequest can decide whether 150x150 is worth sending to the model.'
  - decision: 'refId = crypto.randomUUID(), NOT pinId'
    rationale: 'Two users could pin the same pin; both should get distinct reference docs. refId-as-pinId would create a write-collision under c4 owner rules anyway (UID mismatch on the second writer). Random UUID is collision-free + per-user-per-ingest.'
  - decision: 'unsupported_media_type checked BEFORE image variant selection'
    rationale: 'A video pin might still have a thumbnail variant in `media.images`; we should not silently use the thumbnail and pretend it represents a video. Explicit reject preserves the contract that `Reference` always points at an image.'
  - decision: 'No retry on Pinterest fetch failures (rate_limit, network)'
    rationale: 'Caller (c9 server action wrapping) decides retry policy. Ingest is the lower layer; retry belongs higher in the stack where UX context exists. Aligns with FR-C-7''s "one silent retry" being a c14/c16 concern, not c6.'
  - decision: 'Orphaned Storage object on Firestore-write-after-Storage-success failure is logged but NOT cleaned up'
    rationale: 'Cleanup requires either a transaction (Firestore + Storage are not transactionally linked) or a sweeper job (out of v1 scope). Logged so a future epic can implement a sweep. Acceptable residual: orphan blobs cost ~0 storage; security rules deny access by anyone other than the owner.'

cross_cutting:
  - concern: 'security-rules'
    notes: 'Storage write goes through c5 helper which constructs `users/{uid}/references/<refId>.<ext>` — c4 storage.rules ALLOW only when uid in path matches `request.auth.uid`. The Admin SDK bypasses rules (server context), but call-site discipline (always pass `userId` from authenticated session) keeps the path correct. c9 action verifies session uid matches input userId.'
  - concern: 'error-handling'
    notes: 'Every external call (Pinterest API, image fetch, c5 helper, Firestore write) returns or maps into the discriminated reason taxonomy. No silent catches. Logging includes code+message+identifiers per `feedback_silent_catches_cost_time`. Reason names align with `lib/pinterest/errors.ts` taxonomy where overlap exists.'
  - concern: 'data-model'
    notes: 'Returned Reference matches c3 lock byte-for-byte. Adding fields requires updating c3 first, then this story.'

risks:
  - severity: high
    description: 'i.pinimg.com requires Authorization header that vanilla `fetch(url)` does not send → image-fetch_failed on every ingest'
    mitigation: 'researcher question (1) confirms before implementation. If auth required, helper injects `Authorization: Bearer ${env.PINTEREST_ACCESS_TOKEN}` — but bearer on a CDN GET is unusual; more likely public CDN. Test against real Pinterest pin URL during integrate.'
  - severity: medium
    description: 'Firestore write fails after Storage success → orphan blob accumulates'
    mitigation: 'Logged with full identifiers per `feedback_silent_catches_cost_time` — an operator can identify orphans via log query. Sweep job is a future-epic concern. Acceptable residual for v1.'
  - severity: medium
    description: 'Pinterest pin re-fetch (`getPinterestPin`) doubles the API quota cost per ingest if c11 already has the pin object'
    mitigation: 'researcher question (3) decides: if c11 passes pin object inline, this story does not extend client.ts. The function signature could be `ingestPinterestPin({ userId, pin })` instead of `({ userId, pinId })`. TPM resolves at c11 design.'
  - severity: medium
    description: 'Pinterest `media.images` variants drift (e.g., new `2400x` variant added) — variant selection ignores it'
    mitigation: 'Fallback chain is conservative + extensible. Adding a new highest-priority variant is a one-line change to `VARIANT_FALLBACK`.'
  - severity: low
    description: 'Content type inference is URL-extension-based; pin URL ends in `.jpg` but actual bytes are PNG'
    mitigation: 'Pinterest CDN historically serves consistent extension/MIME; if drift discovered, switch to `Content-Type` response header inspection on the fetch result.'
  - severity: low
    description: 'No size cap on the fetched image bytes — pathological pin (very large GIF or HEIF) eats memory'
    mitigation: 'Pinterest CDN serves resized variants <5 MB typical; 1200x cap is bounded. If a real OOM emerges, add a `Content-Length` cap check before reading bytes.'

