id: c6-pinterest-ingest
epic: epic-c-reference-and-generation
title: 'lib/references/ingest.ts — Pinterest pin ingestion (server-proxied: fetch via existing client → best image variant → user-scoped Storage write → `references` doc)'
status: pending
complexity: medium
methodology: tdd
depends_on: [c5-server-storage-helper]

escalations_addressed:
  - trigger: data-model:contract-stability
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Function returns the c3-locked `Reference` shape verbatim. `source:
      "pinterest"` and `pinterestPinId: <pinId>` are non-null on every
      return. No drift between Pinterest-source and upload-source records —
      c7 will produce the SAME shape with `source: "upload"` and
      `pinterestPinId: null`.
  - trigger: persistence:consistency
    severity: major
    placement: pre-exec
    raised_by: tpm
    addressed_by: |
      Two-write order: bytes to Storage FIRST, Firestore doc AFTER. If the
      Firestore write fails after a successful Storage write, the orphaned
      Storage object is logged (background sweep is c5+future epic concern,
      not c6). If the Storage write fails, no Firestore doc is created and
      the function returns a typed failure — caller sees a clean rejection,
      not a half-persisted reference.

description: |
  First half of `lib/references/ingest.ts`. Implements `ingestPinterestPin`
  — the function that takes a Pinterest pin ID, fetches the pin metadata
  via the existing `lib/pinterest/client.ts`, copies the pin's best image
  variant into Firebase Cloud Storage under the user-scoped path produced
  by `c5-server-storage-helper`, writes a `references` Firestore document
  with the c3-locked shape, and returns the normalized `Reference`.

  Server-proxied per design-discussion §My Proposed Approach + research-brief
  Open Q6 — image bytes are fetched on the server (Node `fetch`), never
  signed-URL'd to the browser. This satisfies the "block invalid reference
  state instead of silently pretending a pin is usable when the durable
  references copy failed" requirement from US-C-1 acceptance criteria.

  Image variant selection: Pinterest pins expose `media.images` with the
  variants `'150x150' | '400x300' | '600x' | '1200x'`. Real responses
  may omit larger variants. Function picks the largest available with a
  fixed fallback chain `'1200x' → '600x' → '400x300' → '150x150'`. If
  none are present, the function returns a typed failure.

  Pinterest fetch errors map through the existing `lib/pinterest/errors.ts`
  taxonomy (`invalid_token`, `insufficient_scope`, `not_found`,
  `rate_limit`, `network`, `unknown`). Storage failures map through the
  c5 helper's discriminated envelope. Firestore failures get caught with
  code+message logging per `feedback_silent_catches_cost_time`.

  Out of scope: server action wrapper (c9 wraps this for the UI),
  multipart file upload (c7), reference-set builder logic (c8), design
  creation (c10), generation lifecycle (c14+).

acceptance_criteria:
  - 'Given a valid `pinId` for a pin owned by the configured Pinterest token holder and an authenticated user `alice`, when `ingestPinterestPin({ userId: "alice-uid", pinId })` is called, then it returns `{ ok: true; reference: <Reference> }` with `source: "pinterest"`, `pinterestPinId: <pinId>`, `sourceUrl: <pin URL or null>`, `storagePath: "users/alice-uid/references/<refId>.<ext>"`, `userId: "alice-uid"`, `id: <refId>`, `createdAt: <ISO 8601>`.'
  - 'Given a pin response with `media.images: { "1200x": {...}, "600x": {...} }`, when `ingestPinterestPin` runs, then it fetches the `1200x` URL (largest available).'
  - 'Given a pin response with `media.images: { "400x300": {...} }` (missing larger variants), when `ingestPinterestPin` runs, then it fetches the `400x300` URL.'
  - 'Given a pin response with empty or missing `media.images`, when `ingestPinterestPin` runs, then it returns `{ ok: false; reason: "no_image_variant"; message }` and does NOT write to Storage or Firestore.'
  - 'Given the Pinterest API returns 401 (invalid token), when `ingestPinterestPin` runs, then it returns `{ ok: false; reason: "invalid_token"; message }` propagating the existing `lib/pinterest/errors.ts` taxonomy.'
  - 'Given the Pinterest API returns 404 (`not_found`), when `ingestPinterestPin` runs, then it returns `{ ok: false; reason: "not_found"; message }`.'
  - 'Given the Pinterest API returns 429 (rate limit), when `ingestPinterestPin` runs, then it returns `{ ok: false; reason: "rate_limit"; message }` (no retry — caller decides).'
  - 'Given the image-bytes fetch from `i.pinimg.com` fails (network or non-200), when `ingestPinterestPin` runs, then it returns `{ ok: false; reason: "image_fetch_failed"; message }` and does NOT write to Storage or Firestore.'
  - 'Given the c5 storage helper returns `{ ok: false; reason: "storage_failure" }`, when `ingestPinterestPin` propagates it, then it returns `{ ok: false; reason: "storage_failure"; message }` and does NOT write a Firestore doc (no orphaned reference).'
  - 'Given the Firestore write fails after the Storage write succeeds, when `ingestPinterestPin` catches the error, then it logs `console.error("[ingest] firestore write failed after storage write succeeded", { uid, refId, storagePath, code, message })` AND returns `{ ok: false; reason: "firestore_failure"; message }`. The orphaned Storage object stays — sweep is a future-epic concern.'
  - 'Given a pin without a `media.images` `1200x` variant but with `600x` AND a non-image `media.media_type` (e.g., video), when `ingestPinterestPin` runs, then it returns `{ ok: false; reason: "unsupported_media_type"; message }` (v1 supports image pins only).'

steps:
  - id: research
    description: |
      Max 3 focused questions:
      (1) Pinterest pin image fetch — does `i.pinimg.com` require any
      Authorization header for direct GET on the variant URLs (e.g.,
      `https://i.pinimg.com/600x/<hash>.jpg`)? Or are they public CDN
      objects accessible without the bearer token? If they require auth,
      the helper must inject `Authorization: Bearer ${env.PINTEREST_ACCESS_TOKEN}`;
      if not, plain `fetch(url)` works.
      (2) Pinterest response — `media.media_type` enum: confirm canonical
      values (likely `'image' | 'video' | 'multiple_images' | 'story'` —
      v1 supports `'image'` only; the others should yield
      `unsupported_media_type`). Read `lib/pinterest/types.ts` and
      `lib/pinterest/__fixtures__/pins.ts`.
      (3) Pinterest single-pin lookup — does the existing
      `lib/pinterest/client.ts` have a `getPinterestPin(pinId)` function?
      Per c1 batch research the client only has `verifyPinterestToken`,
      `listPinterestBoards`, `listPinterestBoardPins`. If pin-detail GET
      is needed (`GET /v5/pins/{pin_id}`), this story EXTENDS the
      Pinterest client with that function — research confirms whether the
      board-pins listing is sufficient (we already have the pin in memory
      from c11/c12 selection) or whether a re-fetch is required.

      Memory anchors:
      `feedback_silent_catches_cost_time`,
      `feedback_codex_exec_quirks` (no test-shim or node_modules patches),
      `feedback_env_hydration_import_order`.
    agent: researcher
  - id: test-spec
    description: |
      Write failing tests BEFORE implementation. Heavy MSW use (c2 ships
      the harness).

      - tests/unit/references/ingest-pinterest-happy-path.test.ts —
        (1) MSW handler returns a pin with `media.images: { "1200x": ... }`
            mocked image bytes for `1200x` URL
        (2) Mock c5 storage helper to return `{ ok: true; storagePath: ... }`
        (3) Mock Firestore Admin SDK doc write to succeed
        (4) Call `ingestPinterestPin({ userId: "alice", pinId: "p1" })`
        (5) Assert returned `reference.source === "pinterest"`,
            `pinterestPinId === "p1"`, `userId === "alice"`,
            `storagePath` matches `users/alice/references/<refId>.jpg`,
            `id` is a non-empty string, `createdAt` is a valid ISO 8601

      - tests/unit/references/ingest-pinterest-variant-selection.test.ts —
        (1) Pin with all 4 variants → fetches `1200x` URL
        (2) Pin with `600x` only → fetches `600x` URL
        (3) Pin with `400x300` only → fetches `400x300` URL
        (4) Pin with `150x150` only → fetches `150x150` URL
        (5) Pin with NO variants → returns `{ ok: false; reason: "no_image_variant" }`

      - tests/unit/references/ingest-pinterest-error-paths.test.ts —
        (1) MSW returns 401 → reason `invalid_token`, no Storage write,
            no Firestore write
        (2) MSW returns 403 → reason `insufficient_scope`
        (3) MSW returns 404 → reason `not_found`
        (4) MSW returns 429 → reason `rate_limit`
        (5) Image-bytes fetch (i.pinimg.com) returns 500 → reason
            `image_fetch_failed`, no Storage write, no Firestore write
        (6) c5 helper returns `storage_failure` → no Firestore write,
            propagates `storage_failure`
        (7) Firestore mock throws after Storage write succeeded → logs
            `[ingest] firestore write failed after storage write succeeded`
            with `code+message+uid+refId+storagePath`, returns
            `firestore_failure`
        (8) `media.media_type === "video"` → reason `unsupported_media_type`,
            no Storage or Firestore writes

      - tests/integration/references/ingest-pinterest-real-emulator.test.ts —
        (NEW emulator-backed test) (runs in same emulator-wrapped lane
        as c4/c5 storage tests):
        (1) MSW mocks Pinterest API + image bytes. Real Firestore + Storage
            emulators (c4 wired). End-to-end ingest → assert document at
            `references/{refId}` exists with correct fields, assert bytes
            at `users/alice/references/<refId>.jpg` are readable.

      Tests use mocked Firestore Admin via vitest's `vi.mock` for unit
      lane; real emulator for integration lane.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Make failing tests pass. Mirror the existing `lib/pinterest/client.ts`
      style (server-only, env-bound, normalized errors).

      1. If research confirms a pin-detail re-fetch is needed, EXTEND
         `lib/pinterest/client.ts` with:
         ```ts
         export async function getPinterestPin(pinId: string):
           Promise<GetPinterestPinResult> { ... }
         ```
         Reuses internal `pinterestFetch(path, init)` helper. Returns
         discriminated `{ ok: true; pin: PinterestPin } | { ok: false; reason }`.
         If c11/c12 always pass the pin object inline (not just pinId),
         this extension is unnecessary — researcher decides.

      2. Create `lib/references/ingest.ts`:
         ```ts
         import 'server-only';
         import crypto from 'node:crypto';
         import { getFirestore } from 'firebase-admin/firestore';
         import { createServerFirebaseAdmin } from '@/lib/firebase/server';
         import {
           uploadReferenceBytes,
         } from '@/lib/firebase/storage';
         import { getPinterestPin } from '@/lib/pinterest/client'; // if added
         import { referenceConverter } from '@/lib/firestore/converters';
         import type { Reference, PinterestPin } from '@/lib/types';

         type IngestPinterestPinResult =
           | { ok: true; reference: Reference }
           | { ok: false;
               reason: 'invalid_token' | 'insufficient_scope' | 'not_found'
                 | 'rate_limit' | 'network' | 'no_image_variant'
                 | 'unsupported_media_type' | 'image_fetch_failed'
                 | 'storage_failure' | 'firestore_failure' | 'unknown';
               message: string };

         const VARIANT_FALLBACK = ['1200x', '600x', '400x300', '150x150'] as const;

         function pickBestImageVariant(pin: PinterestPin):
           { url: string; width?: number } | null {
           const images = pin.media?.images;
           if (!images) return null;
           for (const v of VARIANT_FALLBACK) {
             const variant = images[v];
             if (variant?.url) return variant;
           }
           return null;
         }

         function inferContentType(url: string): string {
           const lower = url.toLowerCase();
           if (lower.endsWith('.png')) return 'image/png';
           if (lower.endsWith('.webp')) return 'image/webp';
           return 'image/jpeg'; // pinimg defaults
         }

         export async function ingestPinterestPin(input: {
           userId: string;
           pinId: string;
         }): Promise<IngestPinterestPinResult> {
           // 1. Fetch pin metadata
           const pinResult = await getPinterestPin(input.pinId);
           if (!pinResult.ok) return pinResult; // discriminated propagation

           const pin = pinResult.pin;
           if (pin.media?.media_type && pin.media.media_type !== 'image') {
             return { ok: false, reason: 'unsupported_media_type',
                      message: `media_type ${pin.media.media_type} not supported in v1` };
           }

           const variant = pickBestImageVariant(pin);
           if (!variant) {
             return { ok: false, reason: 'no_image_variant',
                      message: `pin ${input.pinId} has no usable image variant` };
           }

           // 2. Fetch image bytes (server-proxied)
           let bytes: Buffer;
           try {
             const res = await fetch(variant.url);
             if (!res.ok) {
               console.error('[ingest] image fetch non-200',
                 { pinId: input.pinId, status: res.status, url: variant.url });
               return { ok: false, reason: 'image_fetch_failed',
                        message: `image fetch failed: ${res.status}` };
             }
             bytes = Buffer.from(await res.arrayBuffer());
           } catch (err) {
             const code = (err as { code?: string }).code ?? 'unknown';
             const message = (err as Error).message ?? String(err);
             console.error('[ingest] image fetch threw',
               { pinId: input.pinId, code, message });
             return { ok: false, reason: 'image_fetch_failed', message };
           }

           // 3. Write to Storage (FIRST — Firestore is second)
           const refId = crypto.randomUUID();
           const contentType = inferContentType(variant.url);
           const upload = await uploadReferenceBytes({
             uid: input.userId, refId, bytes, contentType,
           });
           if (!upload.ok) return upload; // propagates `storage_failure`

           // 4. Write Firestore doc (AFTER bytes are durable)
           const reference: Reference = {
             id: refId, userId: input.userId,
             source: 'pinterest', sourceUrl: pin.link ?? null,
             storagePath: upload.storagePath,
             pinterestPinId: input.pinId,
             createdAt: new Date().toISOString(),
           };
           try {
             const db = getFirestore(createServerFirebaseAdmin());
             await db.collection('references').doc(refId)
               .withConverter(referenceConverter).set(reference);
             return { ok: true, reference };
           } catch (err) {
             const code = (err as { code?: string }).code ?? 'unknown';
             const message = (err as Error).message ?? String(err);
             console.error(
               '[ingest] firestore write failed after storage write succeeded',
               { uid: input.userId, refId, storagePath: upload.storagePath,
                 code, message });
             return { ok: false, reason: 'firestore_failure', message };
           }
         }
         ```

      3. NO server action wrapper here — c9 wraps this. NO upload variant
         (c7 ships its own ingest function in the same file or a sibling
         module).
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify the contract is tight and the persistence ordering is correct.

      - `lib/references/ingest.ts` imports `'server-only'` at top.
      - Storage write happens BEFORE Firestore write (line-order check).
      - On Storage failure, no Firestore write is attempted.
      - On Firestore failure post-Storage success, the `[ingest] firestore
        write failed after storage write succeeded` log includes uid, refId,
        storagePath, code, message.
      - All error paths return discriminated `{ ok: false; reason; message }`
        — no thrown errors escape the function.
      - Variant-selection fallback chain is `'1200x' → '600x' → '400x300'
        → '150x150'` exactly.
      - `unsupported_media_type` is checked BEFORE variant selection.
      - Returned `Reference.source === 'pinterest'` and
        `pinterestPinId === input.pinId` invariants hold (both verified
        by test).
      - `crypto.randomUUID()` is the refId source — does NOT use Pinterest
        pin ID as Firestore doc ID (multiple users could ingest the same
        pin; refId is per-user-per-ingest).
      - All vitest unit + integration tests pass.
      - No node_modules patches; no test shims beyond what c2 MSW + c5
        emulator setup provides.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Branch: `epic-c/c6-pinterest-ingest`.
      Commit: `feat(c6): server-proxied Pinterest pin ingestion + references doc write`.
      Pre-commit: `pnpm test`, `pnpm test:rules` (or :storage) must pass.
    agent: integrator
    depends_on: [review]

