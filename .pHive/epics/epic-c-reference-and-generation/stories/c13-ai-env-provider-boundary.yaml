design_decisions:
  - decision: 'Provider module FORBIDDEN from importing firebase-admin / lib/firebase / lib/firestore'
    rationale: 'external-integration:provider-boundary escalation. design-discussion §My Proposed Approach: lib/ai/generate.ts is the ONLY swap site if Gemini quality fails. Provider module is even tighter — it knows ONLY the SDK shape. This separation lets c14 (request builder + retry) wrap c13 with no SDK knowledge, and lets c1 NO-GO swap to FLUX / gpt-image-1 by replacing only this file.'
  - decision: 'No retry inside `generateImage` — caller (c14) owns retry policy'
    rationale: 'kickoff #8: one silent retry budget. Retry policy is a domain concern (which errors are transient), not a provider concern. c14 wraps c13 with retry; c13 stays single-shot.'
  - decision: '`low_quality` reason NOT returned from provider'
    rationale: 'Provider returns bytes. Quality is a product judgment (too dark, blank canvas, off-brief). c14 or c17 may add downstream classification if c1 spike found a deterministic signal (e.g., near-uniform color histogram). For v1, low_quality is reserved as a c17 UI branch and a c16 errorCode but does NOT originate from provider.'
  - decision: 'Env name LOCKED by c1 spike artifact, NOT by this story'
    rationale: 'c1 spike is the authoritative SDK + auth model decision. This story reads the artifact and uses the locked name. Hard separation of concerns.'
  - decision: 'No Symbol.for cache for the SDK client'
    rationale: 'Unlike firebase-admin (singleton App + Firestore), `@google/generative-ai` constructor is cheap (just stores the API key in memory). Per-call instantiation is fine and avoids global state. If perf becomes an issue, easy to add a Symbol.for cache.'
  - decision: 'MODEL_ID = "gemini-2.5-flash-image" as a constant'
    rationale: 'Single point of truth for the model name. If c1 spike finds a different model variant (e.g., "gemini-2.5-flash-image-preview"), one-line change. Future provider-version bumps are mechanical.'
  - decision: '`ProviderRequest.images` accepts `Buffer` bytes (not URLs or storage paths)'
    rationale: 'Provider should not know about Firebase Storage. Caller (c14) reads bytes from Storage via c5 helper and passes them in. This keeps the provider unit-testable without Storage mocking.'
  - decision: 'Catch block maps error.code → reason via simple string matching'
    rationale: 'SDK error code conventions are unstable (varies by SDK version + API status). String-match heuristics catch the common cases (429 → rate_limit; ECONNRESET → network) and fall through to `unknown`. Acceptable for v1; tightening requires real production data.'

cross_cutting:
  - concern: 'security'
    notes: "API key from `lib/env.ts`; rotation via `feedback_secret_rotation_no_releak` script. `'server-only'` import prevents client-bundle leak. Reviewer grep verifies."
  - concern: 'error-handling'
    notes: 'Discriminated envelope. Catch logs code+message+model. Reason taxonomy (`refusal | rate_limit | network | low_quality | unknown`) is the source-of-truth for c14 retry policy + c17 UI copy mapping.'
  - concern: 'provider-boundary'
    notes: 'Single file, single function. Future provider swap = replace this file only. c14 + c15 + c16 + c17 stay unchanged on swap (assuming new provider produces image bytes + similar error taxonomy).'

risks:
  - severity: high
    description: 'c1 spike NO-GO and provider swap requires a different SDK with non-Buffer / non-base64 response shape (e.g., URL-returning provider)'
    mitigation: 'Acceptable architectural debt — `ProviderResult.imageBytes: Buffer` is the v1 contract. If swap requires URL response, the provider implementation downloads the URL bytes inside generateImage and returns Buffer (so caller contract stays). Worst case: ProviderResult shape changes and c14 also updates. Both files change; downstream stays.'
  - severity: high
    description: 'SDK install fails or has a peer-dep conflict with existing firebase / next deps'
    mitigation: 'Check during integrate. If conflict, override or pick alternative SDK. Memory `feedback_codex_exec_quirks` warns about pre-build / install issues — c13 is the canary for this risk.'
  - severity: medium
    description: 'Error code mapping misses a real production failure mode (e.g., quota-exceeded comes through as a generic 500)'
    mitigation: 'Catch fall-through is `unknown` — UI in c17 has a guided-failure branch for `unknown`. Production telemetry (`[provider] generateImage failed` logs) will surface drift; future story adjusts the mapping.'
  - severity: medium
    description: 'Provider response shape extracts `inlineData.data` but actual responses use a different field (e.g., `fileData.fileUri`)'
    mitigation: 'c1 spike implement step writes the sample response payload to the artifact; c13 implementer reads it. Defensive extraction with `unknown` fallback if shape mismatches.'
  - severity: low
    description: 'API key accidentally logged in error message via `err.message` containing the request URL with key in query string'
    mitigation: 'Reviewer manual: scan err.message in catch block for any pattern that includes the API key. SDK should not embed the key in error messages but worth verifying. If found, scrub before logging.'

