design_decisions:
  - decision: 'Retry budget = ONE silent retry (kickoff #8 + FR-C-7)'
    rationale: 'Locked. Adding more retries hides rate-limit signals and prolongs user wait beyond the polished pending state c17 ships. Single retry on transient errors gives one chance to recover from a flaky network without adding ambiguous "trying again..." UX.'
  - decision: 'Transient reasons = `network` + `rate_limit` ONLY'
    rationale: 'Refusal is a deterministic provider judgment (safety / recitation block); retrying with the same input changes nothing. Low_quality is a downstream classification that retry would not improve. Unknown means the error is unclassified — retrying without diagnosis is a coin flip; better to surface immediately.'
  - decision: 'Fixed 500ms backoff between retry attempts'
    rationale: 'Single retry; exponential backoff is for 3+ attempt scenarios. 500ms is enough to let a transient blip resolve without making the user wait noticeably longer (c17 pending state is already 10-15s territory).'
  - decision: '`buildGeminiRequest` fails strictly on any missing reference byte (no partial-secondaries)'
    rationale: 'If a secondary reference cannot be read, the assembled request is materially different from what the user composed. Better to surface the failure than silently send a smaller reference set. User can remove the broken reference in c11 UI and retry.'
  - decision: 'Image order in ProviderRequest: primary at index 0, secondaries in input order'
    rationale: "Order matters to the model. c8 ReferenceSet preserves user-input order; c14 propagates that order to the provider. If c1 spike found that order doesn't affect quality, this is still cheap to maintain."
  - decision: 'Provider success returns success at c14 — `low_quality` classification deferred to c17 if needed'
    rationale: "c1 spike output didn't identify a robust low_quality signal at the bytes level. UI in c17 reserves a low_quality branch for future use (e.g., if blank-output detection is added). Not classifying at c14 keeps this layer pure."
  - decision: '`metadata.retryCount` and `metadata.durationMs` propagated to caller for c15 to persist'
    rationale: 'c15 generations row stores `providerResponseMetadata: unknown` (c3). Storing retryCount + durationMs lets future telemetry queries answer "what % of generations needed retry?" and "what''s P95 generation latency?". Cheap to record.'
  - decision: 'No request memoization or deduplication'
    rationale: 'Each generate call is unique (new generation row). User clicking generate twice should produce two attempts. Idempotency would require a request hash + cache; not worth v1 complexity.'

cross_cutting:
  - concern: 'error-handling'
    notes: 'Discriminated envelope. Reasons (`missing_reference_bytes`, `primary_required`, `refusal`, `rate_limit`, `network`, `low_quality`, `unknown`) align with c13 + c17 UI mapping. metadata.retryCount + durationMs persisted by c15.'
  - concern: 'provider-boundary'
    notes: "c14 wraps c13 with retry; c14 itself does NOT touch the SDK. Provider swap is c13's file only."
  - concern: 'data-model'
    notes: 'Reference + NailShape consumed verbatim from c3. ProviderRequest + ProviderResult consumed verbatim from c13. No new types invented at c14 layer (only the GenerateResult composite envelope).'

risks:
  - severity: high
    description: 'Single 500ms backoff insufficient for some rate_limit windows (e.g., per-minute quota), retry hits the same wall'
    mitigation: 'Expected behavior — second failure surfaces to user. UI in c17 includes "rate_limit-after-retry" branch with copy guiding the user to wait. Future hardening could implement Retry-After header parsing if provider supports it.'
  - severity: high
    description: 'c5 readReferenceBytes is missing and c14 introduces it as a side effect; reviewer overlooks the storage helper change'
    mitigation: 'Researcher question (1) confirms c5 surface; reviewer step explicitly checks for new exports in lib/firebase/storage.ts. If extension was needed, files_to_modify lists it.'
  - severity: medium
    description: 'Reference Storage object MIME type is `application/octet-stream` (default) instead of image/jpeg → ProviderRequest mimeType invalid'
    mitigation: 'c6/c7 ingest paths set Content-Type metadata explicitly when uploading. readReferenceBytes returns the actual stored content-type. If drift, integration test (19) catches it.'
  - severity: medium
    description: 'Provider SDK version drift after c13 ships changes the success / error response shape; c14 retry classification breaks'
    mitigation: 'Pinned SDK version in package.json (^x.y.z) limits drift. Integration test catches breakage on next CI run.'
  - severity: low
    description: 'metadata.durationMs measures wall-clock; if the test process is slow, durationMs > 500ms even without retry, masking timing assertions'
    mitigation: 'Test (18) uses `>= 500` not `=== 500`. Fake timers in test (17) make timing deterministic. Acceptable.'
  - severity: low
    description: 'Buffer.toString("base64") for large images is memory-intensive (~10 MB image → ~13 MB base64 string)'
    mitigation: 'c7 caps uploads at 10 MB; Pinterest variants are smaller. Memory pressure acceptable for v1 single-user. Future optimization if user growth demands.'

