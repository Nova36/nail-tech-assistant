design_decisions:
  - decision: 'Inline retryable browse-error UI is SEPARATE from error.tsx, not a replacement'
    rationale: 'error.tsx remains the catch-all for unexpected failures (B4 architect MAJOR-1 carry); inline retry is for graceful in-grid recovery from specific failure classes (rate_limit/network/unknown) without losing list state'
  - decision: 'Empty-state components are server-renderable (no client JS)'
    rationale: 'No interactivity needed; server rendering matches the streaming pattern Don picked in dd-q6'
  - decision: 'Inline retry preserves existing items above the failure point'
    rationale: 'Better operator UX — retry should feel like resuming, not restarting; aligns with infinite-scroll mental model'
  - decision: 'Real-token smoke is OPT-IN via env flag (`RUN_REAL_TOKEN_SMOKE=1`)'
    rationale: 'Per horizontal plan layer 8 — broader test suite stays mocked to avoid coupling to external token stability; smoke runs at epic acceptance only'
  - decision: '`[boardId]/not-found.tsx` and `loading.tsx` are CONDITIONAL — only create if research/UX justifies'
    rationale: 'Avoid premature ceremony — slice scope discipline; existing B3 `not-found.tsx` and B2/B3/B4 Suspense boundaries already cover the common cases'
  - decision: 'Empty-state for zero boards optionally links to Pinterest dashboard'
    rationale: 'Operator action to fix the empty state is external (create boards in Pinterest), so a deep link is helpful — but treat as optional, not required'
  - decision: 'ui-design step produces a short addendum, not a full new brief'
    rationale: 'No new architectural surfaces; refinement only; avoids wasteful design ceremony'

cross_cutting: []

risks:
  - severity: medium
    description: 'Inline retry implementation accidentally unmounts the existing list state, losing all loaded items on retry'
    mitigation: 'Test asserts loaded items remain visible after retry; reviewer cross-reads BoardGrid/PinGrid state management'
  - severity: low
    description: 'Real-token smoke fails because the target environment lacks PINTEREST_ACCESS_TOKEN — false-red signal'
    mitigation: 'CONFIRMED 2026-04-29: preview scope has zero env vars (per app-infra-gotchas #4); smoke target retargeted to production alias `https://nail-tech-assistant.vercel.app` where APP_URL+PINTEREST_ACCESS_TOKEN+Firebase blob are populated. SMOKE_BASE_URL override in playwright.config.ts allows a future preview-with-token target without code changes.'
  - severity: low
    description: 'Adding `loading.tsx` when Suspense was sufficient introduces double-fallback flash'
    mitigation: 'Conditional creation in implement step; reviewer skips it if research found no need'
  - severity: low
    description: 'Empty-state UI is too apologetic / treats empty as an error — wrong tone'
    mitigation: 'ui-design addendum locks tone; copy review by reviewer (and Don if borderline)'
  - severity: low
    description: 'B5 cuts under timeline pressure but the team forgets that the inline retry test is in B5 — operator hits an awkward error.tsx for transient rate_limit failures during demo'
    mitigation: 'Vertical-plan moldability notes already document the deferred-eligibility; Don is the on-the-record decision-maker for cutting B5'

