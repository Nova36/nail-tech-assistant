      US-B-2: Browse boards and pins. Given Pinterest returns a fetch failure or
      the static access token is revoked, when I try to load boards or pins,
      then the app shows a retryable browse error with token-replacement
      guidance rather than pretending the integration is still healthy.
      FR-B-7: Empty boards or empty pin lists must render an explicit empty
      state, not a blank grid.
  - path: .pHive/epics/epic-b-pinterest-integration/docs/horizontal-plan.md
    relevant_excerpt: |
      Layer: Client Components. Empty-board and empty-pin states must be
      explicit UI states rather than blank grids.
      Layer: Pagination Wiring. Handle `rate_limit`, `network`, and `unknown`
      pagination failures with retryable browse messaging.
      Layer: Tests. Keep real-token verification limited to one smoke path at
      epic acceptance; full suite can stay mocked.
  - path: .pHive/epics/epic-b-pinterest-integration/docs/vertical-plan.md
    relevant_excerpt: |
      Step 5 — Polish + cleanup. WHAT WORKS AFTER THIS STEP: Empty-state UIs
      are explicit for zero boards and zero pins, retryable browse-error UI
