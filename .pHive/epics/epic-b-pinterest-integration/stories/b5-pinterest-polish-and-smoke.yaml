description: |
  Vertical Slice 5 of Epic B. Polish + acceptance hardening on top of the
  shipped browse + token-remediation paths. NOT required for the
  min-viable-ship cut (S1+S2+S3+S4 already satisfies US-B-1 + US-B-2 + US-B-3).
  Deferred-eligible: if Mother's Day timeline pressure hits, this slice can be
  cut without invalidating epic acceptance.

  Scope:
  - Empty-state UI for zero boards (the configured Pinterest account has no
    boards) and zero pins (a board is empty)
  - Inline retryable browse-error UI for `rate_limit`, `network`, and
    `unknown` failures inside the browse path (currently they fall through to
    error.tsx — a generic catch with "Try again"; this slice replaces that
    with inline browse-aware retry that doesn't unmount the page chrome)
  - Optional `[boardId]/not-found.tsx` for board-specific copy (only if
    operator UX research shows the generic `not-found.tsx` from B3 is
    insufficient — otherwise skip)
  - Optional `loading.tsx` segment-level fallback (only if Suspense alone
    leaves a perceptible blank flash; otherwise skip)
  - Real-token Vercel preview smoke test as epic acceptance

  Resolved decisions reused: uniform grid, infinite scroll, Tailwind-first.
  No new architectural surfaces — only refinement of existing ones.

  ui-design step is OPTIONAL for this slice. The new surfaces (empty states,
  retryable inline error) are small refinements to existing component
  vocabularies; if the ui-designer judges the existing B2/B3/B4 briefs
  sufficient, they can extend those briefs in-place rather than producing a
  new one. Default: ui-design step runs but produces a short addendum brief
  rather than a full wireframe.

acceptance_criteria:
  - 'Given the configured Pinterest account has zero boards (mocked response `items: []`), when the user opens `/pinterest`, then an explicit empty-state UI renders (e.g., "No boards yet — create one in Pinterest to see it here"), NOT a blank grid.'
  - 'Given a board has zero pins (mocked response `items: []`), when the user opens `/pinterest/[boardId]`, then an explicit empty-state UI renders for that board, NOT a blank grid.'
  - 'Given the boards or pins server action returns a `rate_limit` or `network` error, when the response lands, then the affected grid surface renders an inline retryable browse-error UI (NOT a full-page error.tsx replacement) and offers a "Try again" control that retries the failed page.'
  - 'Given the operator triggers the inline retry, when the retry succeeds, then the previously-rendered items remain in place and the new page is appended (no list state loss).'
  - 'Given the production deploy at https://nail-tech-assistant.vercel.app holds a real (non-mocked) PINTEREST_ACCESS_TOKEN, when an end-to-end smoke run executes with `RUN_REAL_TOKEN_SMOKE=1` (log in → /pinterest → click board → see pins), then it completes successfully against the real Pinterest API. (Reframed 2026-04-29: original target was Vercel preview, but preview scope has no env vars per app-infra-gotchas #4 — production alias is the working real-token target.)'
  - 'Given B1-B4 already shipped, when this slice ships, then no prior acceptance criterion regresses (full Epic B test suite green).'

steps:
  - id: research
    description: |
      Max 2 focused questions:
      (1) Inline retryable browse-error UI pattern — what's the idiomatic Next 15
      / React 19 way to handle a server-action failure inside a client
      component without unmounting the existing list state? Confirm whether
      the existing `BoardGrid` / `PinGrid` should track an `error` state and
      render inline, or whether a separate error-boundary at the grid level
      is cleaner.
      (2) Real-token smoke on Vercel preview — confirm CI/preview env has
      `PINTEREST_ACCESS_TOKEN` available (or whether smoke is run manually
      against a deployed preview URL); confirm Playwright config supports
      pointing at the preview URL.
      Read `components/pinterest/{BoardGrid,PinGrid}.tsx` from B2/B3,
      `lib/pinterest/errors.ts` from B1, and `app/(authenticated)/pinterest/error.tsx`
      from B4.
    agent: researcher
  - id: ui-design
    description: |
      Produce a short addendum brief at
      `.pHive/design/briefs/pinterest-polish-empty-states-addendum.md` (NOT a full new
      wireframe — extend the existing B2/B3/B4 briefs).

      Cover ONLY what's new:
      - Empty-state for `/pinterest` (zero boards) — small illustration or
        icon optional, terse copy, optional CTA link to Pinterest dashboard
        (do NOT make it look like an error)
      - Empty-state for `/pinterest/[boardId]` (zero pins) — similar
        treatment scoped to the board
      - Inline retryable browse-error UI — small banner or inline card at the
        bottom of the grid (where the InfiniteScrollSentinel would normally
        live) with terse "Couldn't load more" copy + "Try again" button;
        existing items above stay intact

      If ui-designer judges the addendum unnecessary (existing briefs cover
      these surfaces), they can output a one-line brief that says "extends
      B2/B3 briefs with empty-state and inline retry per spec" and skip the
      detailed wireframe.
    agent: ui-designer
    depends_on: [research]
    optional: false
  - id: test-spec
    description: |
      Write failing tests BEFORE implementation.

      - tests/integration/pinterest/boards-page-empty.test.tsx:
        (1) Mock `listPinterestBoards()` to return `{ items: [], nextBookmark: null }`
        (2) Render `/pinterest`; assert empty-state UI renders (heading or
            text per ui-design addendum), NOT a blank `BoardGrid`.

      - tests/integration/pinterest/board-detail-empty.test.tsx:
        (1) Mock `listPinterestBoardPins({ boardId })` to return
            `{ items: [], nextBookmark: null }`
        (2) Render `/pinterest/[boardId]`; assert empty-state UI for the
            board renders.

      - tests/integration/pinterest/boards-page-rate-limit.test.tsx:
        (1) Mock the boards server action's second-page call to throw a
            `rate_limit` error (or return an error union)
        (2) Trigger the sentinel; assert inline retryable browse-error UI
            appears at the grid bottom; assert previously-loaded boards
            remain visible above; assert "Try again" button present.

      - tests/integration/pinterest/board-detail-network-error.test.tsx:
        Same pattern as boards-page-rate-limit but for pins + a `network`
        error type.

      - tests/e2e/pinterest-real-token-smoke.spec.ts:
        Marked `test.describe.configure({ mode: 'serial' })` and gated
        behind `RUN_REAL_TOKEN_SMOKE=1`. Default-skip in unit/integration
        runs; runs explicitly at epic acceptance against the production
        alias `https://nail-tech-assistant.vercel.app` (preview scope
        has no env vars per app-infra-gotchas #4).
        (1) Open the production alias
        (2) Log in
        (3) Navigate to `/pinterest`; assert real boards render
        (4) Click first board; assert real pins render
        (5) Scroll once; assert append works

      Do NOT regress any B1-B4 tests.
    agent: tester
    depends_on: [ui-design]
  - id: implement
    description: |
      Make the failing tests pass. Refinements to existing surfaces — no new
      architectural pieces.

      Files to produce / modify:

      - components/pinterest/EmptyBoardsState.tsx — Create:
        - Server-renderable empty-state per ui-design addendum
        - Tailwind-first; warm-shell continuity
        - Optional link to Pinterest dashboard

      - components/pinterest/EmptyPinsState.tsx — Create:
        - Server-renderable empty-state for a specific board

      - components/pinterest/InlineBrowseError.tsx — Create:
        - Client component (needs onClick for retry)
        - Accepts `{ onRetry: () => void }` prop
        - Renders terse error copy + "Try again" button per ui-design addendum
        - Consumed by `BoardGrid` and `PinGrid` when their server-action call
          fails with `rate_limit` / `network` / `unknown`

      - components/pinterest/BoardGrid.tsx — Modify (extend B2):
        - When `items.length === 0` on initial render, render
          `<EmptyBoardsState/>` instead of an empty grid
        - Wrap the server-action call in a try/catch; on error, store the
          error in local state and render `<InlineBrowseError onRetry={...}/>`
          at the grid bottom; keep existing items intact

      - components/pinterest/PinGrid.tsx — Modify (extend B3):
        - Same empty-state + inline-error treatment as BoardGrid but for pins
        - Empty-state component is `<EmptyPinsState/>`

      - app/(authenticated)/pinterest/[boardId]/not-found.tsx — Create
        ONLY IF ui-design addendum specified board-specific not-found copy.
        Otherwise skip — the generic `not-found.tsx` from B3 covers it.

      - app/(authenticated)/pinterest/loading.tsx — Create
        ONLY IF research step #1 found that Suspense alone leaves a
        perceptible blank flash. Otherwise skip.

      - playwright.config.ts — Modify:
        - Add a separate project / config for `pinterest-real-token-smoke`
          that points at the production alias
          (`https://nail-tech-assistant.vercel.app`) via a `SMOKE_BASE_URL`
          override so a future preview-with-token run can retarget without
          code changes
        - Default-skip via `RUN_REAL_TOKEN_SMOKE=1` env flag

      Do NOT add new architectural surfaces. Do NOT modify token-remediation
      views (B4). Do NOT modify error.tsx (B4) — the new inline retryable UI
      is a SEPARATE surface for browse-time failures, not a replacement for
      error.tsx.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: |
      Verify polish hits without scope creep or regression.

      - Empty-state components are server-renderable (no unnecessary client
        JS).
      - Inline retryable browse error is client-side ONLY (needs onClick) —
        never replaces error.tsx, only supplements it for a specific failure
        class on a specific surface.
      - Existing items remain in place when retry is offered (no list state
        loss).
      - No regression: full Epic B test suite green (B1-B4 + B5).
      - Real-token smoke test runs successfully against Vercel preview at
        epic acceptance time.
      - If `[boardId]/not-found.tsx` was NOT added, generic `not-found.tsx`
        from B3 still handles invalid boards correctly.
      - No `loading.tsx` if research showed Suspense alone is sufficient
        (avoid superfluous segment-level fallback).
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: |
      Commit `feat(b5): empty states + inline retryable browse error + real-token smoke`.
      Branch: `epic-b/pinterest-polish-empty-states`.
    agent: integrator
    depends_on: [review]

