  surfaces:
    EmptyBoardsState: "Fraunces 'No boards yet.' + one Inter sentence + dashed-board-outline silhouette + pushpin glyph (40x40, decorative, aria-hidden=true)"
    EmptyBoardState: "Same layout as EmptyBoardsState, copy shifts to 'This board is empty.'"
    BrowseErrorRetry: "Inline in-grid treatment (does NOT unmount page chrome). Warm Charcoal heading 'Pinterest didn't respond.' (NOT destructive red — reserved for destructive actions). Muted-foreground reason line. 'Try again' button (primary bg). role='alert' wrapper per _a11y-spec.md."
  implementation_notes: |
    - BrowseErrorRetry replaces the error.tsx fall-through for rate_limit/network/unknown failures inside the browse path.
    - Empty states use role='status' aria-live='polite' (calm announcement), BrowseErrorRetry uses role='alert' (retryable failures warrant immediate attention) per _a11y-spec.md §2 b5.
