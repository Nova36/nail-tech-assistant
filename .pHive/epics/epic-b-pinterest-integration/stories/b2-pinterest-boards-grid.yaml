risks:
  - severity: high
    description: 'Suspense boundary placement wrong — the boards fetch resolves outside the suspense subtree and blocks the whole page render'
    mitigation: 'Research step #2 confirms idiomatic placement; integration test asserts skeleton actually renders before resolved boards (not just final state)'
  - severity: high
    description: 'IntersectionObserver fires duplicate requests for the same bookmark, appending duplicate items'
    mitigation: 'Sentinel guards with a `loading` ref + dedupe on bookmark; integration test asserts second-page network call uses the correct bookmark and no duplicate appears'
  - severity: medium
    description: 'Pinterest returns boards with image variants we did not model in B1 types — `next/image` URL is malformed'
    mitigation: 'Researcher confirms current image variant naming; types.ts cover-image typing intentionally flexible (B1 risk note); fall back to a placeholder image if a variant is missing'
  - severity: medium
    description: 'Server action exposes the token by mistake (e.g., includes a header copy in the response shape)'
    mitigation: 'Reviewer grep step + unit test asserting return type has no token field; the action only returns `{ items, nextBookmark }`'
  - severity: medium
    description: '401/403 paths fall through to `error.tsx` in this slice and surprise the operator before B4 ships the page-level branches'
    mitigation: 'Slice scope explicitly notes that 401/403 land in B4. If B2 ships before B4, document the temporary fallback in the integrate commit message so Don knows the gap.'
  - severity: low
    description: 'Tablet touch target sizing drifts from Epic A conventions'
    mitigation: 'ui-design brief references Epic A`s tablet breakpoint; reviewer cross-checks card hit area'

