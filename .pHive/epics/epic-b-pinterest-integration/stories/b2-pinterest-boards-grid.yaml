design_decisions:
  - decision: 'Uniform grid layout for boards (and later pins)'
    rationale: 'Cycle-state dd-q1 — Don confirmed uniform over masonry for layout stability + next/image cooperation'
  - decision: 'Infinite scroll via IntersectionObserver instead of load-more button'
    rationale: 'Cycle-state dd-q2 — Don OVERRODE the design-discussion load-more recommendation; sentinel-driven append matches Pinterest browse expectations'
  - decision: 'Initial boards come from server-rendered props, not client useEffect fetch'
    rationale: 'Suspense streaming requires server-component data fetch; using client fetch on mount would defeat the streaming pattern Don picked in dd-q6'
  - decision: 'Server action (not API route) for pagination'
    rationale: 'Next 15 idiomatic pattern; keeps token boundary inside `lib/pinterest/client.ts` while still letting the client component request more data'
  - decision: 'No `lib/utils.ts` `cn()` helper introduced in this slice'
    rationale: 'Cycle-state dd-q3 — defer shadcn `cn()` until shadcn primitives are actually adopted; Epic B stays Tailwind-first'
  - decision: 'Skeleton uses `aria-busy` semantic, not visual-only spinner'
    rationale: 'Streaming is an accessibility surface; behavior-first tests should target `aria-busy` rather than class names'

