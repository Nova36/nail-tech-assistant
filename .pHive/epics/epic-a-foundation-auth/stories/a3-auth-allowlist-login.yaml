design_decisions:
  - decision: 'Server action (not API route) for login submission'
    rationale: 'Next 15 idiomatic; keeps client form + server logic colocated'
  - decision: 'Case-insensitive allowlist comparison'
    rationale: 'Firebase Auth normalizes emails to lowercase; matching behavior prevents user friction'
  - decision: 'Rejection message does NOT name the allowed email'
    rationale: "Minimal info disclosure; the allowed email is still effectively public via env.example but the rejection UI shouldn't advertise it"
  - decision: 'Email-link ActionCodeSettings url = APP_URL'
    rationale: 'Prevent open-redirect; the handler route on APP_URL processes the link callback'

cross_cutting: []

risks:
  - severity: high
    description: 'Client-only allowlist check — rejection happens in browser JS, server still processes any submission'
    mitigation: 'Test contract explicitly asserts mock.sendSignInLinkToEmail.called = false on rejection path; reviewer verifies server order-of-operations'
  - severity: medium
    description: 'Rate-limit abuse — attacker could spam the server action with the allowed email'
    mitigation: 'Out of scope for A3 (no rate limit in v1 — single user, private URL). Flagged for Epic F (polish) if exposure materializes.'
  - severity: low
    description: 'Email-link redirect fails if APP_URL is wrong in non-prod envs'
    mitigation: 'Env validation in a2 ensures APP_URL is present; local dev uses http://localhost:3000'

references:
  - path: .pHive/planning/prd.md
    relevant_excerpt: |
      US-A-1: Allowlisted login. Given I am on /login and I enter the configured
      allowed email, when I submit the login form, then the app triggers the Firebase
      email-link flow and shows a sent-state confirmation. Given I enter an email
      that does not match ALLOWED_EMAIL, when I submit, then the app rejects the
      request before any Firebase send action occurs.
      FR-A-2: Server-side allowlist enforcement must reject non-authorized emails
      BEFORE auth side effects occur.
  - path: .pHive/planning/structured-outline.md
    relevant_excerpt: |
      `lib/auth/allowlist.ts` — isolate the `ALLOWED_EMAIL` check so the allowlist
      rule is server-enforced and reusable. Login submit contract: POST /login server
      action or route handler accepts `{ email: string }`. Success: `{ status: 'sent' }`.
      Blocked: `{ status: 'rejected'; message: 'Only the configured email can sign in.' }`.
  - path: .pHive/planning/sign-off.md
    relevant_excerpt: |
      #1 — APPROACH — Single-user allowlist via ALLOWED_EMAIL + server-side checks + RLS

