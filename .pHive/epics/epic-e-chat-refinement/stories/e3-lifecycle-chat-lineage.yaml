id: e3-lifecycle-chat-lineage
epic: epic-e-chat-refinement
title: 'lifecycle.ts chat-turn lineage attachment'
status: blocked
complexity: medium
methodology: tdd
depends_on: [e1-chat-turns-persistence, e2-chat-refinement-accumulation]

description: |
  Extend the lifecycle seam in `lib/designs/lifecycle.ts` so a generated result
  can attach back to the chat turn that triggered it. This is the Epic E lineage
  hinge: on success, the generation row gains `chatTurnId`, the chat-turn row gains
  `generationId`, and the parent design still updates `latestGenerationId` in the
  same atomic transaction pattern already used by `persistGenerationResult`
  (`lib/designs/lifecycle.ts:228-316`, `researcher-raw-findings.md` Q1). That maps
  directly to FR-E-1 and FR-E-3 (`prd.md` L661-L668).

  BLOCKED-UNTIL: Epic D d8 merges. The route and lifecycle design for Epic E are
  intentionally outlined against the d8 regenerate-from-stored-inputs contract.
  This story may be authored now, but it cannot be integrated confidently until
  d8's `persistGenerationResult` and request-building seam are stable on the Epic D
  branch (`research-brief.md` Epic D Dependency State; `tpm-story-sequence.md`
  dependency DAG). If d8 is still in flight during execution, the story remains
  blocked instead of pretending the seam is ready.

  Scope here is additive lifecycle wiring only. Do not invent a second generation
  pipeline, and do not move route concerns into the lifecycle module. The helper
  extension should remain compatible with non-chat callers by making `chatTurnId`
  optional and preserving the current non-chat behavior when it is absent.

acceptance_criteria:
  - 'Given a successful chat-driven generation, when `persistGenerationResult` completes, then the transaction updates `generations/{id}.chatTurnId`, `designs/{designId}.latestGenerationId`, and `designs/{designId}/chat_turns/{turnId}.generationId` atomically | maps to FR-E-1 and FR-E-3 (`prd.md` L661-L668)'
  - 'Given a non-chat generation call path, when `chatTurnId` is omitted, then lifecycle behavior matches the current Epic D contract with no regression | maps to FR-E-5 (`prd.md` L672-L673)'
  - 'Given a Firestore or storage failure in this seam, when the catch path runs, then server logs include code + message for diagnosis | maps to FR-E-6 and feedback_silent_catches_cost_time.md'

steps:
  - id: research
    description: Pull the latest d8 story/code state from the Epic D branch, confirm the current `persistGenerationResult` contract, and verify the exact chat-turn subcollection path landed by e1 before test authoring.
    agent: researcher
  - id: test-spec
    description: |
      Write failing unit tests first in `tests/unit/designs/lifecycle-chat.test.ts`.
      Cover: success transaction writes `chatTurnId` and `generationId` on the two
      linked records; non-chat callers still pass when `chatTurnId` is absent; failure
      updates retain existing error semantics. Do not read the implementation first.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Extend `persistGenerationResult` or a tightly-scoped sibling helper in
      `lib/designs/lifecycle.ts` so it accepts optional `chatTurnId`. Mirror the
      existing transaction pattern at `lib/designs/lifecycle.ts:300-316`, but add a
      third document update for `designs/{designId}/chat_turns/{chatTurnId}` when the
      ID is present. Write `generations/{generationId}.chatTurnId` and
      `chat_turns/{turnId}.generationId` in the same transaction as
      `designs/{designId}.latestGenerationId`.

      Keep catch blocks explicit: log code + message in every Firebase/storage failure
      branch. Do not move request-building or auth logic into lifecycle.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: Type-check + unit pass. Confirm the additive signature does not break non-chat callers and every new catch path logs code + message.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: 'Single commit `feat(e3): attach lifecycle lineage to chat turns` on epic-e/chat-refinement.'
    agent: developer
    depends_on: [review]

