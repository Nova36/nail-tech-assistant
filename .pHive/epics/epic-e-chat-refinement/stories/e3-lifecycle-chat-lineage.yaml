  - title: Current error logging pattern in lifecycle
    file: lib/designs/lifecycle.ts:147
    snippet: |
      } catch (err) {
        const code = (err as { code?: string }).code ?? 'unknown';
        const message = (err as Error).message ?? String(err);
        console.error('[lifecycle] persistGenerationStart design read failed', {
          uid: input.userId,
          designId: input.designId,
          code,
          message,
        });
        return { ok: false, reason: 'firestore_failure', message };
      }

design_decisions:
  - decision: Extend the existing lifecycle seam instead of creating a parallel chat-specific persistence helper
    rationale: Research brief identifies `persistGenerationResult` as the canonical attachment point for designâ†’generation lineage (`research-brief.md` Saved-design lineage, `lib/designs/lifecycle.ts:228-316`).
  - decision: Keep `chatTurnId` optional
    rationale: FR-E-5 requires Epic E to remain cuttable without destabilizing the P0 path, so non-chat callers must preserve today's behavior (`prd.md` L672-L673, `tpm-story-sequence.md` FR coverage).
  - decision: Treat d8 merge as a hard execution gate
    rationale: This story is authored against the d8 contract and cannot be integrated honestly until that contract lands (`research-brief.md` Epic D Dependency State, `design-discussion.md` Â§4 HIGH risk).

cross_cutting:
  - concern: error-logging
    action: Every new catch branch must log code + message and safe identifiers such as `generationId`/`designId`.

risks:
  - severity: high
    description: d8 (regenerate-from-stored-inputs) is still in flight, so this story can drift against an unstable lifecycle contract.
    mitigation: Research step must pull the latest d8 state first; if d8 is still unmerged, keep the story blocked and do not integrate.
  - severity: medium
    description: A partial transaction design could leave `generationId` and `chatTurnId` out of sync across the linked docs.
    mitigation: Restrict the happy-path linkage to one Firestore transaction that updates generation, parent design, and chat-turn rows together.

