design_decisions:
  - decision: Implement chat as a route handler, not a server action
    rationale: Research brief explicitly calls chat toward the route-handler transport and the repo already uses `getSession(req)` for that surface (`research-brief.md` UI integration surface, `app/api/designs/[id]/route.ts:21-36`).
  - decision: Mirror the d8 generate pipeline rather than inventing a second orchestration path
    rationale: Epic E is layered on saved-design lineage; d8 is the direct implementation template for stored-input regeneration (`research-brief.md` d8 template, `prd.md` L667-L668).
  - decision: Keep route validation manual unless research finds a closer body-schema precedent
    rationale: zod exists in `lib/env.ts`, but the surrounding lifecycle/design route surfaces mostly use manual validation today (`research-brief.md` Validation Notes, `design-discussion.md` §6 Q6).

cross_cutting:
  - concern: error-logging
    action: Log code + message in every Firebase/provider catch path.
  - concern: provider-isolation
    action: Route tests must mock the provider boundary and avoid importing `app/(authenticated)/design/actions.ts`.

risks:
  - severity: high
    description: d8 is still in flight, so the request pipeline could drift while this story is blocked.
    mitigation: Research step verifies the current d8 contract before test authoring; if d8 is unmerged, keep status blocked.
  - severity: medium
    description: Importing `actions.ts` transitively can force `PINTEREST_ACCESS_TOKEN` env validation into a route test that does not need it.
    mitigation: Keep the route isolated from server-action files and follow `feedback_actions_file_transitive_env.md` if any test must import that module family.

