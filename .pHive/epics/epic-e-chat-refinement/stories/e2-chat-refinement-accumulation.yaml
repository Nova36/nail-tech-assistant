design_decisions:
  - decision: Keep prompt accumulation as a pure function in its own module
    rationale: TPM explicitly split e2 in parallel with e1 because this seam is independently testable and should not wait on Firestore or d8 (`tpm-story-sequence.md` table and parallelism section).
  - decision: Use stable structured-prefix concatenation instead of summarization
    rationale: Design discussion Q3 recommends simple concatenation plus a hard 5-turn cap for v1 to avoid hidden behavior in a stretch-scope feature (`design-discussion.md` §6 Q3).
  - decision: Define `ChatTurn` in `lib/designs/chat-refinement.ts`
    rationale: Research brief notes type colocation in this repo, and `lib/designs/load.ts` demonstrates the pattern directly (`research-brief.md` UI integration surface, `lib/designs/load.ts:10-21`).

cross_cutting:
  - concern: types-coverage
    action: Keep `ChatTurn` exhaustive and drive the helper contract through unit tests rather than inline object literals spread across route/UI layers.

risks:
  - severity: medium
    description: Prompt formatting drift between tests and implementation could make later turns unstable without obvious failures.
    mitigation: Lock the exact prefix format in unit tests and treat those strings as API-level contract for downstream stories.
  - severity: low
    description: A too-clever helper could absorb provider or Firestore concerns and break the intended parallel seam.
    mitigation: Review step rejects any server-only import or side effect in `lib/designs/chat-refinement.ts`.

