design_decisions:
  - decision: Gate UI implementation behind a dedicated wireframe step
    rationale: This is the only story where unresolved decisions materially change the component shape; the repo has no existing chat/timeline shell to inherit (`research-brief.md` UI integration surface, `design-discussion.md` §6 Q4-Q5).
  - decision: Fold `IterationTimeline` into e5 rather than creating a separate story
    rationale: TPM locked the 6-story split and explicitly folded the optional timeline into e5 (`tpm-story-sequence.md` parallelism section; task brief "IterationTimeline.tsx folding").
  - decision: Start with in-flow placement after the visualizer, not an assumed sidebar
    rationale: Research shows no current two-column design shell, and the Confirm success branch already has a natural insertion point (`Confirm.tsx:268-313`, `researcher-raw-findings.md` Q3).

cross_cutting:
  - concern: accessibility
    action: Ensure ordered turns, status changes, and failure states are exposed with meaningful labels/roles and remain usable on tablet-first layouts.

risks:
  - severity: high
    description: Tablet landscape fit is unresolved because the current page has no established two-column shell.
    mitigation: Use the ui-design step to lock layout before code, then keep implementation aligned to the approved wireframe only.
  - severity: medium
    description: Without explicit motion review, pending→result transitions can feel abrupt or ignore reduced-motion expectations.
    mitigation: Use the reviewer-step animations-specialist sidecar per `feedback_animations_sidecar_review.md`.

references:
  - path: .pHive/planning/prd.md
    relevant_excerpt: |
      - Given multiple refinement turns exist on one design, when I view the chat panel, then I can see the ordered turn history tied to the current iteration state.
      - Given generation fails after a turn is persisted, when the result returns, then the app makes the failed state understandable.
  - path: app/(authenticated)/design/[designId]/Confirm.tsx
    relevant_excerpt: |
      <VisualizerFrame>
        <div data-testid="nail-visualizer" aria-hidden="true">
          <NailVisualizer
            theme="flat"
            imageUrl={state.imageUrl}
            nailShape={activeShape}
          />
        </div>
      </VisualizerFrame>
  - path: /Users/don/.claude/projects/-Users-don-Documents-GitHub-Nail-Tech-Assitant/memory/feedback_animations_sidecar_review.md
    relevant_excerpt: |
      Epic B's `ui:animations` escalation routes the animations-specialist persona into the reviewer step as a sidecar (not a separate phase).
      The `append` placement turned out to be the genuinely useful one.
