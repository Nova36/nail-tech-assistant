design_decisions:
  - decision: Persist chat turns as a Firestore subcollection under the parent design
    rationale: Locked by this task and preferred over a top-level collection because it matches the parent ownership model and design lifecycle more cleanly (`research-brief.md` Firestore precedent, `prd.md` L661-L663).
  - decision: Keep e1 limited to storage shape and rules, not runtime typing
    rationale: TPM split e1 and e2 explicitly so persistence can move in parallel with the pure accumulation library (`tpm-story-sequence.md` table + "e1 ⫼ e2").
  - decision: Model the chat-turn lane after the existing rules test suite, not as a one-off integration path
    rationale: Epic D already established the rules-lane pattern in `tests/rules/` and this task explicitly calls for mirroring d2/d6/d7 precedent.

cross_cutting:
  - concern: security-rules
    action: Require a rules-lane test that covers owner allow, cross-user deny, anonymous deny, and update field scope.
  - concern: types-coverage
    action: Document the persisted storage shape here, but defer the `ChatTurn` TypeScript type itself to e2.

risks:
  - severity: high
    description: Nested `chat_turns` rules could accidentally bypass parent ownership assumptions if they do not enforce `resource.data.userId == request.auth.uid` directly.
    mitigation: Denormalize `userId` onto each chat-turn doc and mirror the explicit owner checks used by `designs` and `generations` (`firestore.rules:25-63`).
  - severity: medium
    description: Index guidance for a subcollection can drift if the team copies the old top-level collection pattern blindly.
    mitigation: Research step verifies the accepted `collectionGroup` entry shape against `firestore.indexes.json` and `tests/rules/indexes.test.ts:34-69` before writing.

