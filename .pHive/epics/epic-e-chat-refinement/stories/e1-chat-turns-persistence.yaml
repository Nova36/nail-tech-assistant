id: e1-chat-turns-persistence
epic: epic-e-chat-refinement
title: 'chat_turns persistence: schema + firestore.rules + indexes'
status: pending
complexity: medium
methodology: tdd
depends_on: []

description: |
  Add the persistence surface for Epic E's ordered refinement turns by extending
  Firestore coverage for `designs/{designId}/chat_turns/{turnId}`. The subcollection
  choice is locked: prefer the nested design-scoped model over any top-level
  `chat_turns` collection because it keeps ownership reasoning aligned with the
  parent design and auto-cascades naturally when a design is removed. Anchor:
  Slice 7 manifest item #1 in `structured-outline.md` L428 and Epic E FR-E-1 in
  `prd.md` L661-L663. Subcollection direction is reinforced by the research brief's
  persistence section and the explicit override in this task brief (`research-brief.md`
  "Firestore rules + indexes precedent"; `tpm-story-sequence.md` Story e1).

  Scope here is storage shape, rules, and index coverage only. This story does
  NOT define the runtime `ChatTurn` TypeScript type, does NOT add API handlers,
  and does NOT add UI. The stored document shape should still be spelled out in
  the story because downstream stories need a stable contract: `userId`,
  `designId`, `message`, `status`, nullable `generationId`, and ISO timestamps
  ordered by `createdAt`. That separation preserves TPM's parallel seam: e1 owns
  persistence and e2 owns the pure accumulation contract (`tpm-story-sequence.md`
  "e1 ⫼ e2"; `prd.md` L661-L672).

acceptance_criteria:
  - 'Given an authenticated owner, when they read or create `designs/{designId}/chat_turns/{turnId}`, then Firestore rules allow only owner-scoped access and deny cross-user reads/writes | maps to FR-E-1, Security NFR (`prd.md` L661-L663, L681-L682)'
  - 'Given the rules lane runs, when a non-owner or anonymous client touches the chat-turn path, then the emulator denies the request above the default-deny fallback | maps to FR-E-1 and Slice 7 validation (`structured-outline.md` L441-L449)'
  - 'Given chat turns are queried in chronological order for prompt accumulation, when indexes are deployed, then `chat_turns` supports ascending `createdAt` reads within the subcollection contract | maps to FR-E-2 (`structured-outline.md` L430-L444, `research-brief.md` Firestore rules + indexes precedent)'

steps:
  - id: research
    description: Confirm the exact parent/child rules composition for `designs/{designId}/chat_turns/{turnId}` and verify whether the repo's rules lane expects `tests/rules/*.test.ts` naming, not the older `tests/integration/rules/*` draft path.
    agent: researcher
  - id: test-spec
    description: |
      Write failing rules-lane tests first in `tests/rules/chat-turns.rules.test.ts`.
      Mirror the d2/d6/d7 precedent: owner allow, cross-user deny, anonymous deny,
      update/delete scope checks, and one "default deny still catches unknown paths"
      assertion. Add an index-shape test only if the existing `tests/rules/indexes.test.ts`
      lane is the accepted guard for new `firestore.indexes.json` entries.

      Do not read an implementation stub first; write the tests from the persistence
      contract and the Firestore path shape.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Update `firestore.rules` with an explicit nested match under
      `/designs/{designId}/chat_turns/{turnId}` above the deny-all clause. Reads and
      creates are owner-scoped; updates/deletes must keep `userId` immutable and only
      permit the chat-turn lifecycle fields needed by later stories. Storage shape
      is denormalized enough for rules to evaluate ownership without route-time joins:
      include `userId` and `designId` on the row even though the collection is nested.

      Update `firestore.indexes.json` for the `chat_turns` collection group using the
      existing JSON structure in `tests/rules/indexes.test.ts:34-69` and the Epic E
      requirement that chronological reads key off `createdAt ASC`. Per this task,
      keep scope here at persistence only; the TypeScript `ChatTurn` type lives in e2.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: Type-check + rules lane + index shape pass. Verify the nested rules inherit the same owner model as `designs` and do not create a permissive escape hatch below the default deny.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: 'Single commit `feat(e1): add chat turn persistence rules` on epic-e/chat-refinement.'
    agent: developer
    depends_on: [review]

