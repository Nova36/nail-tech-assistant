id: e6-chat-refinement-e2e
epic: epic-e-chat-refinement
title: 'Playwright chat-refinement.spec.ts e2e'
status: blocked
complexity: medium
methodology: tdd
depends_on: [e5-chat-refinement-panel-integration]

description: |
  Add the end-to-end proof for Epic E's user promise: open a saved design, submit a
  first refinement such as "make it more pastel," get a new result, submit a second
  turn such as "add gold accents," and verify the second generation builds on the
  first. This is the final Slice 7 validation lane named directly in
  `structured-outline.md` L433-L456 and in Epic E completion criteria
  (`prd.md` L695-L699).

  BLOCKED-UNTIL: d8 merged and e5 shipped. The UI path has to exist first, and the
  regenerate-from-stored-inputs contract beneath it has to be real, not planned.
  Reuse the existing Playwright harness and emulator helpers already checked into the
  repo: `playwright.config.ts` for webServer env boot and `tests/e2e/fixtures/emulator.ts`
  for auth helper flows. Provider calls must stay isolated or stubbed; CI should not
  hit live Gemini/Vertex (`tpm-story-sequence.md` cross-cutting concerns,
  `playwright.config.ts:25-81`).

  Scope here is the user-visible happy path plus regression protection for the design
  detail flow. Do not turn this into a snapshot or broad tablet-polish suite; that
  belongs elsewhere. One high-signal multi-turn spec is the goal.

acceptance_criteria:
  - "Given a saved design with a successful current generation, when the user submits 'make it more pastel', then a chat-turn row and a linked generation row are created and the image updates | maps to US-E-1 AC1 and FR-E-3 (`prd.md` L631-L668)"
  - "Given a first refinement already succeeded, when the user submits 'add gold accents', then the second generation completes in sequence and the UI still shows ordered turn history tied to the current image | maps to US-E-1 AC2 and US-E-2 AC1 (`prd.md` L633-L645)"
  - 'Given the existing `/design/[designId]` success path already works, when Epic E e2e runs, then it does not break the non-chat design-detail flow or emulator auth harness | maps to FR-E-5 and regression guard (`prd.md` L672-L673)'

steps:
  - id: research
    description: Confirm the existing Playwright login/seeding helpers and whether the current emulator REST seeding pattern should create design + chat-turn + generation documents directly or via app APIs.
    agent: researcher
  - id: test-spec
    description: |
      Write the Playwright spec first in `tests/e2e/chat-refinement.spec.ts`.
      Reuse the auth emulator flow and seeding style from `tests/e2e/visualizer-shapes.spec.ts`
      and `tests/e2e/fixtures/emulator.ts`. Cover the two-turn happy path, current-image
      update, ordered turn rendering, and a regression assertion that existing design
      detail controls still remain reachable.
    agent: tester
    depends_on: [research]
  - id: implement
    description: |
      Add `tests/e2e/chat-refinement.spec.ts`. Touch `playwright.config.ts` only if the
      existing env/webServer setup needs one small extension for chat-specific stubbing.
      Prefer Playwright network interception or emulator-backed provider isolation over
      any live provider call. Keep the spec focused on one saved design and two
      sequential refinements.
    agent: developer
    depends_on: [test-spec]
  - id: review
    description: Run the Playwright spec and confirm it protects both Epic E's happy path and the existing `/design/[designId]` detail flow from regression.
    agent: reviewer
    depends_on: [implement]
  - id: integrate
    description: 'Single commit `feat(e6): add chat refinement e2e coverage` on epic-e/chat-refinement.'
    agent: developer
    depends_on: [review]

