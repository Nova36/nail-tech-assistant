code_examples:
  - title: Existing Playwright auth + seed structure
    file: tests/e2e/visualizer-shapes.spec.ts:99
    snippet: |
      async function signInViaEmailLink(page: Page): Promise<void> {
        await page.goto('/login');
        await page.getByLabel(/email/i).fill(TEST_EMAIL);
        await page.getByRole('button', { name: /sign in|send link/i }).click();
        await page.waitForSelector('[data-testid="email-sent"]');
        const oobLink = await getLatestOobLink(TEST_EMAIL);
        await page.goto(oobLink);
        await page.waitForURL(/\/(?!login)/);
      }
  - title: Existing Playwright webServer env isolation
    file: playwright.config.ts:44
    snippet: |
      webServer: RUN_REAL_TOKEN_SMOKE
        ? undefined
        : {
            command: `firebase emulators:exec --only auth --project=nail-tech-assistant-e2e "pnpm dev:e2e -p ${E2E_PORT}"`,
            url: E2E_BASE_URL,
            reuseExistingServer: !process.env.CI,
            timeout: 180_000,
            env: {
              FIREBASE_AUTH_EMULATOR_HOST: '127.0.0.1:9099',
              PINTEREST_ACCESS_TOKEN: 'dummy-pinterest-token-for-e2e',
            },
          },

design_decisions:
  - decision: Reuse the current Playwright emulator harness instead of creating a chat-specific runner
    rationale: The harness already boots auth emulators, injects safe env vars, and is the accepted E2E lane for saved-design behavior (`playwright.config.ts:25-81`, `tests/e2e/fixtures/emulator.ts:1-51`).
  - decision: Keep provider isolation in the E2E lane
    rationale: TPM flagged provider isolation as a cross-cutting concern for e6; CI should verify app behavior, not third-party uptime (`tpm-story-sequence.md` cross-cutting concerns).
  - decision: Treat this as the final regression guard, not a broad polish suite
    rationale: Slice 7 validation calls for one multi-turn refinement proof; broader polish remains outside Epic E (`structured-outline.md` L445-L460, `prd.md` Scope OUT notes).

cross_cutting:
  - concern: regression
    action: Assert the existing design-detail success path still works while Epic E controls are present.
  - concern: provider-isolation
    action: Stub or intercept provider traffic; no live Gemini/Vertex calls in CI.

risks:
  - severity: high
    description: This spec is blocked on both d8 and e5, so a partial UI or lineage implementation will produce brittle false negatives.
    mitigation: Keep story status blocked until the full UI path and d8 contract are real, then seed only the minimal required state for one saved design.
  - severity: medium
    description: E2E seeding can drift from the app's actual persisted shape if it hand-writes documents carelessly.
    mitigation: Research step verifies the current emulator seeding pattern against the latest converters/routes before authoring the spec.

